<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>效率仪表盘</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #131313;
    --card-hover: #1a1a1a;
    --border: #222;
    --accent: #e8a838;
    --accent-dim: rgba(232,168,56,0.12);
    --accent-glow: rgba(232,168,56,0.25);
    --fg: #ececec;
    --fg-muted: #777;
    --fg-dim: #444;
    --success: #4ade80;
    --danger: #f87171;
    --radius: 14px;
    --radius-sm: 8px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans SC',sans-serif;
    background:var(--bg);
    color:var(--fg);
    height:100vh;
    overflow:hidden;
    position:relative;
  }
  /* 背景氛围 */
  .bg-orb{
    position:fixed;pointer-events:none;border-radius:50%;filter:blur(100px);z-index:0;
  }
  .bg-orb.a{top:-15%;right:-8%;width:420px;height:420px;background:rgba(232,168,56,0.06);}
  .bg-orb.b{bottom:-20%;left:-10%;width:350px;height:350px;background:rgba(232,168,56,0.04);}
  .bg-orb.c{top:40%;left:35%;width:260px;height:260px;background:rgba(74,222,128,0.03);}

  .app{
    position:relative;z-index:1;
    display:grid;grid-template-rows:auto 1fr;
    height:100vh;padding:14px 16px;gap:10px;
  }

  /* 顶栏 */
  .top-bar{
    display:flex;align-items:center;justify-content:space-between;padding:0 4px;
  }
  .greeting{font-size:19px;font-weight:700;letter-spacing:-0.3px;}
  .greeting span{color:var(--accent);}
  .date-info{
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--fg-muted);
    display:flex;align-items:center;gap:14px;
  }
  .clock{font-size:22px!important;font-weight:600;color:var(--fg);letter-spacing:1px;}

  /* 主体 */
  .main{
    display:grid;grid-template-columns:270px 1fr;gap:10px;min-height:0;
  }
  .right-panel{
    display:grid;grid-template-rows:1fr 1fr;gap:10px;min-height:0;
  }

  /* 卡片 */
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 16px;display:flex;flex-direction:column;min-height:0;
    transition:border-color .3s,box-shadow .3s;
    animation:cardIn .5s ease both;
  }
  .card:hover{border-color:#2e2e2e;box-shadow:0 0 20px rgba(0,0,0,0.2);}
  .card:nth-child(2){animation-delay:.06s}
  .card:nth-child(3){animation-delay:.12s}
  @keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .card-title{
    font-size:11px;font-weight:500;color:var(--fg-muted);text-transform:uppercase;
    letter-spacing:1.6px;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-shrink:0;
  }
  .card-title i{color:var(--accent);font-size:13px;}

  /* ===== 番茄钟 ===== */
  .pomodoro-card{align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .pomodoro-card .glow{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:200px;height:200px;border-radius:50%;
    background:radial-gradient(circle,var(--accent-dim) 0%,transparent 70%);
    opacity:0;transition:opacity .6s;pointer-events:none;
  }
  .pomodoro-card.running .glow{opacity:1;}

  .timer-ring{position:relative;width:170px;height:170px;flex-shrink:0;}
  .timer-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:var(--border);stroke-width:4;}
  .ring-progress{
    fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;
    transition:stroke-dashoffset 1s linear;
    filter:drop-shadow(0 0 8px var(--accent-glow));
  }
  .ring-progress.break-mode{stroke:var(--success);filter:drop-shadow(0 0 8px rgba(74,222,128,0.3));}

  .timer-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  .time{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:600;letter-spacing:2px;}
  .mode-label{font-size:10px;color:var(--fg-muted);margin-top:2px;letter-spacing:1.2px;}

  .timer-controls{display:flex;gap:8px;margin-top:14px;flex-shrink:0;}
  .timer-controls button{
    background:var(--border);border:none;color:var(--fg);width:38px;height:38px;
    border-radius:50%;cursor:pointer;font-size:13px;transition:all .2s;
    display:flex;align-items:center;justify-content:center;
  }
  .timer-controls button:hover{background:var(--accent-dim);color:var(--accent);}
  .timer-controls button.primary{
    background:var(--accent);color:#0a0a0a;width:46px;height:46px;font-size:15px;
  }
  .timer-controls button.primary:hover{filter:brightness(1.15);transform:scale(1.06);}

  .pomodoro-stats{display:flex;gap:20px;margin-top:16px;flex-shrink:0;}
  .stat{text-align:center;}
  .stat-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--accent);}
  .stat-label{font-size:10px;color:var(--fg-muted);margin-top:2px;}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .running .time{animation:pulse 2s ease-in-out infinite;}

  /* ===== 待办事项 ===== */
  .todo-input-row{display:flex;gap:8px;margin-bottom:10px;flex-shrink:0;}
  .todo-input-row input{
    flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:8px 12px;color:var(--fg);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;
  }
  .todo-input-row input:focus{border-color:var(--accent);}
  .todo-input-row input::placeholder{color:var(--fg-dim);}
  .todo-input-row button{
    background:var(--accent);border:none;color:#0a0a0a;border-radius:var(--radius-sm);
    padding:0 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;
  }
  .todo-input-row button:hover{filter:brightness(1.15);}

  .todo-list{flex:1;overflow-y:auto;min-height:0;}
  .todo-list::-webkit-scrollbar{width:3px}
  .todo-list::-webkit-scrollbar-track{background:transparent}
  .todo-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .todo-item{
    display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:var(--radius-sm);
    transition:background .15s;cursor:default;
  }
  .todo-item:hover{background:var(--card-hover);}
  .checkbox{
    width:17px;height:17px;border:2px solid var(--border);border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;
  }
  .checkbox:hover{border-color:var(--accent);}
  .todo-item.done .checkbox{background:var(--accent);border-color:var(--accent);}
  .todo-item.done .checkbox::after{content:'';width:5px;height:5px;background:#0a0a0a;border-radius:50%;}
  .todo-text{flex:1;font-size:13px;line-height:1.4;transition:all .2s;}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--fg-dim);}
  .todo-delete{
    opacity:0;background:none;border:none;color:var(--danger);cursor:pointer;
    font-size:11px;padding:4px;transition:opacity .15s;
  }
  .todo-item:hover .todo-delete{opacity:1;}
  .todo-empty{color:var(--fg-dim);font-size:13px;text-align:center;padding:28px 0;}

  /* ===== 笔记 ===== */
  .note-area{flex:1;min-height:0;display:flex;flex-direction:column;}
  .note-area textarea{
    flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:10px 12px;color:var(--fg);font-size:13px;font-family:'JetBrains Mono',monospace;
    line-height:1.7;resize:none;outline:none;transition:border-color .2s;
  }
  .note-area textarea:focus{border-color:var(--accent);}
  .note-area textarea::placeholder{color:var(--fg-dim);}
  .note-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px;flex-shrink:0;}
  .char-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg-dim);}
  .save-indicator{font-size:11px;color:var(--success);opacity:0;transition:opacity .3s;}
  .save-indicator.show{opacity:1;}

  /* ===== Toast ===== */
  .toast-container{position:fixed;top:14px;right:14px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
  .toast{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:10px 16px;font-size:13px;color:var(--fg);box-shadow:0 8px 28px rgba(0,0,0,0.5);
    display:flex;align-items:center;gap:8px;
    animation:toastIn .3s ease,toastOut .3s ease 2.5s forwards;
  }
  .toast i{color:var(--accent);}
  @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
  }
</style>
</head>
<body>
<div class="bg-orb a"></div>
<div class="bg-orb b"></div>
<div class="bg-orb c"></div>

<div class="app">
  <div class="top-bar">
    <div class="greeting" id="greeting"></div>
    <div class="date-info">
      <span id="dateStr"></span>
      <span class="clock" id="clock"></span>
    </div>
  </div>

  <div class="main">
    <!-- 番茄钟 -->
    <div class="card pomodoro-card" id="pomodoroCard">
      <div class="glow"></div>
      <div class="card-title"><i class="fas fa-crosshairs"></i>专注计时</div>
      <div class="timer-ring">
        <svg viewBox="0 0 180 180">
          <circle class="ring-bg" cx="90" cy="90" r="80"/>
          <circle class="ring-progress" id="ringProgress" cx="90" cy="90" r="80"
            stroke-dasharray="502.65" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-display">
          <div class="time" id="timerTime">25:00</div>
          <div class="mode-label" id="modeLabel">工作模式</div>
        </div>
      </div>
      <div class="timer-controls">
        <button onclick="resetTimer()" title="重置" aria-label="重置计时"><i class="fas fa-undo"></i></button>
        <button class="primary" id="playBtn" onclick="toggleTimer()" title="开始/暂停" aria-label="开始或暂停计时"><i class="fas fa-play"></i></button>
        <button onclick="switchMode()" title="切换模式" aria-label="切换工作或休息模式"><i class="fas fa-exchange-alt"></i></button>
      </div>
      <div class="pomodoro-stats">
        <div class="stat"><div class="stat-val" id="pomodoroCount">0</div><div class="stat-label">今日完成</div></div>
        <div class="stat"><div class="stat-val" id="totalMinutes">0</div><div class="stat-label">专注分钟</div></div>
      </div>
    </div>

    <div class="right-panel">
      <!-- 待办事项 -->
      <div class="card">
        <div class="card-title"><i class="fas fa-check-double"></i>待办事项</div>
        <div class="todo-input-row">
          <input type="text" id="todoInput" placeholder="添加新任务，回车确认..." aria-label="新任务">
          <button onclick="addTodo()">添加</button>
        </div>
        <div class="todo-list" id="todoList"></div>
      </div>

      <!-- 快捷笔记 -->
      <div class="card">
        <div class="card-title"><i class="fas fa-pen-nib"></i>快捷笔记</div>
        <div class="note-area">
          <textarea id="noteArea" placeholder="随时记录想法，自动保存..." aria-label="笔记内容"></textarea>
          <div class="note-footer">
            <span class="char-count" id="charCount">0 字</span>
            <span class="save-indicator" id="saveIndicator"><i class="fas fa-check"></i> 已保存</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
/* ===== 工具 ===== */
const $ = s => document.querySelector(s);
const CIRC = 2 * Math.PI * 80; // 圆周长 ≈502.65

function showToast(msg, icon='fa-info-circle') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<i class="fas ${icon}"></i>${msg}`;
  $('#toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ===== 时钟与问候 ===== */
function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  $('#clock').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const wd = ['日','一','二','三','四','五','六'];
  $('#dateStr').textContent = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} 周${wd[now.getDay()]}`;

  let g = '晚上好';
  if (h >= 5 && h < 12) g = '早上好';
  else if (h >= 12 && h < 14) g = '中午好';
  else if (h >= 14 && h < 18) g = '下午好';
  else if (h >= 22 || h < 5) g = '夜深了';
  $('#greeting').innerHTML = `${g}，<span>保持专注</span>`;
}
updateClock();
setInterval(updateClock, 1000);

/* ===== 番茄钟 ===== */
const WORK = 25 * 60, BREAK = 5 * 60;
let mode = 'work', duration = WORK, remaining = WORK, running = false, interval = null;

function todayKey() {
  const d = new Date();
  return `pomo_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
function loadStats() {
  const d = JSON.parse(localStorage.getItem(todayKey()) || '{"c":0,"m":0}');
  $('#pomodoroCount').textContent = d.c;
  $('#totalMinutes').textContent = d.m;
}
function saveStats(c, m) {
  localStorage.setItem(todayKey(), JSON.stringify({c, m}));
  $('#pomodoroCount').textContent = c;
  $('#totalMinutes').textContent = m;
}
loadStats();

function updateTimer() {
  const min = Math.floor(remaining / 60), sec = remaining % 60;
  $('#timerTime').textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  const progress = 1 - remaining / duration;
  $('#ringProgress').style.strokeDashoffset = CIRC * (1 - progress);
}

function toggleTimer() {
  if (running) {
    clearInterval(interval);
    running = false;
    $('#playBtn').innerHTML = '<i class="fas fa-play"></i>';
    $('#pomodoroCard').classList.remove('running');
  } else {
    running = true;
    $('#playBtn').innerHTML = '<i class="fas fa-pause"></i>';
    $('#pomodoroCard').classList.add('running');
    interval = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        remaining = 0;
        clearInterval(interval);
        running = false;
        $('#playBtn').innerHTML = '<i class="fas fa-play"></i>';
        $('#pomodoroCard').classList.remove('running');
        onComplete();
      }
      updateTimer();
    }, 1000);
  }
  updateTimer();
}

function resetTimer() {
  clearInterval(interval);
  running = false;
  remaining = duration;
  $('#playBtn').innerHTML = '<i class="fas fa-play"></i>';
  $('#pomodoroCard').classList.remove('running');
  updateTimer();
}

function switchMode() {
  clearInterval(interval);
  running = false;
  $('#playBtn').innerHTML = '<i class="fas fa-play"></i>';
  $('#pomodoroCard').classList.remove('running');
  const ring = $('#ringProgress');
  if (mode === 'work') {
    mode = 'break'; duration = BREAK;
    $('#modeLabel').textContent = '休息模式';
    ring.classList.add('break-mode');
  } else {
    mode = 'work'; duration = WORK;
    $('#modeLabel').textContent = '工作模式';
    ring.classList.remove('break-mode');
  }
  remaining = duration;
  updateTimer();
}

function onComplete() {
  if (mode === 'work') {
    const d = JSON.parse(localStorage.getItem(todayKey()) || '{"c":0,"m":0}');
    d.c++; d.m += 25;
    saveStats(d.c, d.m);
    showToast('专注完成！休息一下吧', 'fa-trophy');
  } else {
    showToast('休息结束，继续加油', 'fa-fire');
  }
  switchMode();
}

updateTimer();

/* ===== 待办事项 ===== */
let todos = JSON.parse(localStorage.getItem('jisheng_todos') || '[]');

function renderTodos() {
  const list = $('#todoList');
  if (!todos.length) { list.innerHTML = '<div class="todo-empty">暂无任务，添加一个吧</div>'; return; }
  // 未完成在前，已完成在后
  const sorted = todos.map((t,i)=>({...t,i})).sort((a,b)=> a.done - b.done);
  list.innerHTML = sorted.map(t => `
    <div class="todo-item${t.done?' done':''}" data-i="${t.i}">
      <div class="checkbox" onclick="toggleTodo(${t.i})" role="checkbox" aria-checked="${t.done}" tabindex="0"></div>
      <span class="todo-text">${escapeHtml(t.text)}</span>
      <button class="todo-delete" onclick="deleteTodo(${t.i})" aria-label="删除"><i class="fas fa-times"></i></button>
    </div>`).join('');
}

function addTodo() {
  const inp = $('#todoInput'), text = inp.value.trim();
  if (!text) return;
  todos.unshift({text, done: false});
  saveTodos(); renderTodos();
  inp.value = ''; inp.focus();
}
function toggleTodo(i) { todos[i].done = !todos[i].done; saveTodos(); renderTodos(); }
function deleteTodo(i) { todos.splice(i,1); saveTodos(); renderTodos(); }
function saveTodos() { localStorage.setItem('jisheng_todos', JSON.stringify(todos)); }

$('#todoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
renderTodos();

/* ===== 快捷笔记 ===== */
const noteEl = $('#noteArea'), charEl = $('#charCount'), saveEl = $('#saveIndicator');
let noteTimer = null;

noteEl.value = localStorage.getItem('jisheng_note') || '';
charEl.textContent = `${noteEl.value.length} 字`;

noteEl.addEventListener('input', () => {
  charEl.textContent = `${noteEl.value.length} 字`;
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => {
    localStorage.setItem('jisheng_note', noteEl.value);
    saveEl.classList.add('show');
    setTimeout(() => saveEl.classList.remove('show'), 1500);
  }, 400);
});

/* ===== 快捷键 ===== */
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.code === 'Space') { e.preventDefault(); toggleTimer(); }
});
</script>
</body>
</html>
