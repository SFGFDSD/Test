        function deleteFolderItems(windowId) {
            if(!confirm('确定删除选中项吗？')) return;
            
            const contentArea = document.getElementById('folder-content-' + windowId);
            if(!contentArea) return;
            
            // 使用窗口状态中的路径（支持子文件夹导航）
            const state = SYSTEM.folderWindowStates?.[windowId];
            const folderName = state ? state.folderName : contentArea.closest('.window').querySelector('.window-title-text').innerText;
            const path = state ? state.currentPath : SYSTEM.desktopPath + '/' + folderName;
            
            const selectedItems = Array.from(contentArea.querySelectorAll('.folder-item.selected, .folder-grid-item.selected'));
            let deletedCount = 0;
            const total = selectedItems.length;
            
            selectedItems.forEach(item => {
                const filename = item.dataset.filename;
                const fullPath = path + '/' + filename;
                
                SYSTEM.fs.unlink(fullPath, (err) => {
                    if(err) {
                        console.error('删除失败:', filename, err);
                    } else {
                        deletedCount++;
                    }
                    
                    if(deletedCount === total) {
                        if (state) { state.fileStats = {}; renderFolderContent(windowId); }
                        else refreshFolderWindow(folderName);
                        refreshDesktop();
                        Notify.success('删除成功', `已删除 ${total} 个文件`);
                    }
                });
            });
        }

        function deleteFolderItem(windowId, filename) {
            if(!confirm(`确定删除 "${filename}" 吗？`)) return;
            
            const contentArea = document.getElementById('folder-content-' + windowId);
            if(!contentArea) return;
            
            const state = SYSTEM.folderWindowStates?.[windowId];
            const folderName = state ? state.folderName : contentArea.closest('.window').querySelector('.window-title-text').innerText;
            const path = state ? state.currentPath : SYSTEM.desktopPath + '/' + folderName;
            const fullPath = path + '/' + filename;
            
            // 先检查是否是文件夹
            SYSTEM.fs.stat(fullPath, (err, stats) => {
                if(err) {
                    Notify.error('删除失败', err.message);
                    return;
                }
                
                if(stats.isDirectory()) {
                    // 使用递归删除文件夹
                    deleteFolderRecursive(fullPath, (err) => {
                        if(err) {
                            Notify.error('删除失败', err.message);
                        } else {
                            if (state) { state.fileStats = {}; renderFolderContent(windowId); }
                            else refreshFolderWindow(folderName);
                            refreshDesktop();
                            Notify.success('删除成功', `文件夹 "${filename}" 已删除`);
                        }
                    });
                } else {
                    // 删除文件
                    SYSTEM.fs.unlink(fullPath, (err) => {
                        if(err) {
                            Notify.error('删除失败', err.message);
                        } else {
                            if (state) { state.fileStats = {}; renderFolderContent(windowId); }
                            else refreshFolderWindow(folderName);
                            refreshDesktop();
                            Notify.success('删除成功', `文件 "${filename}" 已删除`);
                        }
                    });
                }
            });
        }

        function renameFolderItem(windowId, oldName) {
            const newName = prompt('请输入新名称:', oldName);
            if(!newName || newName === oldName) return;
            
            const contentArea = document.getElementById('folder-content-' + windowId);
            if(!contentArea) return;
            
            const state = SYSTEM.folderWindowStates?.[windowId];
            const folderName = state ? state.folderName : contentArea.closest('.window').querySelector('.window-title-text').innerText;
            const path = state ? state.currentPath : SYSTEM.desktopPath + '/' + folderName;
            const oldPath = path + '/' + oldName;
            const newPath = path + '/' + newName;
            
            SYSTEM.fs.rename(oldPath, newPath, (err) => {
                if(err) {
                    Notify.error('重命名失败', err.message);
                } else {
                    if (state) { state.fileStats = {}; renderFolderContent(windowId); }
                    else refreshFolderWindow(folderName);
                    refreshDesktop();
                    Notify.success('重命名成功', `已重命名为 "${newName}"`);
                }
            });
        }

        // === 文件夹窗口的复制/剪切/粘贴功能 ===

        // 复制选中的文件夹项目
        function copySelectedFolderItems(windowId) {
            const contentArea = document.getElementById('folder-content-' + windowId);
            if(!contentArea) return;
            
            const selectedItems = Array.from(contentArea.querySelectorAll('.folder-item.selected, .folder-grid-item.selected'));
            if(selectedItems.length === 0) {
                Notify.info('未选择文件');
                return;
            }
            
            Clipboard.clear();
            Clipboard.setCutMode(false);
            
            selectedItems.forEach(item => {
                const filename = item.dataset.filename;
                const path = item.dataset.path;
                if(filename && path) {
                    Clipboard.add({
                        path: path,
                        filename: filename,
                        type: 'copy'
                    });
                }
            });
            
            Notify.success('已复制', `已复制 ${Clipboard.getItems().length} 个项目到剪贴板`);
        }

        // 剪切选中的文件夹项目
        function cutSelectedFolderItems(windowId) {
            const contentArea = document.getElementById('folder-content-' + windowId);
            if(!contentArea) return;
            
            const selectedItems = Array.from(contentArea.querySelectorAll('.folder-item.selected, .folder-grid-item.selected'));
            if(selectedItems.length === 0) {
                Notify.info('未选择文件');
                return;
            }
            
            Clipboard.clear();
            Clipboard.setCutMode(true);
            
            selectedItems.forEach(item => {
                const filename = item.dataset.filename;
                const path = item.dataset.path;
                if(filename && path) {
                    Clipboard.add({
                        path: path,
                        filename: filename,
                        type: 'cut'
                    });
                    // 视觉反馈
                    item.style.opacity = '0.5';
                }
            });
            
            Notify.success('已剪切', `已剪切 ${Clipboard.getItems().length} 个项目`);
        }

        // 粘贴到文件夹窗口
        function pasteToFolderWindow(windowId) {
            if(!Clipboard.hasItems()) {
                Notify.info('剪贴板为空');
                return;
            }
            
            const state = SYSTEM.folderWindowStates?.[windowId];
            if(!state) {
                Notify.error('错误', '无法获取窗口状态');
                return;
            }
            
            const destPath = state.currentPath;
            const items = Clipboard.getItems();
            const isCut = Clipboard.isCut;
            const srcPaths = items.map(i => i.path); // 收集所有源路径
            let processedCount = 0;
            let errorCount = 0;
            
            items.forEach(item => {
                const targetPath = destPath + '/' + item.filename;
                
                // 检查目标是否已存在
                SYSTEM.fs.stat(targetPath, (err) => {
                    if(!err && targetPath !== item.path) {
                        // 目标已存在，生成新名称
                        const ext = item.filename.includes('.') ? '.' + item.filename.split('.').pop() : '';
                        const baseName = item.filename.replace(ext, '');
                        let newName = baseName + ' (副本)' + ext;
                        let counter = 1;
                        
                        const checkAndRename = () => {
                            const newPath = destPath + '/' + newName;
                            SYSTEM.fs.stat(newPath, (err) => {
                                if(!err) {
                                    counter++;
                                    newName = baseName + ' (副本' + counter + ')' + ext;
                                    checkAndRename();
                                } else {
                                    performFolderPaste(item.path, newPath, item.filename, newName, isCut, windowId);
                                }
                            });
                        };
                        checkAndRename();
                    } else {
                        performFolderPaste(item.path, targetPath, item.filename, item.filename, isCut, windowId);
                    }
                });
            });
            
            function performFolderPaste(srcPath, destPath, srcName, destName, isCut, windowId) {
                if(isCut) {
                    // 剪切操作
                    SYSTEM.fs.rename(srcPath, destPath, (err) => {
                        if(err) {
                            console.error('剪切失败:', err);
                            errorCount++;
                        } else {
                            processedCount++;
                        }
                        checkFolderComplete(windowId);
                    });
                } else {
                    // 复制操作
                    SYSTEM.fs.stat(srcPath, (err, stats) => {
                        if(err) {
                            errorCount++;
                            checkFolderComplete(windowId);
                            return;
                        }
                        
                        if(stats.isDirectory()) {
                            copyFolderRecursive(srcPath, destPath, (err) => {
                                if(err) {
                                    console.error('复制文件夹失败:', err);
                                    errorCount++;
                                } else {
                                    processedCount++;
                                }
                                checkFolderComplete(windowId);
                            });
                        } else {
                            SYSTEM.fs.readFile(srcPath, (err, data) => {
                                if(err) {
                                    errorCount++;
                                    checkFolderComplete(windowId);
                                    return;
                                }
                                SYSTEM.fs.writeFile(destPath, data, (err) => {
                                    if(err) {
                                        console.error('写入文件失败:', err);
                                        errorCount++;
                                    } else {
                                        processedCount++;
                                    }
                                    checkFolderComplete(windowId);
                                });
                            });
                        }
                    });
                }
            }
            
            function checkFolderComplete(windowId) {
                if(processedCount + errorCount === items.length) {
                    const state = SYSTEM.folderWindowStates?.[windowId];
                    
                    if(isCut) {
                        Clipboard.clear();
                        // 恢复所有项目透明度
                        document.querySelectorAll('.folder-item, .folder-grid-item').forEach(el => el.style.opacity = '');
                        document.querySelectorAll('.desktop-icon').forEach(el => el.style.opacity = '');
                    }
                    
                    // 刷新所有受影响的窗口
                    refreshAllAffectedWindows(destPath, srcPaths, isCut);
                    
                    if(errorCount > 0) {
                        Notify.error('部分失败', `成功 ${processedCount} 个，失败 ${errorCount} 个`);
                    } else {
                        Notify.success('粘贴成功', `已${isCut ? '移动' : '复制'} ${processedCount} 个项目`);
                    }
                }
            }
        }

        function setupFolderItemDrag(e, windowId, touchItem) {
            const contentArea = document.getElementById('folder-content-' + windowId);
            if(!contentArea) return;

            const selectedItems = Array.from(contentArea.querySelectorAll('.folder-item.selected, .folder-grid-item.selected'));
            if(selectedItems.length === 0) return;

            const getPos = (e) => {
                if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
                if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
                return { x: e.clientX, y: e.clientY };
            };

            const startPos = getPos(e);
            const startX = startPos.x;
            const startY = startPos.y;
            let isDragging = false;
            let dragPreview = null;
            let longPressTimer = null;
            let longPressTriggered = false;
            let touchMoveRegistered = false;

            // 长按检测（仅触摸设备）
            if (e.type === 'touchstart' && touchItem) {
                longPressTimer = setTimeout(() => {
                    longPressTriggered = true;
                    // 触发上下文菜单
                    const filename = touchItem.dataset.filename;
                    const fullPath = touchItem.dataset.path;
                    if (filename && fullPath) {
                        handleFolderItemContextMenu({
                            preventDefault: () => {},
                            stopPropagation: () => {},
                            clientX: startX,
                            clientY: startY,
                            currentTarget: touchItem
                        }, windowId, filename, fullPath);
                    }
                }, 500);
            }

            const onMove = (moveEvent) => {
                const pos = getPos(moveEvent);
                const dx = pos.x - startX;
                const dy = pos.y - startY;

                // 长按已触发，取消后续拖拽
                if (longPressTriggered) {
                    cleanup();
                    return;
                }

                // 移动超过阈值，取消长按
                if (longPressTimer && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }

                if(!isDragging && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
                    // 判断是水平拖拽还是垂直滚动
                    // 水平拖拽（dx > dy）才启动拖拽，否则让浏览器处理滚动
                    if (Math.abs(dx) > Math.abs(dy) * 1.2) {
                        isDragging = true;
                        document.body.style.cursor = 'move';

                        const filesData = selectedItems.map(item => ({
                            filename: item.dataset.filename,
                            path: item.dataset.path
                        }));

                        dragPreview = createDragPreview(filesData, pos.x, pos.y);

                        // 确认是拖拽后，注册非passive的touchmove来阻止滚动
                        if (!touchMoveRegistered && moveEvent.type === 'touchmove') {
                            touchMoveRegistered = true;
                            document.removeEventListener('touchmove', onMove);
                            document.addEventListener('touchmove', onMove, { passive: false });
                        }
                    }
                    // 否则是垂直滚动，不阻止，让浏览器自然滚动
                }

                if(isDragging && dragPreview) {
                    if(moveEvent.type === 'touchmove') moveEvent.preventDefault();
                    dragPreview.style.left = (pos.x + 10) + 'px';
                    dragPreview.style.top = (pos.y + 10) + 'px';
                }
            };

            const cleanup = () => {
                if(longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onUp);
                document.body.style.cursor = '';
            };

            const onUp = (upEvent) => {
                if(longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }

                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onUp);
                document.body.style.cursor = '';

                if(dragPreview) {
                    dragPreview.remove();
                    dragPreview = null;
                }

                if(!isDragging) return;

                const pos = getPos(upEvent);
                const target = document.elementFromPoint(pos.x, pos.y);
                if(!target) return;
                const desktop = document.getElementById('desktop');
                
                const folderName = contentArea.closest('.window').querySelector('.window-title-text').innerText;
                const sourcePath = SYSTEM.desktopPath + '/' + folderName;
                
                let targetPath = null;
                let targetFolderName = null;
                let operationType = 'copy';
                
                const folderWindow = target.closest('.window');
                const desktopIcon = target.closest('.desktop-icon');
                
                // === 修复后的判定逻辑 ===
                // 此处不再检查 desktop.contains(target)，因为 window 元素并不是 desktop 的子元素
                if (folderWindow) {
                    // 1. 如果目标是窗口（文件夹窗口）
                    const titleText = folderWindow.querySelector('.window-title-text').innerText;
                    // 在这个简易OS中，窗口标题即文件夹名
                    targetFolderName = titleText;
                    targetPath = SYSTEM.desktopPath + '/' + targetFolderName;
                    operationType = 'move';
                } else if (desktopIcon && desktopIcon.dataset.filename) {
                     // 2. 如果目标是桌面上的文件夹图标
                    const iconFilename = desktopIcon.dataset.filename;
                    // 这里简化逻辑：假设拖到桌面图标上就是往那个文件夹里放
                    targetPath = SYSTEM.desktopPath + '/' + iconFilename;
                    targetFolderName = iconFilename;
                    operationType = 'move';
                } else if (desktop.contains(target) || target === desktop || target.id === 'desktop-icons' || target.id === 'desktop-grid' || target.id === 'selection-box') {
                    // 3. 如果目标是桌面背景
                    targetPath = SYSTEM.desktopPath;
                    targetFolderName = '桌面';
                    operationType = 'move';
                } else {
                    // 无效目标
                    return;
                }
                
                if(!targetPath) return;
                
                if(targetPath === sourcePath) {
                    Notify.warning('操作无效', '不能将文件移动到同一文件夹');
                    return;
                }
                
                let processedCount = 0;
                let errorCount = 0;
                const total = selectedItems.length;
                const operationText = operationType === 'move' ? '移动' : '复制';
                
                const processFile = (item, callback) => {
                    const filename = item.dataset.filename;
                    const srcPath = item.dataset.path;
                    const destPath = targetPath + '/' + filename;
                    
                    console.log(`开始${operationText}文件: ${filename} 从 ${srcPath} 到 ${destPath}`);
                    
                    if(operationType === 'move') {
                        SYSTEM.fs.stat(destPath, (err) => {
                            if(!err) {
                                if(!confirm(`文件 "${filename}" 已存在于目标文件夹，是否覆盖？`)) {
                                    processedCount++;
                                    if(processedCount + errorCount === total) finishOperation();
                                    return;
                                }
                            }
                            
                            SYSTEM.fs.rename(srcPath, destPath, (renameErr) => {
                                if(renameErr) {
                                    errorCount++;
                                    console.error(`${operationText}文件失败:`, filename, renameErr);
                                } else {
                                    verifyFileIntegrity(destPath, filename, (isValid) => {
                                        if(isValid) {
                                            processedCount++;
                                            console.log(`${operationText}成功并验证通过:`, filename);
                                        } else {
                                            errorCount++;
                                            console.error(`${operationText}成功但验证失败:`, filename);
                                        }
                                        callback();
                                    });
                                }
                            });
                        });
                    } else {
                        SYSTEM.fs.readFile(srcPath, (readErr, data) => {
                            if(readErr) {
                                errorCount++;
                                console.error('读取文件失败:', filename, readErr);
                                callback();
                                return;
                            }
                            
                            SYSTEM.fs.writeFile(destPath, data, (writeErr) => {
                                if(writeErr) {
                                    errorCount++;
                                    console.error('写入文件失败:', filename, writeErr);
                                } else {
                                    verifyFileIntegrity(destPath, filename, (isValid) => {
                                        if(isValid) {
                                            processedCount++;
                                            console.log('复制成功并验证通过:', filename);
                                        } else {
                                            errorCount++;
                                            console.error('复制成功但验证失败:', filename);
                                        }
                                        callback();
                                    });
                                }
                            });
                        });
                    }
                };
                
                const verifyFileIntegrity = (filePath, filename, callback) => {
                    SYSTEM.fs.readFile(filePath, (err, data) => {
                        if(err) {
                            console.error('验证失败 - 无法读取文件:', filename, err);
                            callback(false);
                            return;
                        }
                        
                        const size = data.length;
                        const checksum = simpleChecksum(data);
                        
                        console.log(`文件验证: ${filename}, 大小: ${size} bytes, 校验和: ${checksum}`);
                        
                        callback(true);
                    });
                };
                
                const simpleChecksum = (buffer) => {
                    let hash = 0;
                    for(let i = 0; i < buffer.length; i++) {
                        const char = buffer[i];
                        hash = ((hash << 5) - hash) + char;
                        hash = hash & hash;
                    }
                    return hash.toString(16);
                };
                
                const finishOperation = () => {
                    // 收集源路径用于刷新
                    const srcPaths = selectedItems.map(item => item.dataset.path);
                    
                    // 刷新所有受影响的窗口
                    refreshAllAffectedWindows(targetPath, srcPaths, operationType === 'move');
                    
                    if(errorCount > 0) {
                        Notify.error('部分失败', `成功${operationText} ${processedCount} 个文件，失败 ${errorCount} 个`);
                    } else {
                        Notify.success('操作成功', `已${operationText} ${total} 个文件到 ${targetFolderName}`);
                    }
                };
                
                let index = 0;
                const processNext = () => {
                    if(index >= total) {
                        finishOperation();
                        return;
                    }
                    
                    processFile(selectedItems[index], () => {
                        index++;
                        processNext();
                    });
                };
                
                processNext();
            };
            
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
            // 触摸事件初始用 passive: true，允许浏览器处理滚动
            // 确认是水平拖拽后会在 onMove 中切换为 passive: false
            document.addEventListener('touchmove', onMove, { passive: true });
            document.addEventListener('touchend', onUp);
        }

        function createDragPreview(filesData, x, y) {
            const preview = document.createElement('div');
            preview.className = 'drag-preview';
            preview.style.position = 'fixed';

            preview.style.top = (y + 10) + 'px';
            preview.style.zIndex = '10000';
            preview.style.opacity = '0.9';
            preview.style.pointerEvents = 'none';
            preview.style.background = 'rgba(24, 24, 32, 0.95)';
            preview.style.border = '1px solid rgba(0, 120, 212, 0.5)';
            preview.style.borderRadius = '8px';
            preview.style.padding = '12px 16px';
            preview.style.boxShadow = '0 8px 32px rgba(0, 0, 0, 0.5)';
            preview.style.maxWidth = '200px';
            
            const count = filesData.length;
            const displayCount = count > 5 ? 5 : count;
            
            let html = `<div style="font-size: 12px; color: #8a8a9a; margin-bottom: 8px; font-weight: 500;">已选中 ${count} 个文件</div>`;
            html += '<div style="display: flex; flex-direction: column; gap: 6px;">';
            
            for(let i = 0; i < displayCount; i++) {
                const file = filesData[i];
                html += `<div style="font-size: 13px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${file.filename}</div>`;
            }
            
            if(count > 5) {
                html += `<div style="font-size: 12px; color: #8a8a9a;">...还有 ${count - 5} 个文件</div>`;
            }
            
            html += '</div>';
            preview.innerHTML = html;
            
            document.body.appendChild(preview);
            return preview;
        }

        // === JISHENG OS 应用识别 ===
        /**
         * 解析HTML文件中的JISHENG OS应用标记
         * @param {string} htmlContent - HTML文件内容
         * @returns {Object|null} 应用配置对象，如果不是应用则返回null
         */
        function parseJishengApp(htmlContent) {
            // 只检查前200行，避免处理大文件影响性能
            const searchContent = htmlContent.split('\n').slice(0, 200).join('\n');
            // 正则匹配 <!-- JISHENG-OS-APP: {...} -->
            const match = searchContent.match(/<!--\s*JISHENG-OS-APP:\s*(\{[\s\S]*?\})\s*-->/);
            if (!match) return null;

            try {
                const config = JSON.parse(match[1]);
                if (!config.name) return null; // 必须有name字段
                return {
                    name: config.name,
                    icon: config.icon || null,
                    width: config.width || 700,
                    height: config.height || 500
                };
            } catch (e) {
                console.warn('JISHENG-OS-APP 配置解析失败:', e);
                return null;
            }
        }

        /**
         * 作为JISHENG OS应用打开HTML文件（无地址栏）
         * @param {string} htmlContent - HTML文件内容
         * @param {Object} appConfig - 应用配置
         * @param {string} filename - 文件名
         */
        function openJishengApp(htmlContent, appConfig, filename) {
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);

            // 根据icon配置生成图标HTML
            let iconHtml = '<svg class="icon-svg sm" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>';
            // 如果icon是SVG代码，直接使用
            if (appConfig.icon && appConfig.icon.includes('<svg')) {
                iconHtml = appConfig.icon;
            }

            createWindow({
                title: appConfig.name,
                iconHtml: iconHtml,
                width: appConfig.width,
                height: appConfig.height,
                content: `
                    <div class="content-area" style="position:relative;flex:1;">
                        <iframe src="${url}" sandbox="allow-same-origin allow-scripts allow-forms allow-popups" style="width:100%;height:100%;border:none;"></iframe>
                    </div>
                `
            });
        }

        // === 文件操作 ===
        function openFile(filename) {
            // 直接转接给通用打开函数，保证逻辑统一
            const fullPath = SYSTEM.desktopPath + '/' + filename;
            openFileFromPath(fullPath, filename);
        }

        // 通用的文件打开逻辑 (现在支持桌面文件和文件夹内的文件)
        function openFileFromPath(fullPath, filename) {
            // 先检查路径是文件还是目录
            SYSTEM.fs.stat(fullPath, (err, stats) => {
                if (err) { 
                    Notify.error('无法访问', err.message); 
                    return; 
                }
                const isDir = stats.isDirectory ? (typeof stats.isDirectory === 'function' ? stats.isDirectory() : stats.isDirectory) : false;
                if (isDir) {
                    // 是目录，用文件夹窗口打开
                    const pathParts = fullPath.split('/');
                    const folderName = pathParts[pathParts.length - 1];
                    const parentPath = pathParts.slice(0, -1).join('/') || SYSTEM.desktopPath;
                    openFolderWindow(folderName, parentPath);
                    return;
                }
                
                // 1. 处理 HTML 文件
                if(filename.match(/\.html?$/i)) {
                SYSTEM.fs.readFile(fullPath, 'utf8', (err, data) => {
                    if(err) { Notify.error('打开失败', err.message); return; }
                    
                    // 检测是否为 JISHENG OS 应用
                    const appConfig = parseJishengApp(data);
                    if (appConfig) {
                        // 作为独立应用打开（无地址栏）
                        openJishengApp(data, appConfig, filename);
                        Notify.success('正在打开', `已启动应用: ${appConfig.name}`);
                    } else {
                        // 普通HTML文件，用浏览器打开
                        const blob = new Blob([data], { type: 'text/html' });
                        const url = URL.createObjectURL(blob);
                        openBrowser(url);
                        Notify.success('正在打开', '已在浏览器中加载 HTML 文件');
                    }
                });
            }
            // 2. 处理图片文件 (改为调用漫画查看器)
            else if(filename.match(/\.(jpg|png|gif|webp|jpeg)$/i)) {
                openMangaViewer(fullPath, filename);
            }
            // 3. 处理 CSV 文件 (使用表格查看器)
            else if(filename.match(/\.csv$/i)) {
                SYSTEM.fs.readFile(fullPath, 'utf8', (err, data) => {
                    if(err) { Notify.error('打开失败', err.message); return; }
                    openCSVViewer(data, filename);
                });
            }
            // 4. 处理文本文件
            else if(filename.match(/\.(txt|md)$/i)) {
                SYSTEM.fs.readFile(fullPath, 'utf8', (err, data) => {
                    if(err) { Notify.error('打开失败', err.message); return; }
                    openNotepad(data, filename);
                });
            } 
            // 4. 处理压缩文件 (支持 zip/7z/rar/tar/gz 等格式)
            else if(isArchiveFile(filename)) {
                extractArchive(fullPath);
            }

        function deleteFile(filename) {
            if(!confirm(`确定删除 "${filename}" 吗？`)) return;
            const path = SYSTEM.desktopPath + '/' + filename;
            
            SYSTEM.fs.stat(path, (err, stats) => {
                if(err) { Notify.error('删除失败', err.message); return; }
                
                if(stats.isDirectory()) {
                    deleteFolderRecursive(path, () => {
                        refreshDesktop();
                        Notify.success('删除成功', `文件夹 "${filename}" 已删除`);
                    });
                } else {
                    SYSTEM.fs.unlink(path, (err) => {
                        if(err) { Notify.error('删除失败', err.message); return; }
                        refreshDesktop();
                        Notify.success('删除成功', `文件 "${filename}" 已删除`);
                    });
                }
            });
        }

        function deleteFolderRecursive(path, callback) {
            SYSTEM.fs.readdir(path, (err, files) => {
                if(err) { callback(err); return; }
                
                let pending = files.length;
                if(!pending) {
                    SYSTEM.fs.rmdir(path, callback);
                    return;
                }
                
                files.forEach(file => {
                    const curPath = path + '/' + file;
                    SYSTEM.fs.stat(curPath, (err, stats) => {
                        if(err) {
                            // 如果出错，跳过当前文件，继续处理其他文件
                            if(--pending === 0) SYSTEM.fs.rmdir(path, callback);
                            return;
                        }
                        if(stats.isDirectory()) {
                            deleteFolderRecursive(curPath, () => {
                                if(--pending === 0) SYSTEM.fs.rmdir(path, callback);
                            });
                        } else {
                            SYSTEM.fs.unlink(curPath, () => {
                                if(--pending === 0) SYSTEM.fs.rmdir(path, callback);
                            });
                        }
                    });
                });
            });
        }

        // ============================================
        // 统一解压函数 - 支持 zip/7z/rar/tar/gz 等格式
        // ============================================

        function isArchiveFile(filename) {
            return /\.(zip|7z|rar|tar|gz|bz2|xz|cab|tgz)$/i.test(filename);
        }

        function getArchiveType(filename) {
            const ext = filename.toLowerCase().split('.').pop();
            if (ext === 'zip') return 'zip';
            if (['7z', 'rar', 'tar', 'gz', 'bz2', 'xz', 'cab', 'tgz'].includes(ext)) return '7z';
            return 'unknown';
        }

        async function extractArchive(filePath) {
            const filename = filePath.split('/').pop();
            const folderName = filename.replace(/\.(zip|7z|rar|tar|gz|bz2|xz|cab|tgz)$/i, '');
            const parentDir = filePath.substring(0, filePath.lastIndexOf('/'));
            const targetDir = parentDir + '/' + folderName;
            const archiveType = getArchiveType(filename);

            const progressEl = document.createElement('div');
            progressEl.className = 'extract-progress';
            progressEl.innerHTML = `
                <h4>正在解压: ${filename}</h4>
                <div class="bar"><div class="bar-fill" id="extract-bar"></div></div>
                <p id="extract-status">读取压缩包...</p>
            `;
            document.body.appendChild(progressEl);

            const updateProgress = (percent) => {
                const bar = document.getElementById('extract-bar');
                if (bar) bar.style.width = percent + '%';
            };
            const updateStatus = (text) => {
                const status = document.getElementById('extract-status');
                if (status) status.innerText = text;
            };

            try {
                updateStatus('读取压缩包...');
                updateProgress(5);
                
                const fileData = await new Promise((resolve, reject) => {
                    SYSTEM.fs.readFile(filePath, (err, data) => {
                        if (err) reject(err);
                        else resolve(data);
                    });
                });

                await new Promise(resolve => {
                    SYSTEM.fs.mkdir(targetDir, () => resolve());
                });

                let extractedFiles = [];

                if (archiveType === 'zip') {
                    updateStatus('解析 ZIP 结构...');
                    updateProgress(10);
                    
                    const zip = await JSZip.loadAsync(fileData);
                    const files = Object.keys(zip.files).filter(name => !zip.files[name].dir);
                    const total = files.length;

                    for (let i = 0; i < files.length; i++) {
                        const relativePath = files[i];
                        const zipEntry = zip.files[relativePath];
                        
                        updateStatus(relativePath);
                        updateProgress(10 + (i / total) * 85);
                        
                        const content = await zipEntry.async('arraybuffer');
                        extractedFiles.push({
                            path: relativePath,
                            data: new Uint8Array(content)
                        });
                    }
                } else if (archiveType === '7z') {
                    if (!window.sevenZipReady) {
                        throw new Error('7z引擎未加载，请刷新页面重试');
                    }
                    
                    updateStatus('使用 7z 引擎解压...');
                    updateProgress(20);
                    
                    extractedFiles = await window.sevenZipEngine.extract(fileData, filename);
                    updateProgress(90);
                    
                    window.sevenZipEngine.cleanup();
                } else {
                    throw new Error('不支持的压缩格式');
                }

                updateStatus('写入文件...');
                const total = extractedFiles.length;
                
                for (let i = 0; i < extractedFiles.length; i++) {
                    const file = extractedFiles[i];
                    const fullPath = targetDir + '/' + file.path;
                    
                    const fileParentDir = fullPath.substring(0, fullPath.lastIndexOf('/'));
                    await ensureDir(fileParentDir);
                    
                    const buffer = SYSTEM.Buffer ? SYSTEM.Buffer.from(file.data) : file.data;
                    
                    await new Promise(resolve => {
                        SYSTEM.fs.writeFile(fullPath, buffer, () => resolve());
                    });
                    
                    updateProgress(90 + (i / total) * 10);
                }

                progressEl.remove();
                Notify.success('解压完成', `已解压 ${extractedFiles.length} 个文件到 "${folderName}"`);
                
                if (typeof refreshDesktop === 'function') refreshDesktop();
                if (typeof loadDirectory === 'function') loadDirectory(parentDir);
                if (typeof openFolderWindow === 'function') openFolderWindow(folderName);

            } catch (e) {
                progressEl.remove();
                Notify.error('解压失败', e.message);
                console.error('解压错误:', e);
            }
        }

        function extractZip(filename) {
            const path = SYSTEM.desktopPath + '/' + filename.split('/').pop();
            extractArchive(path);
        }

        function extractZipFromPath(filePath) {
            extractArchive(filePath);
        }

        async function ensureDir(path) {
            const parts = path.split('/').filter(p => p);
            let current = '';
            for(const part of parts) {
                current += '/' + part;
                await new Promise(resolve => {
                    SYSTEM.fs.mkdir(current, () => resolve());
                });
            }
        }

        // === 挂载本地文件夹功能 (统一文件系统架构) ===
        const MOUNTED_FOLDERS_DB = 'MountedFoldersDB';
        const MOUNTED_FOLDERS_STORE = 'folders';
        let mountedFoldersDB = null;

        async function initMountedFoldersDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(MOUNTED_FOLDERS_DB, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { mountedFoldersDB = request.result; resolve(mountedFoldersDB); };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(MOUNTED_FOLDERS_STORE)) {
                        db.createObjectStore(MOUNTED_FOLDERS_STORE, { keyPath: 'id' });
                    }
                };
            });
        }

        async function saveMountedFolder(folderId, folderName, dirHandle, mountPath) {
            if (!mountedFoldersDB) await initMountedFoldersDB();
            return new Promise((resolve, reject) => {
                const tx = mountedFoldersDB.transaction([MOUNTED_FOLDERS_STORE], 'readwrite');
                const store = tx.objectStore(MOUNTED_FOLDERS_STORE);
                store.put({ id: folderId, name: folderName, handle: dirHandle, mountPath: mountPath });
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function loadMountedFolders() {
            if (!mountedFoldersDB) await initMountedFoldersDB();
            return new Promise((resolve, reject) => {
                const tx = mountedFoldersDB.transaction([MOUNTED_FOLDERS_STORE], 'readonly');
                const store = tx.objectStore(MOUNTED_FOLDERS_STORE);
                const request = store.getAll();
                request.onsuccess = async () => {
                    const folders = request.result;
                    for (const folder of folders) {
                        try {
                            if (folder.handle && typeof folder.handle.queryPermission === 'function') {
                                const perm = await folder.handle.queryPermission({ mode: 'readwrite' });
                                if (perm === 'granted') {
                                    const mountPath = folder.mountPath || ('/mnt/local/' + folder.name);
                                    await mountFSA(folder.handle, mountPath, folder.id, folder.name);
                                } else {
                                    const reqPerm = await folder.handle.requestPermission({ mode: 'readwrite' });
                                    if (reqPerm === 'granted') {
                                        const mountPath = folder.mountPath || ('/mnt/local/' + folder.name);
                                        await mountFSA(folder.handle, mountPath, folder.id, folder.name);
                                    } else {
                                        SYSTEM.mountedFolders[folder.id] = { handle: folder.handle, name: folder.name, id: folder.id, mountPath: folder.mountPath || ('/mnt/local/' + folder.name), disconnected: true };
                                    }
                                }
                            } else {
                                SYSTEM.mountedFolders[folder.id] = { handle: folder.handle, name: folder.name, id: folder.id, mountPath: folder.mountPath || ('/mnt/local/' + folder.name), disconnected: true };
                            }
                        } catch (e) {
                            SYSTEM.mountedFolders[folder.id] = { handle: folder.handle, name: folder.name, id: folder.id, mountPath: folder.mountPath || ('/mnt/local/' + folder.name), disconnected: true };
                        }
                    }
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function removeMountedFolder(folderId) {
            if (!mountedFoldersDB) await initMountedFoldersDB();
            return new Promise((resolve, reject) => {
                const tx = mountedFoldersDB.transaction([MOUNTED_FOLDERS_STORE], 'readwrite');
                tx.objectStore(MOUNTED_FOLDERS_STORE).delete(folderId);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // 将 FileSystemDirectoryHandle 挂载到 BrowserFS MountableFileSystem
        function mountFSA(dirHandle, mountPath, folderId, folderName) {
            return new Promise((resolve, reject) => {
                FileSystemAccessFS.Create({ handle: dirHandle }, (err, fsa) => {
                    if (err || !fsa) { reject(err || new Error('Failed to create FSA')); return; }
                    SYSTEM.rootFs.mount(mountPath, fsa);
                    SYSTEM.mountedFolders[folderId] = { handle: dirHandle, name: folderName, id: folderId, mountPath: mountPath };
                    // 兼容旧代码
                    SYSTEM.localFolders[folderId] = { handle: dirHandle, name: folderName, id: folderId, mountPath: mountPath };
                    resolve();
                });
            });
        }

        async function mountLocalFolder() {
            if (!('showDirectoryPicker' in window)) {
                Notify.error('不支持', '当前浏览器不支持 File System Access API');
                return;
            }
            try {
                const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite', id: 'JISHENGMountPicker' });
                const folderName = dirHandle.name;
                const folderId = 'local-folder-' + Date.now();
                const mountPath = '/mnt/local/' + folderName;
                
                await mountFSA(dirHandle, mountPath, folderId, folderName);
                await saveMountedFolder(folderId, folderName, dirHandle, mountPath);
                
                refreshDesktop();
                Notify.success('挂载成功', `已挂载: ${folderName}`);
            } catch (e) {
                if (e.name !== 'AbortError') {
                    Notify.error('挂载失败', e.message);
                }
            }
        }

        async function openLocalFolder(folderId) {
            const folderInfo = SYSTEM.mountedFolders[folderId] || SYSTEM.localFolders[folderId];
            if (!folderInfo) {
                Notify.error('错误', '文件夹未挂载');
                return;
            }
            if (folderInfo.disconnected) {
                try {
                    if (folderInfo.handle && typeof folderInfo.handle.requestPermission === 'function') {
                        const perm = await folderInfo.handle.requestPermission({ mode: 'readwrite' });
                        if (perm === 'granted') {
                            const mountPath = folderInfo.mountPath || ('/mnt/local/' + folderInfo.name);
                            await mountFSA(folderInfo.handle, mountPath, folderInfo.id, folderInfo.name);
                            delete SYSTEM.mountedFolders[folderInfo.id].disconnected;
                            Notify.success('重新挂载成功', `已挂载: ${folderInfo.name}`);
                            refreshDesktop();
                            const pathParts = mountPath.split('/');
                            const fName = pathParts[pathParts.length - 1];
                            const parentPath = pathParts.slice(0, -1).join('/') || '/';
                            openFolderWindow(fName, parentPath);
                            return;
                        }
                    }
                } catch (e) {
                    console.error('重新挂载失败:', e);
                }
                Notify.warning('需要重新挂载', '请右键点击该文件夹选择重新挂载');
                return;
            }
            const mountPath = folderInfo.mountPath || ('/mnt/local/' + folderInfo.name);
            const pathParts = mountPath.split('/');
            const folderName = pathParts[pathParts.length - 1];
            const parentPath = pathParts.slice(0, -1).join('/') || '/';
            openFolderWindow(folderName, parentPath);
        }

        function getFileExtension(filename) {

        // 渲染本地文件夹内容
                // 更新本地文件夹面包屑导航
                // 本地文件夹面包屑导航跳转
                // 获取父目录 handle（辅助函数）
                // 本地文件夹项双击处理
                // 从本地 handle 打开文件（保留原有文件打开逻辑）
                // 本地文件夹项右键菜单（增强版 UI）
                // 从窗口导出本地文件夹单个文件

                // === 本地文件夹拖拽逻辑 ===
                // 导出本地文件夹文件到桌面
                // 递归导出目录
        async function exportDirectoryRecursive(dirHandle, destPath) {
            return new Promise((resolve, reject) => {
                SYSTEM.fs.mkdir(destPath, async (err) => {
                    if (err && err.code !== 'EEXIST') {
                        reject(err);
                        return;
                    }
                    
                    try {
                        for await (const [name, handle] of dirHandle.entries()) {
                            const itemPath = destPath + '/' + name;
                            
                            if (handle.kind === 'file') {
                                const file = await handle.getFile();
                                const content = await file.arrayBuffer();
                                await new Promise((res, rej) => {
                                    SYSTEM.fs.writeFile(itemPath, Buffer.from(content), (e) => {
                                        if (e) rej(e);
                                        else res();
                                    });
                                });
                            } else {
                                await exportDirectoryRecursive(handle, itemPath);
                            }
                        }
                        resolve();
                    } catch (e) {
                        reject(e);
                    }
                });
            });
        }

        // 导出本地文件夹文件到指定文件夹

                // 本地挂载文件夹的压缩文件 → 在网页内解压到 BrowserFS 虚拟文件系统
                async function unmountLocalFolder(folderId) {
            const info = SYSTEM.mountedFolders[folderId] || SYSTEM.localFolders[folderId];
            if (info) {
                const name = info.name;
                const mountPath = info.mountPath || ('/mnt/local/' + name);

                try {

                        SYSTEM.rootFs.umount(mountPath);

                    console.error('卸载文件系统失败:', e);

                delete SYSTEM.mountedFolders[folderId];
                delete SYSTEM.localFolders[folderId];
                
                try { await removeMountedFolder(folderId); } catch (e) { console.error('从 IndexedDB 删除失败:', e); }
                
                refreshDesktop();
                Notify.success('已卸载', `已卸载: ${name}`);
            }
        }

            const newName = prompt('请输入新名称:', oldName);
            if(!newName || newName === oldName) return;
            const oldPath = SYSTEM.desktopPath + '/' + oldName;
            const newPath = SYSTEM.desktopPath + '/' + newName;
            
            SYSTEM.fs.rename(oldPath, newPath, (err) => {
                if(err) Notify.error('重命名失败', err.message);
                else { 
                    refreshDesktop(); 
                    Notify.success('重命名成功', `已重命名为 "${newName}"`); 
                }
            });
        }

        function downloadFile(filename) {
            const filePath = SYSTEM.desktopPath + '/' + filename;
            downloadFileInternal(filePath, filename);
        }

        function downloadFolderItem(windowId, filename) {
            const contentArea = document.getElementById('folder-content-' + windowId);
            if(!contentArea) return;
            const state = SYSTEM.folderWindowStates?.[windowId];
            const folderName = state ? state.folderName : contentArea.closest('.window').querySelector('.window-title-text').innerText;
            const basePath = state ? state.currentPath : SYSTEM.desktopPath + '/' + folderName;
            const filePath = basePath + '/' + filename;
            
            downloadFileInternal(filePath, filename);
        }

        function downloadFileInternal(filePath, filename) {
            SYSTEM.fs.stat(filePath, (err, stats) => {
                if(err) {
                    return;
                }
                
                if(stats.isDirectory()) {
                    // 文件夹：打包为 zip 下载
                    const zip = new JSZip();
                    const rootFolder = zip.folder(filename);
                    addFolderToZipSync(rootFolder, filePath, () => {
                        zip.generateAsync({ type: 'blob', compression: 'DEFLATE' })
                        .then(blob => {
                            const a = document.createElement('a');
                            a.href = URL.createObjectURL(blob);
                            a.download = filename + '.zip';
                            a.click();
                            URL.revokeObjectURL(a.href);
                        });
                    });
                } else {
                    // 普通文件：直接下载
                    SYSTEM.fs.readFile(filePath, (err, data) => {
                        if(err) {
                            return;
                        }
                        const blob = new Blob([data]);
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = filename;
                        a.click();
                        URL.revokeObjectURL(a.href);
                    });
                }
            });
        }

        function downloadSelectedFiles() {
            const selectedIds = SYSTEM.selectedIcons.filter(id => id.startsWith('file-'));
            if(selectedIds.length === 0) return;
            
            const files = selectedIds.map(id => {
                const el = document.getElementById(id);
                return el ? el.dataset.filename : null;
            }).filter(f => f);
            
            if(files.length === 0) return;
            
            if(files.length === 1) {
                downloadFile(files[0]);
                return;
            }
            
            const zip = new JSZip();
            let processedCount = 0;
            
            files.forEach(filename => {
                const filePath = SYSTEM.desktopPath + '/' + filename;
                SYSTEM.fs.stat(filePath, (err, stats) => {
                    if(err) {
                        processedCount++;
                        if(processedCount === files.length) {
                            generateAndDownloadZip(zip, 'selected_files');
                        }
                        return;
                    }
                    
                    if(stats.isDirectory()) {
                        const folder = zip.folder(filename);
                        addFolderToZipSync(folder, filePath, () => {
                            processedCount++;
                            if(processedCount === files.length) {
                                generateAndDownloadZip(zip, 'selected_files');
                            }
                        });
                    } else {
                        SYSTEM.fs.readFile(filePath, (err, data) => {
                            if(!err) {
                                zip.file(filename, data);
                            }
                            processedCount++;
                            if(processedCount === files.length) {
                                generateAndDownloadZip(zip, 'selected_files');
                            }
                        });
                    }
                });
            });
        }

        function downloadSelectedFolderItems(windowId) {
            const contentArea = document.getElementById('folder-content-' + windowId);
            if(!contentArea) return;
            
            const folderName = contentArea.closest('.window').querySelector('.window-title-text').innerText;
            const basePath = SYSTEM.desktopPath + '/' + folderName;
            
            const selectedItems = Array.from(contentArea.querySelectorAll('.folder-item.selected'));
            if(selectedItems.length === 0) return;
            
            const files = selectedItems.map(item => item.dataset.filename);
            
            if(files.length === 1) {
                downloadFolderItem(windowId, files[0]);
                return;
            }
            
            const zip = new JSZip();
            let processedCount = 0;
            
            files.forEach(filename => {
                const filePath = basePath + '/' + filename;
                SYSTEM.fs.stat(filePath, (err, stats) => {
                    if(err) {
                        processedCount++;
                        if(processedCount === files.length) {
                            generateAndDownloadZip(zip, folderName + '_selected');
                        }
                        return;
                    }
                    
                    if(stats.isDirectory()) {
                        const folder = zip.folder(filename);
                        addFolderToZipSync(folder, filePath, () => {
                            processedCount++;
                            if(processedCount === files.length) {
                                generateAndDownloadZip(zip, folderName + '_selected');
                            }
                        });
                    } else {
                        SYSTEM.fs.readFile(filePath, (err, data) => {
                            if(!err) {
                                zip.file(filename, data);
                            }
                            processedCount++;
                            if(processedCount === files.length) {
                                generateAndDownloadZip(zip, folderName + '_selected');
                            }
                        });
                    }
                });
            });
        }

        function generateAndDownloadZip(zip, name) {
            zip.generateAsync({ type: 'blob', compression: 'DEFLATE' })
            .then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = name + '.zip';
                a.click();
                URL.revokeObjectURL(a.href);
                Notify.success('下载完成', `已打包 ${name}.zip`);
            });
        }

        // === 键盘快捷键支持 (复制/剪切/粘贴) ===
        document.addEventListener('keydown', e => {
            // 忽略输入框中的快捷键
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
                return;
            }
            
            const isCtrl = e.ctrlKey || e.metaKey;
            
            if (isCtrl && e.key.toLowerCase() === 'c') {
                e.preventDefault();
                handleCopy();
            } else if (isCtrl && e.key.toLowerCase() === 'x') {
                e.preventDefault();
                handleCut();
            } else if (isCtrl && e.key.toLowerCase() === 'v') {
                e.preventDefault();
                handlePaste();
            }
        });

            const activeWindow = document.querySelector('.window.focused');
            
            if (activeWindow) {

                const windowId = activeWindow.querySelector('.content-area')?.id?.replace('folder-content-', '');
                if (windowId) {
                    copySelectedFolderItems(windowId);
                }

                copySelectedDesktopItems();

            const activeWindow = document.querySelector('.window.focused');
            
            if (activeWindow) {

                if (windowId) {

        // 这里的函数必须定义在全局，否则 HTML onclick 找不到
        window.closeWin = function(id) {
            const w = document.getElementById('win-' + id);
            if(w) {
                // 调用清理函数（如果存在）
                if(w.cleanup) {
                    w.cleanup();
                }
                
                // 调用onDestroy回调（如果存在）
                const winObj = SYSTEM.windows.find(win => win.id === id);
                if(winObj && winObj.onDestroy) {
                    winObj.onDestroy();
                }
                
                w.style.transition = 'transform 0.2s, opacity 0.2s';
                w.style.transform = 'scale(0.9)';
                w.style.opacity = '0';

            SYSTEM.windows = SYSTEM.windows.filter(win => win.id !== id);
            setTimeout(updateTaskbarRunningItems, 30);

        window.minimizeWin = function(id) {
            const win = SYSTEM.windows.find(w => w.id === id);
            if(win) {
                win.minimized = true;
                win.element.classList.add('minimized');
            }

        };

        window.maximizeWin = function(id) {
            const win = SYSTEM.windows.find(w => w.id === id);
            if(!win) return;
            // 手机端禁止取消最大化
            if (window.innerWidth <= 768) return;
            
            win.maximized = !win.maximized;
            win.element.classList.toggle('maximized', win.maximized);
            
            if(!win.maximized && win.savedPos) {
                win.element.style.cssText = win.savedPos;
            } else if(win.maximized) {
                win.savedPos = win.element.style.cssText;
            }
        };

        window.focusWin = function(id) {
            SYSTEM.windows.forEach(w => w.element.classList.remove('focused'));
            const win = SYSTEM.windows.find(w => w.id === id);
            if(win) {
                win.element.classList.add('focused');
                win.element.style.zIndex = ++SYSTEM.idCounter + 100;
                if(win.minimized) {
                    win.minimized = false;
                    win.element.classList.remove('minimized');
                }
            }
            setTimeout(updateTaskbarRunningItems, 30);

        // === 修复后的拖拽逻辑 (完美支持手机/平板) ===
        function makeDraggable(el, id) {
            const titleBar = el.querySelector('.title-bar');
            let isDragging = false, startX, startY, startLeft, startTop;
            let dragPointerId = null;
            
            // 获取触摸或鼠标坐标
            const getCoords = (e) => {
                if (e.touches && e.touches.length > 0) {
                    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
                return { x: e.clientX, y: e.clientY };
            };

            const start = (e) => {
                // 如果点的是按钮，直接返回，不触发拖拽
                if(e.target.closest('.win-btn')) return;
                
                // 获取当前窗口对象
                const win = SYSTEM.windows.find(w => w.id === id);
                
                // 如果是手机模式(强制全屏) 或 窗口已最大化，则禁止拖动
                // 注意：这里阈值改为 600，与 CSS 保持一致，平板(>600)允许拖动
                if((win && win.maximized) || window.innerWidth <= 600) return;
                
                // 处理 Pointer Events
                if (e.pointerId !== undefined) {
                    if (dragPointerId === null) {
                        dragPointerId = e.pointerId;
                        e.target.setPointerCapture(e.pointerId);
                    } else {
                        return; // 已经有活动的拖拽指针
                    }
                }
                
                isDragging = true;
                const p = getCoords(e);
                startX = p.x; startY = p.y;
                startLeft = el.offsetLeft; startTop = el.offsetTop;
                
                focusWin(id);
            };
            
            const move = (e) => {
                if(!isDragging) return;
                
                // 验证指针ID
                if (e.pointerId !== undefined && e.pointerId !== dragPointerId) {
                    return;
                }
                
                // 只有在真正拖拽时，才阻止屏幕滚动
                if(e.cancelable) e.preventDefault();
                
                const p = getCoords(e);
                const dx = p.x - startX; 
                const dy = p.y - startY;
                
                let newLeft = startLeft + dx;
                let newTop = startTop + dy;
                
                // 屏幕边界限制：防止窗口被拖出屏幕
                const screenW = window.innerWidth;
                const screenH = window.innerHeight;
                const taskbarH = 48;
                const winW = el.offsetWidth;
                const winH = el.offsetHeight;
                
                // 上边界
                newTop = Math.max(0, newTop);
                // 左边界（允许窗口大部分出去，但保留一部分可抓取）
                newLeft = Math.max(-winW + 100, newLeft);
                // 右边界
                newLeft = Math.min(screenW - 100, newLeft);
                // 下边界（不超过任务栏）
                newTop = Math.min(screenH - taskbarH - 30, newTop);
                
                el.style.left = newLeft + 'px';
                el.style.top = newTop + 'px';
            };
            
            const end = (e) => {
                if (!isDragging) return;
                
                // 验证指针ID
                if (e.pointerId !== undefined && e.pointerId !== dragPointerId) {
                    return;
                }
                
                isDragging = false;
                dragPointerId = null;
            };
            
            // 绑定事件 (仅绑定在标题栏上，不影响内容区域的点击)
            
            // 使用 Pointer Events API（统一处理鼠标和触摸）
            if (window.PointerEvent) {
                titleBar.addEventListener('pointerdown', start, { passive: false });
                titleBar.addEventListener('pointermove', move, { passive: false });
                titleBar.addEventListener('pointerup', end);
                titleBar.addEventListener('pointercancel', end);
                titleBar.addEventListener('pointerleave', end);
            } else {
                // 备用：鼠标事件
                titleBar.addEventListener('mousedown', start);
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', end);
                
                // 备用：触摸事件
                titleBar.addEventListener('touchstart', start, { passive: false });
                document.addEventListener('touchmove', move, { passive: false });
                document.addEventListener('touchend', end);
                document.addEventListener('touchcancel', end);
            }
            
            // 点击窗口任意位置聚焦（但不触发拖拽）
            el.addEventListener('mousedown', (e) => {
                // 如果点击的是画板区域，不要聚焦窗口（让画板处理事件）
                if (e.target.closest('.paint-app')) return;
                focusWin(id);
            });
            el.addEventListener('touchstart', (e) => {
                if (e.target.closest('.paint-app')) return;
                focusWin(id);
            }, { passive: true });
            el.addEventListener('pointerdown', (e) => {
                if (e.target.closest('.paint-app')) return;
                focusWin(id);
            }, { passive: true });
        }

        function makeResizable(el) {
            // 手机端禁用调整大小
            if(window.innerWidth <= 768) return;

            const MIN_W = 400, MIN_H = 300;

            const handles = el.querySelectorAll('.resize-handle');
            handles.forEach(h => {
                let isResizing = false, startX, startY, startW, startH, startL, startT, dir;
                h.onmousedown = e => {
                    isResizing = true; startX = e.clientX; startY = e.clientY;
                    startW = el.offsetWidth; startH = el.offsetHeight;
                    startL = el.offsetLeft; startT = el.offsetTop;
                    dir = h.className.split(' ')[1];
                    e.preventDefault();
                };
                document.addEventListener('mousemove', e => {
                    if(!isResizing) return;
                    const dx = e.clientX - startX, dy = e.clientY - startY;

                    // 计算期望的新尺寸
                    let newW = startW, newH = startH, newL = startL, newT = startT;

                    if(dir.includes('e')) newW = startW + dx;
                    if(dir.includes('s')) newH = startH + dy;
                    if(dir.includes('w')) { newW = startW - dx; newL = startL + dx; }
                    if(dir.includes('n')) { newH = startH - dy; newT = startT + dy; }

                    // 限制最小尺寸
                    if(newW < MIN_W) {
                        if(dir.includes('w')) newL = startL + (startW - MIN_W);
                        newW = MIN_W;
                    }
                    if(newH < MIN_H) {
                        if(dir.includes('n')) newT = startT + (startH - MIN_H);
                        newH = MIN_H;
                    }

                    // 屏幕边界限制：防止窗口被拖出屏幕
                    const screenW = window.innerWidth;
                    const screenH = window.innerHeight;
                    // 上边界：窗口顶部不能超出屏幕顶部
                    if(newT < 0) {
                        if(dir.includes('n')) newH = startH + startT; // 保持底部不动，收缩高度
                        newT = 0;
                    }
                    // 左边界：窗口左边不能超出屏幕左边
                    if(newL < 0) {
                        if(dir.includes('w')) newW = startW + startL; // 保持右边不动，收缩宽度
                        newL = 0;
                    }
                    // 下边界：窗口底部不能超出屏幕底部（留出任务栏空间）
                    const taskbarH = 48;
                    if(newT + newH > screenH - taskbarH) {
                        if(dir.includes('s')) newH = screenH - taskbarH - newT;
                    }
                    // 右边界：窗口右边不能超出屏幕右边
                    if(newL + newW > screenW) {
                        if(dir.includes('e')) newW = screenW - newL;
                    }
                    // 再次确保最小尺寸（边界限制后可能被破坏）
                    if(newW < MIN_W) newW = MIN_W;
                    if(newH < MIN_H) newH = MIN_H;

                    el.style.width = newW + 'px';
                    el.style.height = newH + 'px';
                    if(dir.includes('w')) el.style.left = newL + 'px';
                    if(dir.includes('n')) el.style.top = newT + 'px';
                });
                document.addEventListener('mouseup', () => { isResizing = false; });
            });
        }
