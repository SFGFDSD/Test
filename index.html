                    const refreshBtn = document.getElementById('nav-refresh-' + winId);
                    const backBtn = document.getElementById('nav-back-' + winId);
                    const fwdBtn = document.getElementById('nav-forward-' + winId);
                    
                    // 历史栈数据
                    let historyStack = [startUrl];
                    let currentIndex = 0;
                    
                    // 修复：UI更新不再设置 disabled 属性，而是仅改变透明度视觉效果
                    const updateUI = () => {
                        // 如果没有后退历史，降低透明度，但不禁用点击
                        backBtn.style.opacity = currentIndex === 0 ? '0.3' : '1';
                        backBtn.style.cursor = currentIndex === 0 ? 'default' : 'pointer'; // 没历史时显示普通鼠标，有历史显示手型
                        
                        // 如果没有前进历史，降低透明度
                        fwdBtn.style.opacity = currentIndex === historyStack.length - 1 ? '0.3' : '1';
                        fwdBtn.style.cursor = currentIndex === historyStack.length - 1 ? 'default' : 'pointer';
                        
                        urlInput.value = historyStack[currentIndex];
                    };

                    const loadFrame = (url) => {
                        loading.classList.add('active');
                        frame.src = url;
                    };

                    const navigate = () => {
                        let url = urlInput.value.trim();
                        if(!url.startsWith('http') && !url.startsWith('blob:') && !url.startsWith('file:')) {
                            url = 'https://' + url;
                        }
                        
                        if (url !== historyStack[currentIndex]) {
                            historyStack = historyStack.slice(0, currentIndex + 1);
                            historyStack.push(url);
                            currentIndex++;
                        }
                        
                        updateUI();
                        loadFrame(url);
                    };
                    
                    urlInput.onkeydown = e => { if(e.key === 'Enter') navigate(); };
                    goBtn.onclick = navigate;
                    
                    refreshBtn.onclick = () => { 
                        loading.classList.add('active'); 
                        // 强制刷新 iframe
                        const currentUrl = frame.src;
                        frame.src = 'about:blank';
                        setTimeout(() => { frame.src = currentUrl; }, 10);
                    };
                    
                    frame.onload = () => loading.classList.remove('active');

                    // 后退逻辑：点击不再被阻挡，内部判断是否有动作
                    backBtn.onclick = () => { 
                        if (currentIndex > 0) {
                            currentIndex--;
                            const prevUrl = historyStack[currentIndex];
                            loadFrame(prevUrl);
                            updateUI();
                        }
                    };

                    // 前进逻辑
                    fwdBtn.onclick = () => { 
                        if (currentIndex < historyStack.length - 1) {
                            currentIndex++;
                            const nextUrl = historyStack[currentIndex];
                            loadFrame(nextUrl);
                            updateUI();
                        }
                    };
                    
                    updateUI();
                }
            });
        }

        // CSV 表格查看器
        function openCSVViewer(content = '', filename = '未命名.csv') {
            const winId = SYSTEM.idCounter + 1;
            
            // 解析 CSV 数据
            function parseCSV(text) {
                const rows = [];
                const lines = text.trim().split('\n');
                for (const line of lines) {
                    if (!line.trim()) continue;
                    const row = [];
                    let cell = '';
                    let inQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        const nextChar = line[i + 1];
                        if (char === '"') {
                            if (inQuotes && nextChar === '"') {
                                cell += '"';
                                i++;
                            } else {
                                inQuotes = !inQuotes;
                            }
                        } else if (char === ',' && !inQuotes) {
                            row.push(cell.trim());
                            cell = '';
                        } else {
                            cell += char;
                        }
                    }
                    row.push(cell.trim());
                    rows.push(row);
                }
                return rows;
            }
            
            const rows = parseCSV(content);
            const colCount = rows.length > 0 ? Math.max(...rows.map(r => r.length)) : 0;
            
            // 生成表格 HTML
            let tableHtml = '<table class="csv-table"><thead><tr>';
            for (let i = 0; i < colCount; i++) {
                tableHtml += `<th>列 ${i + 1}</th>`;
            }
            tableHtml += '</tr></thead><tbody>';
            
            for (const row of rows) {
                tableHtml += '<tr>';
                for (let i = 0; i < colCount; i++) {
                    const cell = row[i] || '';
                    tableHtml += `<td>${cell.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</td>`;
                }
                tableHtml += '</tr>';
            }
            tableHtml += '</tbody></table>';
            
            const id = createWindow({
                title: 'CSV 表格 - ' + filename,
                iconHtml: '<svg class="icon-svg sm" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M9 2v20 M4 9h16 M4 15h16" /></svg>',
                width: 800, height: 600,
                content: `
                    <div class="csv-toolbar">
                        <button class="csv-btn" id="csv-edit-${winId}">编辑源码</button>
                        <button class="csv-btn" id="csv-save-${winId}">保存</button>
                        <span class="csv-info">${rows.length} 行 × ${colCount} 列</span>
                    </div>
                    <div class="csv-container" id="csv-container-${winId}">
                        ${tableHtml}
                    </div>
                    <textarea class="csv-editor" id="csv-editor-${winId}" style="display:none">${content}</textarea>
                `,
                onInit: (w, winId) => {
                    let isEditMode = false;
                    const container = document.getElementById('csv-container-' + winId);
                    const editor = document.getElementById('csv-editor-' + winId);
                    
                    document.getElementById('csv-edit-' + winId).onclick = () => {
                        isEditMode = !isEditMode;
                        if (isEditMode) {
                            container.style.display = 'none';
                            editor.style.display = 'block';
                            document.getElementById('csv-edit-' + winId).innerText = '查看表格';
                        } else {
                            // 重新解析并显示
                            const newContent = editor.value;
                            const newRows = parseCSV(newContent);
                            const newColCount = newRows.length > 0 ? Math.max(...newRows.map(r => r.length)) : 0;
                            
                            let newTableHtml = '<table class="csv-table"><thead><tr>';
                            for (let i = 0; i < newColCount; i++) {
                                newTableHtml += `<th>列 ${i + 1}</th>`;
                            }
                            newTableHtml += '</tr></thead><tbody>';
                            
                            for (const row of newRows) {
                                newTableHtml += '<tr>';
                                for (let i = 0; i < newColCount; i++) {
                                    const cell = row[i] || '';
                                    newTableHtml += `<td>${cell.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</td>`;
                                }
                                newTableHtml += '</tr>';
                            }
                            newTableHtml += '</tbody></table>';
                            
                            container.innerHTML = newTableHtml;
                            container.style.display = 'block';
                            editor.style.display = 'none';
                            document.getElementById('csv-edit-' + winId).innerText = '编辑源码';
                            document.querySelector('.csv-info').innerText = `${newRows.length} 行 × ${newColCount} 列`;
                        }
                    };
                    
                    document.getElementById('csv-save-' + winId).onclick = () => {
                        const saveContent = isEditMode ? editor.value : editor.value;
                        const path = SYSTEM.desktopPath + '/' + filename;
                        SYSTEM.fs.writeFile(path, saveContent, 'utf8', err => {
                            if (err) Notify.error('保存失败', err.message);
                            else { refreshDesktop(); Notify.success('保存成功', `文件已保存为 "${filename}"`); }
                        });
                    };
                }
            });
        }

        function openCalculator() {
            const id = createWindow({
                title: '计算器',
                iconHtml: '<svg class="icon-svg sm" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/></svg>',
                width: 320, height: 450,
                content: `
                    <div class="calculator" style="background:#1a1a24">
                        <div class="calc-display">
                            <div class="expression" id="calc-expr-${SYSTEM.idCounter+1}"></div>
                            <div class="result" id="calc-result-${SYSTEM.idCounter+1}">0</div>
                        </div>
                        <div class="calc-buttons" id="calc-btns-${SYSTEM.idCounter+1}"></div>
                    </div>
                `,
                onInit: (w, winId) => {
                    const btnsContainer = document.getElementById('calc-btns-' + winId);
                    const expr = document.getElementById('calc-expr-' + winId);
                    const result = document.getElementById('calc-result-' + winId);
                    
                    const buttons = ['C','±','%','÷','7','8','9','×','4','5','6','-','1','2','3','+','0','.','⌫','='];
                    
                    let current = '0', expression = '', lastOp = '';
                    
                    buttons.forEach(b => {
                        const btn = document.createElement('button');
                        btn.className = 'calc-btn';
                        btn.innerText = b;
                        
                        if(['÷','×','-','+'].includes(b)) btn.classList.add('operator');
                        if(b === '=') btn.classList.add('equals');
                        if(b === 'C') btn.classList.add('clear');
                        
                        btn.onclick = () => {
                            if(b >= '0' && b <= '9') {
                                current = current === '0' ? b : current + b;
                            } else if(b === '.') {
                                if(!current.includes('.')) current += '.';
                            } else if(b === 'C') {
                                current = '0'; expression = '';
                            } else if(b === '⌫') {
                                current = current.length > 1 ? current.slice(0,-1) : '0';
                            } else if(b === '±') {
                                current = current.startsWith('-') ? current.slice(1) : '-' + current;
                            } else if(b === '%') {
                                current = String(parseFloat(current) / 100);
                            } else if(['÷','×','-','+'].includes(b)) {
                                expression += current + ' ' + b + ' ';
                                current = '0';
                            } else if(b === '=') {
                                expression += current;
                                try {
                                    let evalExpr = expression.replace(/×/g,'*').replace(/÷/g,'/');
                                    current = String(eval(evalExpr));
                                    if(current === 'Infinity' || current === 'NaN') current = 'Error';
                                } catch { current = 'Error'; }
                                expression = '';
                            }
                            
                            result.innerText = current;
                            expr.innerText = expression;
                        };
                        
                        btnsContainer.appendChild(btn);
                    });
                }
            });
        }

        function openPaint() {
            const id = createWindow({
                title: '画板',
                iconHtml: '<svg class="icon-svg sm" viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/></svg>',
                width: 800, height: 550,

                    <div class="paint-app">

                            <div class="paint-tool-group">
                                <button class="paint-btn active" id="paint-brush-${SYSTEM.idCounter+1}" title="画笔">
                                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
                                </button>
                                <button class="paint-btn" id="paint-eraser-${SYSTEM.idCounter+1}" title="橡皮擦">
                                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
                                </button>
                            </div>
                            <div class="paint-tool-group">
                                <label>颜色</label>
                                <input type="color" class="color-picker" id="paint-color-${SYSTEM.idCounter+1}" value="#000000">
                            </div>
                            <div class="paint-tool-group">
                                <label>大小</label>
                                <input type="range" class="brush-size" id="paint-size-${SYSTEM.idCounter+1}" min="1" max="50" value="5">
                            </div>
                            <div class="paint-tool-group">
                                <button class="paint-btn" id="paint-clear-${SYSTEM.idCounter+1}" title="清空">
                                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                </button>
                                <button class="paint-btn" id="paint-save-${SYSTEM.idCounter+1}" title="保存">
                                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="paint-canvas-container" id="paint-container-${SYSTEM.idCounter+1}" style="background:#ffffff; overflow:hidden;">
                            <canvas class="paint-canvas" id="paint-canvas-${SYSTEM.idCounter+1}"></canvas>
                        </div>
                    </div>
                `,
                onInit: (w, winId) => {
                    const container = document.getElementById('paint-container-' + winId);
                    const canvas = document.getElementById('paint-canvas-' + winId);
                    const ctx = canvas.getContext('2d', { alpha: false });

                    // 虚拟画布 - 存储完整图像
                    const vCanvas = document.createElement('canvas');
                    const vCtx = vCanvas.getContext('2d', { alpha: false });
                    
                    // 设置缓冲区大小
                    const bufferW = Math.max(window.screen.width, 1920);
                    const bufferH = Math.max(window.screen.height, 1080);
                    vCanvas.width = bufferW;
                    vCanvas.height = bufferH;
                    
                    // 初始化白色背景
                    vCtx.fillStyle = '#ffffff';
                    vCtx.fillRect(0, 0, bufferW, bufferH);

                    // 同步画布尺寸并绘制
                    const syncCanvas = () => {
                        canvas.width = container.clientWidth;
                        canvas.height = container.clientHeight;
                        ctx.drawImage(vCanvas, 0, 0);
                    };

                    // 监听容器尺寸变化
                    const ro = new ResizeObserver(() => syncCanvas());
                    ro.observe(container);

                    // 绘制状态
                    let isDrawing = false;
                    let lastX = 0, lastY = 0;
                    let tool = 'brush';
                    let activePointerId = null;
                    
                    const colorPicker = document.getElementById('paint-color-' + winId);
                    const sizePicker = document.getElementById('paint-size-' + winId);

                    // 绘制函数
                    const draw = (x1, y1, x2, y2) => {
                        const color = tool === 'eraser' ? '#ffffff' : colorPicker.value;
                        const size = parseInt(sizePicker.value) || 5;

                        [ctx, vCtx].forEach(c => {
                            c.beginPath();
                            c.strokeStyle = color;
                            c.lineWidth = size;
                            c.lineCap = 'round';
                            c.lineJoin = 'round';
                            c.moveTo(x1, y1);
                            c.lineTo(x2, y2);
                            c.stroke();
                        });
                    };

                    // 获取坐标（支持鼠标和触摸）
                    const getCoords = (e) => {
                        const rect = canvas.getBoundingClientRect();
                        let clientX, clientY;
                        
                        if (e.touches && e.touches.length > 0) {
                            clientX = e.touches[0].clientX;
                            clientY = e.touches[0].clientY;
                        } else if (e.changedTouches && e.changedTouches.length > 0) {
                            clientX = e.changedTouches[0].clientX;
                            clientY = e.changedTouches[0].clientY;
                        } else {
                            clientX = e.clientX;
                            clientY = e.clientY;
                        }
                        
                        return {
                            x: clientX - rect.left,
                            y: clientY - rect.top
                        };
                    };

                    // 开始绘制
                    const startDrawing = (e) => {
                        // 防止默认行为（滚动、缩放等）
                        if (e.cancelable) e.preventDefault();
                        
                        // 处理多点触控 - 只响应第一个触点
                        if (e.pointerId !== undefined) {
                            if (activePointerId === null) {
                                activePointerId = e.pointerId;
                            } else if (activePointerId !== e.pointerId) {
                                return; // 忽略其他触点
                            }
                        }
                        
                        isDrawing = true;
                        const coords = getCoords(e);
                        lastX = coords.x;
                        lastY = coords.y;
                    };

                    // 绘制中
                    const drawMove = (e) => {
                        if (!isDrawing) return;
                        
                        // 防止默认行为
                        if (e.cancelable) e.preventDefault();
                        
                        // 验证指针ID
                        if (e.pointerId !== undefined && e.pointerId !== activePointerId) {
                            return;
                        }
                        
                        const coords = getCoords(e);
                        const curX = coords.x;
                        const curY = coords.y;
                        
                        draw(lastX, lastY, curX, curY);
                        
                        lastX = curX;
                        lastY = curY;
                    };

                    // 结束绘制
                    const endDrawing = (e) => {
                        if (!isDrawing) return;
                        
                        // 验证指针ID
                        if (e.pointerId !== undefined && e.pointerId !== activePointerId) {
                            return;
                        }
                        
                        isDrawing = false;
                        activePointerId = null;
                    };

                    // 使用 Pointer Events API（统一处理鼠标和触摸）
                    canvas.addEventListener('pointerdown', startDrawing, { passive: false });
                    canvas.addEventListener('pointermove', drawMove, { passive: false });
                    canvas.addEventListener('pointerup', endDrawing);
                    canvas.addEventListener('pointercancel', endDrawing);
                    canvas.addEventListener('pointerleave', endDrawing);

                    // 备用：鼠标事件（兼容旧浏览器）
                    canvas.addEventListener('mousedown', (e) => {
                        if (!window.PointerEvent) startDrawing(e);
                    });
                    canvas.addEventListener('mousemove', (e) => {
                        if (!window.PointerEvent) drawMove(e);
                    });
                    canvas.addEventListener('mouseup', (e) => {
                        if (!window.PointerEvent) endDrawing(e);
                    });
                    canvas.addEventListener('mouseleave', (e) => {
                        if (!window.PointerEvent) endDrawing(e);
                    });

                    // 备用：触摸事件（兼容旧浏览器）
                    canvas.addEventListener('touchstart', (e) => {
                        if (!window.PointerEvent) startDrawing(e);
                    }, { passive: false });
                    canvas.addEventListener('touchmove', (e) => {
                        if (!window.PointerEvent) drawMove(e);
                    }, { passive: false });
                    canvas.addEventListener('touchend', (e) => {
                        if (!window.PointerEvent) endDrawing(e);
                    });
                    canvas.addEventListener('touchcancel', (e) => {
                        if (!window.PointerEvent) endDrawing(e);
                    });

                    // 工具按钮事件
                    const brushBtn = document.getElementById('paint-brush-' + winId);
                    const eraserBtn = document.getElementById('paint-eraser-' + winId);
                    
                    brushBtn.onclick = function() {
                        tool = 'brush';
                        this.classList.add('active');
                        eraserBtn.classList.remove('active');
                    };
                    
                    eraserBtn.onclick = function() {
                        tool = 'eraser';
                        this.classList.add('active');
                        brushBtn.classList.remove('active');
                    };
                    
                    // 清空画布
                    document.getElementById('paint-clear-' + winId).onclick = () => {
                        if(!confirm("确定清空画布吗？")) return;
                        vCtx.fillStyle = '#ffffff';
                        vCtx.fillRect(0, 0, vCanvas.width, vCanvas.height);
                        syncCanvas();
                    };
                    
                    // 保存图片
                    document.getElementById('paint-save-' + winId).onclick = () => {
                        const name = prompt('请输入文件名:', '画作.png');
                        if(!name) return;
                        
                        const saveCanvas = document.createElement('canvas');
                        saveCanvas.width = canvas.width;
                        saveCanvas.height = canvas.height;
                        saveCanvas.getContext('2d').drawImage(vCanvas, 0, 0, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
                        
                        saveCanvas.toBlob(blob => {
                            const reader = new FileReader();
                            reader.onload = () => {
                                const buffer = SYSTEM.Buffer.from(reader.result);
                                const path = SYSTEM.desktopPath + '/' + (name.endsWith('.png') ? name : name + '.png');
                                SYSTEM.fs.writeFile(path, buffer, err => {
                                    if(err) Notify.error('保存失败', err.message);
                                    else { refreshDesktop(); Notify.success('保存成功', '已保存当前可见区域'); }
                                });
                            };
                            reader.readAsArrayBuffer(blob);
                        }, 'image/png');
                    };

                    // 初始同步
                    syncCanvas();

                    // 清理
                    const originalClose = window.closeWin;
                    window.closeWin = function(closeId) {
                        if(closeId === winId) {
                            ro.disconnect();
                            canvas.removeEventListener('pointerdown', startDrawing);
                            canvas.removeEventListener('pointermove', drawMove);
                            canvas.removeEventListener('pointerup', endDrawing);
                            canvas.removeEventListener('pointercancel', endDrawing);
                            canvas.removeEventListener('pointerleave', endDrawing);
                        }
                        originalClose(closeId);
                    };
                }
            });
        }

                    iconHtml: '<svg class="icon-svg sm" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>',
                    width: 800, height: 600,
                    content: `
                        <div class="content-area dark" style="position:relative; height:100%; overflow:hidden;">
                            <div id="manga-viewer-${SYSTEM.idCounter+1}" style="overflow-y:auto; background:#000; height:100%; display:flex; flex-direction:column; align-items:center;">
                                <div id="manga-loading-${SYSTEM.idCounter+1}" style="padding:40px; color:#666;">正在加载漫画序列...</div>
                            </div>
                        </div>
                    `,
                    onInit: (w, id) => {
                        const viewer = document.getElementById(`manga-viewer-${id}`);
                        const loading = document.getElementById(`manga-loading-${id}`);
                        
                        // 使用 Promise.all 并行读取所有图片，按序插入 DOM，避免回调乱序
                        const readPromises = imageFiles.map((filename) => {
                            const fullPath = folderPath + '/' + filename;
                            return new Promise((resolve) => {
                                SYSTEM.fs.readFile(fullPath, (err, data) => {
                                    if (err) { resolve(null); return; }
                                    const blob = new Blob([data]);
                                    resolve({ filename, url: URL.createObjectURL(blob) });
                                });
                            });
                        });

                        Promise.all(readPromises).then((results) => {
                            let firstLoaded = false;
                            results.forEach((item, index) => {
                                if (!item) return; // 跳过读取失败的文件

                                const img = document.createElement('img');
                                img.src = item.url;
                                img.id = `manga-img-${id}-${index}`;
                                img.style.width = '100%';
                                img.style.maxWidth = '1000px';
                                img.style.display = 'block';
                                img.style.pointerEvents = 'none';

                                viewer.appendChild(img);

                                if (!firstLoaded) { loading.remove(); firstLoaded = true; }

                                // 如果是用户点击的那张图片，滚动到该位置
                                if (item.filename === targetFilename) {
                                    setTimeout(() => img.scrollIntoView(), 100);
                                }
                            });
                        });
                    }
                });
            });
        }

        function openV86() {

                width: 800, height: 600,
                content: `
                    <div class="v86-app">
                        <div class="v86-toolbar">
                            <input type="file" id="v86-file-${SYSTEM.idCounter+1}" accept=".img,.iso,.bin" style="display:none">
                            <button class="notepad-btn" onclick="document.getElementById('v86-file-${SYSTEM.idCounter+1}').click()">
                                <svg class="icon-svg sm" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                加载镜像
                            </button>
                            <button class="notepad-btn" id="v86-reset-${SYSTEM.idCounter+1}">
                                <svg class="icon-svg sm" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                重置
                            </button>
                            <button class="notepad-btn" id="v86-pause-${SYSTEM.idCounter+1}">
                                暂停
                            </button>
                            <span style="color:var(--text-muted);font-size:12px;margin-left:auto" id="v86-status-${SYSTEM.idCounter+1}">就绪</span>
                        </div>
                        <div class="v86-screen-container" id="v86-screen-${SYSTEM.idCounter+1}">
                            <div style="white-space: pre; font: 14px monospace; line-height: 14px; display: none;"></div>
                            <canvas style="display:none"></canvas>
                            <div id="v86-placeholder-${SYSTEM.idCounter+1}" style="color:#666;text-align:center;padding:40px">
                                <svg class="icon-svg xl" viewBox="0 0 24 24" style="color:#444;margin-bottom:16px"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                                <p>点击"加载镜像"选择 .img 或 .iso 文件启动虚拟机</p>
                                <p style="font-size:12px;color:#555;margin-top:8px">支持: 软盘镜像、CD-ROM 镜像</p>
                            </div>
                        </div>
                    </div>
                `,
                onInit: (w, id) => {
                    let emulator = null;
                    const screenContainer = document.getElementById(`v86-screen-${id}`);
                    const placeholder = document.getElementById(`v86-placeholder-${id}`);
                    const statusText = document.getElementById(`v86-status-${id}`);
                    const fileInput = document.getElementById(`v86-file-${id}`);
                    const resetBtn = document.getElementById(`v86-reset-${id}`);
                    const pauseBtn = document.getElementById(`v86-pause-${id}`);
                    const updateStatus = (msg, showNotify = false) => {
                        statusText.innerText = msg;
                        if (showNotify) {
                            Notify.info('V86', msg);
                        }
                    };

                    // 鼠标锁定功能
                    const lockMouse = async () => {
                        if (!emulator) return;
                        try {
                            await screenContainer.requestPointerLock();
                        } catch (err) {
                            console.log('鼠标锁定失败:', err);
                        }
                    };

                    const unlockMouse = () => {
                        if (document.pointerLockElement === screenContainer) {
                            document.exitPointerLock();
                        }
                    };

                    // 监听指针锁定变化
                    const onPointerLockChange = () => {
                        if (document.pointerLockElement === screenContainer) {
                            screenContainer.classList.add('locked');
                        } else {
                            screenContainer.classList.remove('locked');
                        }
                    };

                    document.addEventListener('pointerlockchange', onPointerLockChange);

                    // 点击屏幕锁定鼠标
                    screenContainer.addEventListener('click', (e) => {
                        if (emulator && document.pointerLockElement !== screenContainer) {
                            lockMouse();
                        }
                    });

                    // 清理函数
                    w.onDestroy = () => {
                        unlockMouse();
                        document.removeEventListener('pointerlockchange', onPointerLockChange);
                    };

                    const initV86 = (fileName, buffer) => {
                        placeholder.style.display = 'none';
                        
                        // 清除之前的 canvas
                        const oldCanvas = screenContainer.querySelector('canvas');
                        if (oldCanvas) oldCanvas.remove();
                        
                        // 创建新的 canvas
                        const canvas = document.createElement('canvas');
                        canvas.style.display = 'block';
                        screenContainer.appendChild(canvas);

                        const V86Constructor = window.V86Starter || window.V86;
                        if (!V86Constructor) {
                            updateStatus('V86 库未加载', true);
                            return;
                        }

                        const settings = {
                            wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/v86.wasm",
                            bios: { url: "https://cdn.jsdelivr.net/npm/v86@latest/bios/seabios.bin" },
                            vga_bios: { url: "https://cdn.jsdelivr.net/npm/v86@latest/bios/vgabios.bin" },
                            screen_container: screenContainer,
                            memory_size: 64 * 1024 * 1024,
                            vga_memory_size: 8 * 1024 * 1024,
                            autostart: true
                        };

                        if (fileName.toLowerCase().endsWith('.iso')) {
                            settings.cdrom = { buffer: buffer };
                            updateStatus('正在从 CD-ROM 启动...');
                        } else {
                            settings.fda = { buffer: buffer };
                            updateStatus('正在从软盘启动...');
                        }

                        try {
                            emulator = new V86Constructor(settings);
                            updateStatus('虚拟机运行中: ' + fileName, true);

                            emulator.add_listener("serial0-output-char", function(char) {
                                // 串口输出到控制台
                                if (char === '\n') console.log('[V86 Serial]');
                                else process.stdout?.write?.(char);
                            });

                        } catch (err) {
                            console.error(err);
                            updateStatus('启动失败: ' + err.message, true);
                            placeholder.style.display = 'block';
                        }
                    };

                    fileInput.onchange = (e) => {
                        const file = e.target.files[0];
                        if (!file) return;

                        const reader = new FileReader();
                        updateStatus('正在读取文件...');
                        
                        reader.onload = (ev) => {
                            initV86(file.name, ev.target.result);
                        };
                        reader.readAsArrayBuffer(file);
                    };

                    resetBtn.onclick = () => {
                        if (emulator) {
                            emulator.restart();
                            updateStatus('虚拟机已重置', true);
                        } else {
                            updateStatus('请先加载镜像', true);
                        }
                    };

                    pauseBtn.onclick = () => {
                        if (!emulator) {
                            updateStatus('请先加载镜像', true);
                            return;
                        }
                        if (pauseBtn.innerText === '暂停') {
                            emulator.stop();
                            pauseBtn.innerText = '继续';
                            updateStatus('虚拟机已暂停', true);
                        } else {
                            emulator.run();
                            pauseBtn.innerText = '暂停';
                            updateStatus('虚拟机继续运行', true);
                        }
                    };
                }
            });
        }

                                <div class="editor-preview-frame-wrapper">
                                    <iframe id="editor-preview-frame-${SYSTEM.idCounter+1}" sandbox="allow-scripts allow-modals allow-forms allow-same-origin allow-popups allow-top-navigation allow-popups-to-escape-sandbox"></iframe>
                                </div>
                            </div>
                        </div>
                        <div class="editor-status-bar">
                            <div class="editor-status-left">
                                <div class="editor-status-item" id="editor-status-cursor-${SYSTEM.idCounter+1}">行 1, 列 1</div>
                                <div class="editor-status-item" id="editor-status-selection-${SYSTEM.idCounter+1}"></div>
                            </div>
                            <div class="editor-status-right">
                                <div class="editor-status-item" id="editor-status-lines-${SYSTEM.idCounter+1}">0 行</div>
                                <div class="editor-status-item" id="editor-status-chars-${SYSTEM.idCounter+1}">0 字符</div>
                                <div class="editor-status-item" id="editor-status-lang-${SYSTEM.idCounter+1}">HTML</div>
                                <div class="editor-status-item">UTF-8</div>
                            </div>
                        </div>
                    </div>
                `,
                onInit: (w, id) => {
                    initCodeEditorWindow(id, initialContent, filename);
                }
            });
        }

        function initCodeEditorWindow(winId, initialContent, filename) {
            let editor = null;
            const sState = { query: '', currentIndex: -1, matches: [], markers: [], caseSensitive: false, wholeWord: false, regex: false };
            
            const textarea = document.getElementById(`editor-textarea-${winId}`);
            const previewFrame = document.getElementById(`editor-preview-frame-${winId}`);
            const previewLoading = document.getElementById(`editor-preview-loading-${winId}`);
            const searchBar = document.getElementById(`editor-search-bar-${winId}`);
            const searchInput = document.getElementById(`editor-search-input-${winId}`);
            const replaceInput = document.getElementById(`editor-replace-input-${winId}`);
            const searchCount = document.getElementById(`editor-search-count-${winId}`);
            const langSelect = document.getElementById(`editor-lang-${winId}`);
            const fileInput = document.getElementById(`editor-file-input-${winId}`);
            
            // 初始化 CodeMirror
            editor = CodeMirror.fromTextArea(textarea, {
                mode: 'htmlmixed',
                theme: 'material-darker',
                lineNumbers: true,
                lineWrapping: true,
                foldGutter: true,
                gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
                matchBrackets: true,
                autoCloseBrackets: true,
                matchTags: { bothTags: true },
                autoCloseTags: true,
                styleActiveLine: true,
                showTrailingSpace: true,
                extraKeys: {
                    'Ctrl-F': () => toggleEditorSearchBar(true),
                    'Ctrl-H': () => { toggleEditorSearchBar(true); setTimeout(() => replaceInput.focus(), 50); },
                    'Ctrl-Enter': updateEditorPreview,
                    'Ctrl-S': (e) => { e.preventDefault(); saveEditorToFile(); },
                    'Ctrl-Shift-F': formatEditorCode,
                    'F3': (e) => { e.preventDefault(); editorSearchNext(); }
                }
            });
            
            if (initialContent) {
                editor.setValue(initialContent);
            } else {
                editor.setValue('');
            }
            
            // 更新预览
            function updateEditorPreview() {
                const code = editor.getValue();
                previewLoading.classList.add('active');
                const htmlContent = code || '<html><body style="margin:0;background:#0d1117;"></body></html>';
                try {
                    const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
                    doc.open();
                    doc.write(htmlContent);
                    doc.close();
                } catch (e) {
                    previewFrame.src = URL.createObjectURL(new Blob([htmlContent], { type: 'text/html' }));
                }
                setTimeout(() => previewLoading.classList.remove('active'), 500);
            }
            
            // 格式化代码
            function formatEditorCode() {
                const code = editor.getValue();
                const lang = langSelect.value;
                let fmt = code;
                try {
                    if (lang === 'htmlmixed' || lang === 'xml') {
                        fmt = html_beautify(code, { indent_size: 2, wrap_line_length: 120, indent_inner_html: true, preserve_newlines: true, max_preserve_newlines: 2, end_with_newline: true });
                    } else if (lang === 'css') {
                        fmt = css_beautify(code, { indent_size: 2, end_with_newline: true });
                    } else if (lang === 'javascript' || lang === 'application/json') {
                        fmt = js_beautify(code, { indent_size: 2, end_with_newline: true });
                    }
                    const c = editor.getCursor();
                    editor.setValue(fmt);
                    editor.setCursor(c);
                    Notify.success('代码已格式化');
                } catch (e) {
                    Notify.error('格式化失败');
                }
            }
            
            // 搜索功能
            function toggleEditorSearchBar(show) {
                if (show) {
                    searchBar.classList.add('open');
                    searchInput.focus();
                    if (editor.getSelection()) searchInput.value = editor.getSelection();
                    performEditorSearch();
                } else {
                    searchBar.classList.remove('open');
                    clearEditorHighlights();
                    sState.query = '';
                    sState.currentIndex = -1;
                    sState.matches = [];
                    searchCount.textContent = '';
                    editor.focus();
                    editor.refresh();
                }
            }
            
            function performEditorSearch() {
                const raw = searchInput.value;
                sState.query = raw;
                clearEditorHighlights();
                sState.matches = [];
                sState.currentIndex = -1;
                if (!raw) { searchCount.textContent = ''; return; }
                
                let searchQuery;
                const cf = !sState.caseSensitive;
                if (sState.regex) {
                    try { searchQuery = new RegExp(raw, cf ? 'gi' : 'g'); } catch (e) { searchCount.textContent = '无效正则'; return; }
                } else if (sState.wholeWord) {
                    const esc = raw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    searchQuery = new RegExp('\\b' + esc + '\\b', cf ? 'gi' : 'g');
                } else {
                    searchQuery = raw;
                }
                
                const cursor = editor.getSearchCursor(searchQuery, CodeMirror.Pos(0, 0), { caseFold: cf && !sState.regex });
                while (cursor.findNext()) {
                    sState.matches.push({ from: cursor.from(), to: cursor.to() });
                    sState.markers.push(editor.markText(cursor.from(), cursor.to(), { className: 'editor-cm-search-highlight' }));
                }
                
                if (!sState.matches.length) { searchCount.textContent = '无结果'; return; }
                
                const cur = editor.getCursor();
                let nearest = 0;
                for (let i = 0; i < sState.matches.length; i++) {
                    const m = sState.matches[i];
                    if (m.from.line > cur.line || (m.from.line === cur.line && m.from.ch >= cur.ch)) { nearest = i; break; }
                    nearest = i;
                }
                goToEditorMatch(nearest);
            }
            
            function goToEditorMatch(idx) {
                if (!sState.matches.length) return;
                sState.markers.forEach(m => m.clear());
                sState.markers = [];
                sState.matches.forEach((m, i) => {
                    sState.markers.push(editor.markText(m.from, m.to, { className: i === idx ? 'editor-cm-search-current' : 'editor-cm-search-highlight' }));
                });
                sState.currentIndex = idx;
                const m = sState.matches[idx];
                editor.scrollIntoView({ from: m.from, to: m.to }, 80);
                editor.setCursor(m.to);
                searchCount.textContent = `${idx + 1} / ${sState.matches.length}`;
            }
            
            function editorSearchNext() {
                if (!sState.matches.length) { if (searchInput.value) performEditorSearch(); return; }
                goToEditorMatch((sState.currentIndex + 1) % sState.matches.length);
            }
            
            function editorSearchPrev() {
                if (!sState.matches.length) { if (searchInput.value) performEditorSearch(); return; }
                goToEditorMatch((sState.currentIndex - 1 + sState.matches.length) % sState.matches.length);
            }
            
            function clearEditorHighlights() { sState.markers.forEach(m => m.clear()); sState.markers = []; }
            
            function replaceEditorCurrent() {
                if (!sState.matches.length || sState.currentIndex < 0) return;
                const rv = replaceInput.value;
                const m = sState.matches[sState.currentIndex];
                editor.setSelection(m.from, m.to);
                editor.replaceSelection(rv);
                Notify.success('已替换 1 处');
                setTimeout(() => performEditorSearch(), 50);
            }
            
            function replaceEditorAll() {
                if (!sState.matches.length) return;
                const rv = replaceInput.value;
                const cnt = sState.matches.length;
                for (let i = sState.matches.length - 1; i >= 0; i--) {
                    const m = sState.matches[i];
                    editor.replaceRange(rv, m.from, m.to);
                }
                Notify.success(`已替换 ${cnt} 处`);
                setTimeout(() => performEditorSearch(), 50);
            }
            
            // 更新状态栏
            function updateEditorStatusBar() {
                const c = editor.getCursor();
                document.getElementById(`editor-status-cursor-${winId}`).textContent = `行 ${c.line + 1}, 列 ${c.ch + 1}`;
                document.getElementById(`editor-status-lines-${winId}`).textContent = `${editor.lineCount()} 行`;
                document.getElementById(`editor-status-chars-${winId}`).textContent = `${editor.getValue().length.toLocaleString()} 字符`;
                const sel = editor.getSelection();
                document.getElementById(`editor-status-selection-${winId}`).textContent = sel ? `已选 ${sel.length} 字符` : '';
            }
            
            // 保存到文件
            function saveEditorToFile() {
                if (!SYSTEM.mounted) {
                    Notify.error('文件系统未就绪');
                    return;
                }
                const path = SYSTEM.desktopPath + '/' + filename;
                SYSTEM.fs.writeFile(path, editor.getValue(), 'utf8', err => {
                    if (err) Notify.error('保存失败', err.message);
                    else { refreshDesktop(); Notify.success('保存成功', `文件已保存为 "${filename}"`); }
                });
            }
            
            // 导入文件
            function importEditorFile() {
                fileInput.onchange = function() {
                    const f = this.files[0];
                    if (!f) return;
                    const r = new FileReader();
                    r.onload = function(e) {
                        const ext = f.name.split('.').pop().toLowerCase();
                        const map = { 'html': 'htmlmixed', 'htm': 'htmlmixed', 'css': 'css', 'js': 'javascript', 'json': 'application/json', 'md': 'markdown', 'py': 'python', 'java': 'text/x-java', 'c': 'text/x-csrc', 'cpp': 'text/x-csrc', 'sh': 'shell', 'xml': 'xml', 'txt': 'htmlmixed' };
                        const lang = map[ext] || 'htmlmixed';
                        editor.setValue(e.target.result);
                        editor.setOption('mode', lang);
                        langSelect.value = lang;
                        const names = { 'htmlmixed': 'HTML', 'css': 'CSS', 'javascript': 'JavaScript', 'markdown': 'Markdown', 'application/json': 'JSON', 'python': 'Python', 'text/x-csrc': 'C/C++', 'text/x-java': 'Java', 'shell': 'Shell' };
                        document.getElementById(`editor-status-lang-${winId}`).textContent = names[lang] || lang;
                        Notify.success(`已导入: ${f.name}`);
                    };
                    r.readAsText(f);
                    this.value = '';
                };
                fileInput.click();
            }
            
            // 导出文件
            function exportEditorFile() {
                const code = editor.getValue();
                const extMap = { 'htmlmixed': '.html', 'css': '.css', 'javascript': '.js', 'markdown': '.md', 'application/json': '.json', 'python': '.py', 'text/x-csrc': '.c', 'text/x-java': '.java', 'shell': '.sh' };
                const lang = langSelect.value;
                const name = 'code' + (extMap[lang] || '.txt');
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([code], { type: 'text/plain;charset=utf-8' }));
                a.download = name;
                a.click();
                Notify.success(`已导出: ${name}`);
            }
            
            // 在新窗口打开
            function openEditorInNewWindow() {
                const url = URL.createObjectURL(new Blob([editor.getValue()], { type: 'text/html' }));
                window.open(url, '_blank');
                setTimeout(() => URL.revokeObjectURL(url), 10000);
            }
            
            // 初始化分割线拖拽
            function initEditorResizer() {
                const resizer = document.getElementById(`editor-resizer-${winId}`);
                const editorSection = resizer.previousElementSibling;
                const previewSection = document.getElementById(`editor-preview-section-${winId}`);
                const container = resizer.parentElement;
                
                resizer.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    const startX = e.clientX;
                    const containerW = container.offsetWidth;
                    const startEditorW = editorSection.offsetWidth;
                    const startPreviewW = previewSection.offsetWidth;
                    
                    resizer.classList.add('dragging');
                    document.body.classList.add('no-select');
                    
                    function onMove(e) {
                        const dx = e.clientX - startX;
                        const available = containerW - 5;
                        let newEditorW = startEditorW + dx;
                        let newPreviewW = startPreviewW - dx;
                        
                        const minEditor = 200;
                        const minPreview = 120;
                        if (newEditorW < minEditor) { newEditorW = minEditor; newPreviewW = available - minEditor; }
                        if (newPreviewW < minPreview) { newPreviewW = minPreview; newEditorW = available - minPreview; }
                        
                        editorSection.style.flex = 'none';
                        editorSection.style.width = newEditorW + 'px';
                        previewSection.style.width = newPreviewW + 'px';
                    }
                    
                    function onUp() {
                        resizer.classList.remove('dragging');
                        document.body.classList.remove('no-select');
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        editor.refresh();
                    }
                    
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            }
            
            // 绑定事件
            document.getElementById(`editor-run-${winId}`).onclick = () => { updateEditorPreview(); Notify.success('预览已刷新'); };
            document.getElementById(`editor-format-${winId}`).onclick = formatEditorCode;
            document.getElementById(`editor-fold-${winId}`).onclick = () => { for (let i = 0; i < editor.lineCount(); i++) editor.foldCode(CodeMirror.Pos(i, 0)); Notify.info('已折叠'); };
            document.getElementById(`editor-unfold-${winId}`).onclick = () => { for (let i = 0; i < editor.lineCount(); i++) editor.foldCode(CodeMirror.Pos(i, 0), null, 'unfold'); Notify.info('已展开'); };
            document.getElementById(`editor-undo-${winId}`).onclick = () => editor.execCommand('undo');
            document.getElementById(`editor-redo-${winId}`).onclick = () => editor.execCommand('redo');
            document.getElementById(`editor-search-${winId}`).onclick = () => toggleEditorSearchBar(true);
            document.getElementById(`editor-clear-${winId}`).onclick = () => { if (editor.getValue()) { editor.setValue(''); Notify.info('已清空'); } };
            document.getElementById(`editor-import-${winId}`).onclick = importEditorFile;
            document.getElementById(`editor-export-${winId}`).onclick = exportEditorFile;
            document.getElementById(`editor-refresh-preview-${winId}`).onclick = updateEditorPreview;
            document.getElementById(`editor-open-new-${winId}`).onclick = openEditorInNewWindow;
            
            // 搜索栏事件
            document.getElementById(`editor-search-close-${winId}`).onclick = () => toggleEditorSearchBar(false);
            document.getElementById(`editor-search-next-${winId}`).onclick = editorSearchNext;
            document.getElementById(`editor-search-prev-${winId}`).onclick = editorSearchPrev;
            document.getElementById(`editor-replace-current-${winId}`).onclick = replaceEditorCurrent;
            document.getElementById(`editor-replace-all-${winId}`).onclick = replaceEditorAll;
            
            // 搜索选项切换
            document.getElementById(`editor-btn-case-${winId}`).onclick = function() {
                sState.caseSensitive = !sState.caseSensitive;
                this.classList.toggle('active', sState.caseSensitive);
                if (sState.query) performEditorSearch();
            };
            document.getElementById(`editor-btn-word-${winId}`).onclick = function() {
                sState.wholeWord = !sState.wholeWord;
                this.classList.toggle('active', sState.wholeWord);
                if (sState.query) performEditorSearch();
            };
            document.getElementById(`editor-btn-regex-${winId}`).onclick = function() {
                sState.regex = !sState.regex;
                this.classList.toggle('active', sState.regex);
                if (sState.query) performEditorSearch();
            };
            
            // 语言切换
            langSelect.onchange = function() {
                editor.setOption('mode', this.value);
                const names = { 'htmlmixed': 'HTML', 'css': 'CSS', 'javascript': 'JavaScript', 'markdown': 'Markdown', 'application/json': 'JSON', 'python': 'Python', 'text/x-csrc': 'C/C++', 'text/x-java': 'Java', 'shell': 'Shell' };
                document.getElementById(`editor-status-lang-${winId}`).textContent = names[this.value] || this.value;
                Notify.info(`语言: ${names[this.value] || this.value}`);
            };
            
            // 搜索输入事件
            searchInput.addEventListener('input', performEditorSearch);
            searchInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); editorSearchNext(); }
                else if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); editorSearchPrev(); }
                else if (e.key === 'Escape') toggleEditorSearchBar(false);
            });
            replaceInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); replaceEditorCurrent(); }
                else if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); replaceEditorAll(); }
                else if (e.key === 'Escape') toggleEditorSearchBar(false);
            });
            
            // 编辑器事件
            editor.on('cursorActivity', updateEditorStatusBar);
            editor.on('change', () => {
                updateEditorStatusBar();
                updateEditorPreview();
            });
            
            // 初始化
            initEditorResizer();
            updateEditorStatusBar();
            updateEditorPreview();
            
            // 窗口销毁时清理
            const winEl = document.getElementById(`win-${winId}`);
            if (winEl) {
                winEl.onDestroy = () => {
                    if (editor) editor.toTextArea();
                };
            }
        }

        // ============================================
        // 1. 运行窗口任务栏条状图标管理
        // ============================================

        function updateTaskbarRunningItems() {
            const area = document.getElementById('taskbar-running-area');
            if (!area) return;
            
            const existingIds = new Set();
            
            // 更新/添加
            SYSTEM.windows.forEach(w => {
                existingIds.add(w.id);
                let item = document.getElementById('taskbar-run-' + w.id);
                
                if (!item) {
                    // 创建新的条状图标
                    item = document.createElement('div');
                    item.className = 'taskbar-running-item';
                    item.id = 'taskbar-run-' + w.id;
                    item.dataset.winId = w.id;
                    
                    item.innerHTML = `
                        <div class="running-icon">${getWindowIconSVG(w.title)}</div>
                        <div class="running-title">${w.title || '窗口'}</div>
                        <button class="running-close-btn" title="关闭窗口">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    `;
                    
                    // 点击：聚焦/最小化
                    item.addEventListener('click', function(e) {
                        // 如果点击的是关闭按钮，不执行聚焦/最小化
                        if (e.target.closest('.running-close-btn')) return;
                        
                        const winId = parseInt(this.dataset.winId);
                        const win = SYSTEM.windows.find(ww => ww.id === winId);
                        if (!win) return;
                        
                        if (win.element.classList.contains('focused') && !win.minimized) {
                            minimizeWin(winId);
                        } else {
                            focusWin(winId);
                        }
                        setTimeout(updateTaskbarRunningItems, 30);
                    });
                    
                    // 关闭按钮点击事件
                    const closeBtn = item.querySelector('.running-close-btn');
                    if (closeBtn) {
                        closeBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const winId = parseInt(item.dataset.winId);
                            closeWin(winId);
                            setTimeout(updateTaskbarRunningItems, 30);
                        });
                    }
                    
                    // 悬停：显示Aero Peek效果（虚化其他窗口）
                    item.addEventListener('mouseenter', function(e) {
                        const winId = parseInt(this.dataset.winId);
                        onRunningItemHover(e, winId);
                    });
                    item.addEventListener('mouseleave', function(e) {
                        const winId = parseInt(this.dataset.winId);
                        onRunningItemLeave(e, winId);
                    });
                    
                    area.appendChild(item);
                }
                
                // 更新状态
                item.classList.toggle('focused', w.element.classList.contains('focused'));
                item.classList.toggle('minimized-item', !!w.minimized);
                
                // 更新标题（可能变化）
                const titleEl = item.querySelector('.running-title');
                if (titleEl && titleEl.textContent !== w.title) {
                    titleEl.textContent = w.title || '窗口';
                }
            });
            
            // 删除已关闭的窗口图标
            Array.from(area.children).forEach(child => {
                const winId = parseInt(child.dataset.winId);
                if (!existingIds.has(winId)) {
                    child.style.transition = 'opacity 0.15s, transform 0.15s';
                    child.style.opacity = '0';
                    child.style.transform = 'scale(0.8)';
                    setTimeout(() => child.remove(), 150);
                }
            });
        }

        // ============================================
        // 2. 任务栏悬停预览效果（Aero Peek）
        // ============================================

        function onRunningItemHover(event, winId) {
            const win = SYSTEM.windows.find(w => w.id === winId);
            if (!win) return;
            
            // 虚化其他窗口，高亮当前窗口
            SYSTEM.windows.forEach(w => {
                if (w.id === winId && !w.minimized) {
                    w.element.classList.add('aero-peek-highlight');
                    w.element.classList.remove('aero-peek-dim');
                } else if (!w.minimized) {
                    w.element.classList.add('aero-peek-dim');
                    w.element.classList.remove('aero-peek-highlight');
                }
            });
        }

        function onRunningItemLeave(event, winId) {
            clearAeroPeekEffects();
        }

        function clearAeroPeekEffects() {
            SYSTEM.windows.forEach(w => {
                w.element.classList.remove('aero-peek-dim');
                w.element.classList.remove('aero-peek-highlight');
            });
        }

        // ============================================
        // 3. 桌面预览模式（右下角按钮）
        // ============================================

        function aeroPeekDesktopEnter() {
            if (AeroPeek.isDesktopLocked) return;
            
            AeroPeek.previewTimer = setTimeout(() => {
                AeroPeek.isDesktopPeeking = true;
                SYSTEM.windows.forEach(w => {
                    if (!w.minimized) {
                        w.element.classList.add('aero-peek-transparent');
                    }
                });
            }, 300);
        }

        function aeroPeekDesktopLeave() {
            if (AeroPeek.previewTimer) {
                clearTimeout(AeroPeek.previewTimer);
                AeroPeek.previewTimer = null;
            }
            
            if (AeroPeek.isDesktopPeeking && !AeroPeek.isDesktopLocked) {
                AeroPeek.isDesktopPeeking = false;
                SYSTEM.windows.forEach(w => {
                    w.element.classList.remove('aero-peek-transparent');
                });
            }
        }

        function aeroPeekDesktopClick() {
            if (AeroPeek.isDesktopLocked) {
                // 恢复所有窗口
                AeroPeek.isDesktopLocked = false;
                AeroPeek.isDesktopPeeking = false;
                
                AeroPeek.savedWindowStates.forEach(state => {
                    const win = SYSTEM.windows.find(w => w.id === state.id);
                    if (win) {
                        win.minimized = false;
                        win.element.classList.remove('minimized');
                        win.element.classList.remove('aero-peek-transparent');
                    }
                });
                AeroPeek.savedWindowStates = [];
            } else {
                // 最小化所有窗口
                AeroPeek.isDesktopLocked = true;
                AeroPeek.isDesktopPeeking = false;
                
                AeroPeek.savedWindowStates = SYSTEM.windows
                    .filter(w => !w.minimized)
                    .map(w => ({ id: w.id }));
                
                SYSTEM.windows.forEach(w => {
                    w.element.classList.remove('aero-peek-transparent');
                    if (!w.minimized) {
                        w.minimized = true;
                        w.element.classList.add('minimized');
                    }
                });
            }
            
            updateTaskbarRunningItems();
        }

        // 启动
        window.onload = initKernel;
    </script>

    <!-- ========== 7z-wasm 解压引擎（放在 </body> 前面）========== -->
    <script type="module">
    import SevenZip from 'https://cdn.jsdelivr.net/npm/7z-wasm@1.2.0/7zz.es6.min.js';

    class SevenZipEngine {
        constructor() {
            this.sevenZip = null;
            this.ready = false;
        }

        async init() {
            try {
                this.sevenZip = await SevenZip({
                    print: (t) => console.log('[7z]', t),
                    printErr: (t) => console.error('[7z]', t)
                });
                this.ready = true;
                console.log('✅ 7z-wasm 引擎加载成功');
                return true;
            } catch (e) {
                console.error('❌ 7z-wasm 加载失败:', e);
                return false;
            }
        }

        async extract(arrayBuffer, filename) {
            if (!this.ready) throw new Error('7z引擎未加载');
            
            const data = new Uint8Array(arrayBuffer);
            
            const stream = this.sevenZip.FS.open(filename, 'w+');
            this.sevenZip.FS.write(stream, data, 0, data.length);
            this.sevenZip.FS.close(stream);
            
            this.sevenZip.callMain(['x', '-y', filename]);
            
            try { this.sevenZip.FS.unlink(filename); } catch(e) {}
            
            return this.collectFiles('/');
        }

        collectFiles(path = '/') {
            const files = [];
            const skip = ['tmp', 'home', 'dev', 'proc'];
            try {
                const entries = this.sevenZip.FS.readdir(path);
                for (const entry of entries) {
                    if (entry === '.' || entry === '..' || skip.includes(entry)) continue;
                    const fullPath = path === '/' ? '/' + entry : path + '/' + entry;
                    try {
                        const stat = this.sevenZip.FS.stat(fullPath);
                        if (this.sevenZip.FS.isDir(stat.mode)) {
                            files.push(...this.collectFiles(fullPath));
                        } else if (this.sevenZip.FS.isFile(stat.mode)) {
                            if (!fullPath.match(/\.(7z|zip|rar|tar|gz|bz2|xz|cab)$/i)) {
                                files.push({
                                    path: fullPath.substring(1),
                                    name: entry,
                                    data: this.sevenZip.FS.readFile(fullPath),
                                    size: stat.size
                                });
                            }
                        }
                    } catch (e) {}
                }
            } catch (e) {}
            return files;
        }

        cleanup() {
            if (!this.ready) return;
            const files = this.collectFiles('/');
            for (const f of files) {
                try { this.sevenZip.FS.unlink('/' + f.path); } catch(e) {}
            }
        }
    }

    window.sevenZipEngine = new SevenZipEngine();
    window.sevenZipEngine.init().then(ok => {
        window.sevenZipReady = ok;
        console.log('7z引擎状态:', ok ? '就绪' : '失败');
    });
    </script>
