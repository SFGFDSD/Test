    await this.loadPath(this.currentPath);
    this.bindEvents(root);
    
    document.getElementById('fm-engine').textContent = 
      `${QingSi.cores.opfs ? '◆ OPFS' : '◇ IDB'} · ${QingSi.cores.ls ? '◇ LS缓存' : '○ 无缓存'} · ${QingSi.cores.ck ? '◇ Cookie' : ''}`;
    
    // 监听同步事件
    if (!this._syncOff) {
      this._syncOff = QingSi.sync?.on((evt) => {
        if (evt.type.startsWith('fs:')) {
          this.refresh();
          this.refreshSidebar();
          if (evt.type === 'fs:mounted') toast('挂载通知', `${evt.payload.name} 已挂载`, 'sync');
          else if (evt.type === 'fs:unmounted') toast('卸载通知', `${evt.payload.point} 已卸载`, 'sync');
          else toast('他窗变动', `${evt.type}: ${evt.payload.path || ''}`, 'sync');
        }
      });
    }
  }

  bindEvents(root) {
    root.querySelector('[data-cmd="back"]').onclick = () => this.goBack();
    root.querySelector('[data-cmd="forward"]').onclick = () => this.goForward();
    root.querySelector('[data-cmd="up"]').onclick = () => this.goUp();
    root.querySelector('[data-cmd="newfolder"]').onclick = () => this.newFolder();
    root.querySelector('[data-cmd="newfile"]').onclick = () => this.newFile();
    root.querySelector('[data-cmd="upload"]').onclick = () => this.upload();
    root.querySelector('[data-cmd="mount"]').onclick = () => this.mountLocal();
    root.querySelector('[data-cmd="view"]').onclick = () => this.toggleView();

    const search = root.querySelector('#fm-search');
    search.oninput = (e) => this.search(e.target.value);

    const content = root.querySelector('#fm-content');
    content.oncontextmenu = (e) => {
      if (e.target.closest('.fm-item, .fm-list-row')) return;
      e.preventDefault();
      this.showContextMenu(e.clientX, e.clientY, null);
    };

    content.ondragover = (e) => { e.preventDefault(); content.classList.add('fm-dragover'); };
    content.ondragleave = (e) => {
      if (!content.contains(e.relatedTarget)) content.classList.remove('fm-dragover');
    };
    content.ondrop = async (e) => {
      e.preventDefault();
      content.classList.remove('fm-dragover');
      const items = e.dataTransfer.items;
      if (items) {
        for (const item of items) {
          const entry = item.webkitGetAsEntry?.();
          if (entry) {
            await this._uploadEntry(entry, this.currentPath);
          } else if (item.kind === 'file') {
            const file = item.getAsFile();
            if (file) await this.uploadFile(file);
          }
        }
      } else {
        for (const f of e.dataTransfer.files) await this.uploadFile(f);
      }
      this.refresh();
    };

    // 键盘快捷键
    root.addEventListener('keydown', (e) => this._handleKeyboard(e));
  }

  async refreshSidebar() {
    // 防重入：如果上一次刷新还在进行中，跳过
    if (this._sidebarRefreshing) return;
    this._sidebarRefreshing = true;
    try {
    const sidebar = document.getElementById('fm-sidebar');
    if (!sidebar) return;
    sidebar.innerHTML = '';
    
    // 最近访问
    const recent = QingSi.prefs?.getRecent() || [];
    if (recent.length > 0) {
      const h = document.createElement('h3');
      h.textContent = '近日笔墨';
      sidebar.appendChild(h);
      for (const r of recent.slice(0, 5)) {
        const item = document.createElement('div');
        item.className = 'fm-recent-item';
        item.innerHTML = `${QingSi.fs._basename(r.path)} <span style="float:right;opacity:0.5;">${fmtRelTime(r.ts)}</span>`;
        item.title = r.path;
        item.onclick = async () => {
          const node = await QingSi.fs.getNode(r.path);
          if (!node) { toast('错', '此笺已散', 'error'); return; }
          if (node.type === 'folder') this.loadPath(r.path);
          else this.openItem(r.path, node.type);
        };
        sidebar.appendChild(item);
      }
    }
    
    // 目录树
    const h2 = document.createElement('h3');
    h2.textContent = '书阁导览';
    sidebar.appendChild(h2);
    
    const buildTree = async (path, depth = 0) => {
      const children = await QingSi.fs.listChildren(path);
      const folders = children.filter(c => c.type === 'folder').sort((a,b) => a.name.localeCompare(b.name));
      for (const f of folders) {
        const item = document.createElement('div');
        item.className = 'fm-tree-item';
        item.dataset.path = f.path;
        item.style.paddingLeft = (18 + depth * 14) + 'px';
        if (f.path === this.currentPath) item.classList.add('active');
        item.innerHTML = `<span class="arrow">▸</span> 册 ${f.name}`;
        item.onclick = () => this.loadPath(f.path);
        sidebar.appendChild(item);
        await buildTree(f.path, depth + 1);
      }
    };
    
    const rootItem = document.createElement('div');
    rootItem.className = 'fm-tree-item';
    rootItem.dataset.path = '/';
    if (this.currentPath === '/') rootItem.classList.add('active');
    rootItem.innerHTML = `<span class="arrow">▸</span> ⌂ 根目录`;
    rootItem.onclick = () => this.loadPath('/');
    sidebar.appendChild(rootItem);
    
    await buildTree('/', 1);

    // ── 本地挂载目录 ──
    const mounts = QingSi.fs.getMounts();
    if (mounts.length > 0) {
      const mountSep = document.createElement('div');
      mountSep.style.cssText = 'height:1px;background:var(--border-subtle);margin:10px 8px;';
      sidebar.appendChild(mountSep);

      const mountHeader = document.createElement('h3');
      mountHeader.textContent = '本地挂载';
      sidebar.appendChild(mountHeader);

      for (const m of mounts) {
        const mountItem = document.createElement('div');
        mountItem.className = 'fm-tree-item';
        mountItem.dataset.path = m.point;
        mountItem.style.paddingLeft = '18px';
        if (m.point === this.currentPath) mountItem.classList.add('active');
        const permIcon = m.permissionLost ? '<span style="color:var(--rust);font-size:10px;">⚠</span>' : '';
        mountItem.innerHTML = `<span class="arrow">▸</span> ⊕ ${m.name} ${permIcon}`;
        mountItem.title = m.point + (m.permissionLost ? ' (权限丢失)' : '');
        mountItem.onclick = () => this.loadPath(m.point);
        mountItem.oncontextmenu = (e) => {
          e.preventDefault();
          e.stopPropagation();
          showGlobalMenu(e.clientX, e.clientY, [
            { label: '入', icon: '◎', action: () => this.loadPath(m.point) },
            { label: '卸载', icon: '⊖', action: () => this.unmountLocal(m.point) },
          ]);
        };
        sidebar.appendChild(mountItem);
      }
    }

    // 回收站入口
    if (QingSi.prefs?.get('enableTrash', false)) {
      const trashSep = document.createElement('div');
      trashSep.style.cssText = 'height:1px;background:var(--border-subtle);margin:10px 8px;';
      sidebar.appendChild(trashSep);

      const trashCount = QingSi.fs.getTrash().length;
      const trashItem = document.createElement('div');
      trashItem.className = 'fm-tree-item';
      trashItem.style.paddingLeft = '18px';
      trashItem.innerHTML = `<span class="arrow">▸</span> 弃物阁${trashCount > 0 ? ` <span style="opacity:0.5;font-size:11px;">(${trashCount})</span>` : ''}`;
      trashItem.onclick = () => this.showTrash();
      sidebar.appendChild(trashItem);
    }
    } finally {
      this._sidebarRefreshing = false;
    }
  }

  async loadPath(path, addToHistory = true) {
    if (path === '__trash__') { this.showTrash(); return; }
    try {
      this.currentPath = path;
      this.selected.clear();
      this.lastClickedPath = null;

      // 更新面包屑
      this._updateBreadcrumb();

      // 导航历史
      if (addToHistory) {
        this.history = this.history.slice(0, this.historyIndex + 1);
        this.history.push(path);
        this.historyIndex = this.history.length - 1;
      }

      // 优先尝试缓存
      const cached = await QingSi.cache?.listCached(path);
      if (cached) {
        this.render(this._sortItems(cached));
        this._updateStatus(cached);
      }

      // 真实数据后台加载
      const children = await QingSi.fs.listChildren(path);
      const sorted = this._sortItems(children);

      QingSi.cache?.cacheList(path, children);

      if (!cached || JSON.stringify(cached.map(c => c.path)) !== JSON.stringify(children.map(c => c.path))) {
        this.render(sorted);
      }
      this._updateStatus(children);
      this.refreshSidebar();

      QingSi.prefs?.set('fm:lastPath', path);
    } catch (e) {
      toast('加载失败', e.message, 'error');
    }
  }

  _updateStatus(children) {
    const el = document.getElementById('fm-status');
    if (el) {
      const mount = QingSi.fs._resolveMount(this.currentPath) || (QingSi.fs._mounts.has(this.currentPath) ? { mountPoint: this.currentPath } : null);
      const localTag = mount ? ' ⊕ 本地' : '';
      el.textContent = `共 ${children.length} 项 · ${children.filter(c => c.type === 'folder').length} 册 · ${children.filter(c => c.type !== 'folder').length} 笺${localTag}`;
    }
  }

  render(items) {
    const content = document.getElementById('fm-content');
    if (!content) return;
    if (items.length === 0) {
      content.innerHTML = `
        <div class="fm-empty">
          <div class="big">空</div>
          <div class="text">空空如也</div>
          <div class="sub">— 此处寂寥,尚无笔墨痕迹 —</div>
        </div>
      `;
      return;
    }
    
    if (this.viewMode === 'grid') {
      content.innerHTML = `<div class="fm-grid">${items.map(i => this.renderGridItem(i)).join('')}</div>`;
    } else {
      content.innerHTML = `
        <div class="fm-list">
          <div class="fm-list-header">
            <div></div><div>名讳</div><div>大小</div><div>修改于</div><div>类</div>
          </div>
          ${items.map(i => this.renderListItem(i)).join('')}
        </div>
      `;
    }
    
    content.querySelectorAll('.fm-item, .fm-list-row').forEach(el => {
      const path = el.dataset.path;
      const type = el.dataset.type;

      // Shift范围选择
      el.onclick = (e) => {
        const allPaths = Array.from(content.querySelectorAll('.fm-item, .fm-list-row')).map(x => x.dataset.path);
        if (e.shiftKey && this.lastClickedPath) {
          const lastIdx = allPaths.indexOf(this.lastClickedPath);
          const curIdx = allPaths.indexOf(path);
          if (lastIdx !== -1 && curIdx !== -1) {
            const [start, end] = [Math.min(lastIdx, curIdx), Math.max(lastIdx, curIdx)];
            if (!e.ctrlKey && !e.metaKey) this.selected.clear();
            for (let i = start; i <= end; i++) this.selected.add(allPaths[i]);
          }
        } else if (!e.ctrlKey && !e.metaKey) {
          this.selected.clear();
          this.selected.add(path);
        } else {
          if (this.selected.has(path)) this.selected.delete(path);
          else this.selected.add(path);
        }
        this.lastClickedPath = path;
        content.querySelectorAll('.selected').forEach(x => x.classList.remove('selected'));
        this.selected.forEach(p => content.querySelector(`[data-path="${p}"]`)?.classList.add('selected'));
      };

      el.ondblclick = () => this.openItem(path, type);

      el.oncontextmenu = (e) => {
        e.preventDefault();
        if (!this.selected.has(path)) {
          this.selected.clear();
          this.selected.add(path);
          content.querySelectorAll('.selected').forEach(x => x.classList.remove('selected'));
          el.classList.add('selected');
        }
        this.showContextMenu(e.clientX, e.clientY, path);
      };

      if (type === 'folder') {
        el.ondragover = (e) => { e.preventDefault(); el.classList.add('fm-drop-target'); };
        el.ondragleave = () => el.classList.remove('fm-drop-target');
      }
    });
  }

  renderGridItem(item) {
    return `
      <div class="fm-item" data-path="${item.path}" data-type="${item.type}" title="${item.name}">
        <div class="fi-icon">${getIconChar(item)}</div>
        <div class="fi-name">${item.name}</div>
        ${item.type !== 'folder' ? `<div class="fi-size">${fmtSize(item.size || 0)}</div>` : ''}
      </div>
    `;
  }

  renderListItem(item) {
    return `
      <div class="fm-list-row" data-path="${item.path}" data-type="${item.type}">
        <div class="li-icon">${getIconChar(item)}</div>
        <div>${item.name}</div>
        <div>${item.type === 'folder' ? '—' : fmtSize(item.size || 0)}</div>
        <div>${fmtTime(item.modified)}</div>
        <div>${item.type === 'folder' ? '册' : item.type === 'image' ? '画' : item.type === 'audio' ? '乐' : item.type === 'video' ? '影' : item.type === 'pdf' ? '卷' : item.type === 'csv' ? '表' : item.type === 'text' ? '文' : item.type === 'archive' ? '囊' : '物'}</div>
      </div>
    `;
  }

  goUp() {
    if (this.currentPath === '/') return;
    if (this.currentPath === '__trash__') { this.loadPath('/'); return; }
    this.loadPath(QingSi.fs._parentPath(this.currentPath));
  }

  async openItem(path, type) {
    QingSi.prefs?.recordAccess(path);
    if (type === 'folder') this.loadPath(path);
    else if (type === 'text') EditorApp.openFile(path);
    else if (type === 'csv') CsvApp.openFile(path);
    else if (type === 'image') ImageApp.openFile(path);
    else if (type === 'audio') AudioApp.openFile(path);
    else if (type === 'video') VideoApp.openFile(path);
    else if (type === 'pdf') PdfApp.openFile(path);
    else if (type === 'archive') ArchiveApp.openFile(path);
    else this.download(path);
  }

  async newFolder() {
    modal({
      title: '新建册', body: '请赐以新册之名:',
      input: true, placeholder: '册名',
      onOk: async (name) => {
        if (!name?.trim()) return false;
        try {
          await QingSi.fs.mkdir(QingSi.fs._join(this.currentPath, name.trim()));
          toast('新册已立', name, 'success');
          this.refresh();
        } catch (e) { toast('创建失败', e.message, 'error'); return false; }
      }
    });
  }

  async newFile() {
    modal({
      title: '新建笺', body: '请赐以新笺之名(含后缀):',
      input: true, defaultValue: '无题.txt',
      onOk: async (name) => {
        if (!name?.trim()) return false;
        try {
          await QingSi.fs.writeFile(QingSi.fs._join(this.currentPath, name.trim()), '');
          toast('新笺已成', name, 'success');
          this.refresh();
        } catch (e) { toast('创建失败', e.message, 'error'); return false; }
      }
    });
  }

  upload() {
    const input = document.createElement('input');
    input.type = 'file';
    input.multiple = true;
    input.onchange = async () => {
      for (const f of input.files) await this.uploadFile(f);
      this.refresh();
    };
    input.click();
  }

  async uploadFile(file, targetPath) {
    try {
      const dir = targetPath || this.currentPath;
      await QingSi.fs.writeFile(QingSi.fs._join(dir, file.name), file);
      toast('已纳入', file.name, 'success');
    } catch (e) { toast('上传失败', e.message, 'error'); }
  }

  async mountLocal() {
    if (!HybridFS.isFileSystemAccessSupported()) {
      toast('不支持', '当前浏览器不支持本地目录挂载，请使用 Chrome/Edge 86+', 'error');
      return;
    }
    try {
      const mountPoint = await QingSi.fs.mountLocalPicker();
      if (mountPoint) {
        toast('已挂载', `本地目录已挂载至 ${mountPoint}`, 'success');
        this.refresh();
        this.refreshSidebar();
      }
    } catch (e) {
      toast('挂载失败', e.message, 'error');
    }
  }

  async unmountLocal(mountPoint) {
    confirm('卸载挂载', `确定要卸载 ${mountPoint} 吗？`, async () => {
      try {
        await QingSi.fs.unmountLocal(mountPoint);
        toast('已卸载', mountPoint, 'success');
        // 如果当前在已卸载的目录下，导航回根目录
        if (this.currentPath.startsWith(mountPoint)) {
          this.loadPath('/');
        }
        this.refreshSidebar();
      } catch (e) {
        toast('卸载失败', e.message, 'error');
      }
    });
  }

  async download(path) {
    const blob = await QingSi.fs.readFile(path);
    if (!blob) return toast('错', '无法读取', 'error');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = QingSi.fs._basename(path);
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }

  toggleView() {
    this.viewMode = this.viewMode === 'grid' ? 'list' : 'grid';
    QingSi.prefs?.set('fm:viewMode', this.viewMode);
    this.refresh();
  }

  refresh() {
    if (this.currentPath === '__trash__') { this.showTrash(); return; }
    this.loadPath(this.currentPath, false);
  }

  async search(q) {
    if (!q.trim()) return this.refresh();
    const results = await QingSi.fs.search(q);
    this.render(results);
    document.getElementById('fm-status').textContent = `搜得 ${results.length} 项`;
  }

  showContextMenu(x, y, path) {
    document.querySelectorAll('.context-menu').forEach(m => m.remove());
    const menu = document.createElement('div');
    menu.className = 'context-menu';

    const items = [];
    if (path) {
      items.push({ label: '开启', icon: '◎', action: async () => {
        const n = await QingSi.fs.getNode(path);
        this.openItem(path, n.type);
      }});
      items.push({ label: '重命', icon: '✎', action: () => this.rename(path) });
      // ── 挂载点卸载选项 ──
      const mountInfo = QingSi.fs._resolveMount(path);
      const isMountRoot = mountInfo && mountInfo.relativePath === '/';
      if (isMountRoot) {
        items.push({ label: '卸载挂载', icon: '⊖', action: () => this.unmountLocal(mountInfo.mountPoint) });
      }
      items.push({ divider: true });
      items.push({ label: '复', icon: '⎘', action: () => this.copy(Array.from(this.selected)) });
      items.push({ label: '剪', icon: '✂', action: () => this.cut(Array.from(this.selected)) });
      if (this.clipboard) items.push({ label: '贴', icon: '⊕', action: () => this.paste() });
      items.push({ divider: true });
      items.push({ label: '下载', icon: '↓', action: async () => {
        const n = await QingSi.fs.getNode(path);
        if (n.type !== 'folder') this.download(path);
        else this.downloadFolder(path);
      }});
      items.push({ divider: true });
      items.push({ label: '详', icon: '☰', action: () => this.showProperties(path) });
      items.push({ divider: true });
      items.push({ label: '弃', icon: '✕', action: () => this.delete(Array.from(this.selected)), danger: true });
    } else {
      items.push({ label: '新册', icon: '+', action: () => this.newFolder() });
      items.push({ label: '新笺', icon: '+', action: () => this.newFile() });
      items.push({ label: '上传', icon: '⇪', action: () => this.upload() });
      if (HybridFS.isFileSystemAccessSupported()) {
        items.push({ label: '挂载本地目录', icon: '⊕', action: () => this.mountLocal() });
      }
      if (this.clipboard) {
        items.push({ divider: true });
        items.push({ label: '贴', icon: '⊕', action: () => this.paste() });
      }
      items.push({ divider: true });
      items.push({ label: '序 · ' + {name:'名',size:'量',date:'时',type:'类'}[this.sortBy], icon: '⇅', action: () => this.cycleSort() });
      items.push({ label: '刷新', icon: '↻', action: () => this.refresh() });
    }
    
    menu.innerHTML = items.map(i => 
      i.divider ? '<div class="ctx-divider"></div>' :
      `<div class="ctx-item ${i.danger ? 'danger' : ''}" data-act="${i.label}"><span style="opacity:0.5">${i.icon}</span> ${i.label}</div>`
    ).join('');
    
    menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
    menu.style.top = Math.min(y, window.innerHeight - 300) + 'px';
    document.body.appendChild(menu);
    
    const realItems = items.filter(x => !x.divider);
    menu.querySelectorAll('.ctx-item').forEach((el, i) => {
      el.onclick = () => { realItems[i].action(); menu.remove(); };
    });
    
    setTimeout(() => {
      document.addEventListener('click', () => menu.remove(), { once: true });
    }, 10);
  }

  async rename(path) {
    const node = await QingSi.fs.getNode(path);
    modal({
      title: '改名', body: '请赐以新名:',
      input: true, defaultValue: node.name,
      onOk: async (newName) => {
        if (!newName?.trim() || newName === node.name) return;
        try {
          await QingSi.fs.rename(path, newName.trim());
          toast('已更', `${node.name} → ${newName}`, 'success');
          this.refresh();
        } catch (e) { toast('改名失败', e.message, 'error'); return false; }
      }
    });
  }

  copy(paths) {
    this.clipboard = { action: 'copy', paths };
    toast('已存', `${paths.length} 项已入怀`, 'info');
  }

  cut(paths) {
    this.clipboard = { action: 'cut', paths };
    toast('已剪', `${paths.length} 项待迁`, 'info');
  }

  async paste() {
    if (!this.clipboard) return;
    const { action, paths } = this.clipboard;
    for (const p of paths) {
      const name = QingSi.fs._basename(p);
      let dest = QingSi.fs._join(this.currentPath, name);
      let i = 1;
      while (await QingSi.fs.exists(dest)) {
        const dotIdx = name.lastIndexOf('.');
        if (dotIdx > 0) {
          dest = QingSi.fs._join(this.currentPath, name.substring(0, dotIdx) + ` (${i})` + name.substring(dotIdx));
        } else dest = QingSi.fs._join(this.currentPath, name + ` (${i})`);
        i++;
      }
      try {
        if (action === 'copy') await QingSi.fs.copy(p, dest);
        else await QingSi.fs.move(p, dest);
      } catch (e) { toast('错', e.message, 'error'); }
    }
    if (action === 'cut') this.clipboard = null;
    toast('已贴', '操作完成', 'success');
    this.refresh();
  }

  async delete(paths) {
    const enableTrash = QingSi.prefs?.get('enableTrash', false);
    confirm('忍弃此物?', enableTrash ? `欲弃 ${paths.length} 项，将暂存于弃物阁。` : `欲弃 ${paths.length} 项,弃则不返。`, async () => {
      for (const p of paths) {
        try { await QingSi.fs.delete(p); }
        catch (e) { toast('错', e.message, 'error'); }
      }
      toast('已弃', enableTrash ? '已入弃物阁，尚可追悔' : '昔物已散', 'info');
      this.refresh();
    });
  }

  showTrash() {
    const content = document.getElementById('fm-content');
    if (!content) return;
    const trash = QingSi.fs.getTrash();
    this.currentPath = '__trash__';
    this.selected.clear();
    this._updateBreadcrumb();

    if (trash.length === 0) {
      content.innerHTML = `
        <div class="fm-empty">
          <div class="big">弃</div>
          <div class="text">弃物阁空空如也</div>
          <div class="sub">既已决意要毁，又何苦追悔莫及</div>
        </div>`;
      return;
    }

    let html = `<div style="padding:12px 16px;border-bottom:1px solid var(--border-subtle);display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:13px;color:var(--ink-soft);">弃物阁 · ${trash.length} 件</span>
      <button class="fm-btn danger" id="trash-empty" style="font-size:12px;padding:4px 12px;">清空弃物阁</button>
    </div>`;
    html += `<div style="padding:8px 16px;font-size:11px;color:var(--ink-soft);font-style:italic;font-family:'Noto Serif SC',serif;text-align:center;">
      既已决意要毁，又何苦追悔莫及。然则人心善变，留一线余地，亦为慈悲。
    </div>`;
    html += '<div style="padding:0 8px;">';
    trash.forEach((item, idx) => {
      const time = item._trashedAt ? new Date(item._trashedAt).toLocaleString('zh-CN', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
      const hasBlob = !!item._blob;
      html += `<div class="fm-list-row" data-trash-idx="${idx}" style="display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border-subtle);cursor:default;gap:12px;">
        <span style="opacity:0.4;font-size:16px;">${item.type === 'folder' ? '册' : '笺'}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${item.path}">${item.name}</div>
          <div style="font-size:11px;color:var(--ink-soft);">${item.path} · ${time}${!hasBlob ? ' · <span style="color:var(--rust);">不可恢复</span>' : ''}</div>
        </div>
        <button class="fm-btn primary trash-restore" data-idx="${idx}" style="font-size:11px;padding:3px 10px;${!hasBlob ? 'opacity:0.3;pointer-events:none;' : ''}">复</button>
        <button class="fm-btn danger trash-remove" data-idx="${idx}" style="font-size:11px;padding:3px 10px;">灭</button>
      </div>`;
    });
    html += '</div>';
    content.innerHTML = html;

    content.querySelector('#trash-empty')?.addEventListener('click', () => {
      confirm('清空弃物阁?', '此为最终之决，不可追悔。', async () => {
        await QingSi.fs.emptyTrash();
        toast('已空', '弃物阁已清，尘埃落定', 'info');
        this.showTrash();
        this.refreshSidebar();
      });
    });

    content.querySelectorAll('.trash-restore').forEach(btn => {
      btn.addEventListener('click', async () => {
        const idx = parseInt(btn.dataset.idx);
        try {
          const restoredPath = await QingSi.fs.restoreFromTrash(idx);
          toast('已复', `「${QingSi.fs._basename(restoredPath)}」已归原位`, 'success');
          this.showTrash();
          this.refreshSidebar();
        } catch (e) { toast('复失败', e.message, 'error'); }
      });
    });

    content.querySelectorAll('.trash-remove').forEach(btn => {
      btn.addEventListener('click', async () => {
        const idx = parseInt(btn.dataset.idx);
        const item = QingSi.fs.getTrash()[idx];
        confirm('彻底毁灭?', `「${item?.name}」将灰飞烟灭，永不复返。`, async () => {
          QingSi.fs._trash.splice(idx, 1);
          toast('已灭', '尘埃落定', 'info');
          this.showTrash();
          this.refreshSidebar();
        });
      });
    });
  }

  // ── 导航历史 ──
  goBack() {
    if (this.historyIndex > 0) {
      this.historyIndex--;
      this.loadPath(this.history[this.historyIndex], false);
    }
  }

  goForward() {
    if (this.historyIndex < this.history.length - 1) {
      this.historyIndex++;
      this.loadPath(this.history[this.historyIndex], false);
    }
  }

  // ── 面包屑导航 ──
  _updateBreadcrumb() {
    const bc = document.getElementById('fm-breadcrumb');
    if (!bc) return;
    if (this.currentPath === '__trash__') {
      bc.innerHTML = '<span class="bc-segment" data-path="/">⌂</span><span class="bc-sep">›</span><span class="bc-segment">弃物阁</span>';
      bc.querySelector('[data-path="/"]')?.addEventListener('click', () => this.loadPath('/'));
      return;
    }
    const parts = this.currentPath === '/' ? [''] : this.currentPath.split('/').filter(Boolean);
    let html = '<span class="bc-segment" data-path="/">⌂</span>';
    let accumulated = '';
    for (const p of parts) {
      accumulated += '/' + p;
      html += `<span class="bc-sep">›</span><span class="bc-segment" data-path="${accumulated}">${p}</span>`;
    }
    bc.innerHTML = html;
    bc.querySelectorAll('.bc-segment').forEach(seg => {
      seg.onclick = () => this.loadPath(seg.dataset.path);
    });
  }

  // ── 排序 ──
  _sortItems(items) {
    const sorted = [...items];
    sorted.sort((a, b) => {
      // 文件夹始终优先
      if (a.type === 'folder' && b.type !== 'folder') return -1;
      if (a.type !== 'folder' && b.type === 'folder') return 1;
      let cmp = 0;
      switch (this.sortBy) {
        case 'name': cmp = a.name.localeCompare(b.name, 'zh-CN'); break;
        case 'size': cmp = (a.size || 0) - (b.size || 0); break;
        case 'date': cmp = (a.modified || 0) - (b.modified || 0); break;
        case 'type': cmp = (a.type || '').localeCompare(b.type || ''); break;
      }
      return this.sortAsc ? cmp : -cmp;
    });
    return sorted;
  }

  cycleSort() {
    const modes = ['name', 'size', 'date', 'type'];
    const idx = modes.indexOf(this.sortBy);
    const nextIdx = (idx + 1) % modes.length;
    // 轮完一圈回到第一个模式时，切换升降序
    if (nextIdx === 0) {
      this.sortAsc = !this.sortAsc;
    }
    this.sortBy = modes[nextIdx];
    this.refresh();
  }

  // ── 键盘快捷键 ──
  _handleKeyboard(e) {
    const ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && e.key === 'a') {
      e.preventDefault();
      const content = document.getElementById('fm-content');
      if (!content) return;
      content.querySelectorAll('.fm-item, .fm-list-row').forEach(el => {
        this.selected.add(el.dataset.path);
        el.classList.add('selected');
      });
    } else if (e.key === 'Delete') {
      if (this.selected.size > 0) this.delete(Array.from(this.selected));
    } else if (e.key === 'F2') {
      e.preventDefault();
      if (this.selected.size === 1) this.rename(Array.from(this.selected)[0]);
    } else if (ctrl && e.key === 'c') {
      if (this.selected.size > 0) this.copy(Array.from(this.selected));
    } else if (ctrl && e.key === 'x') {
      if (this.selected.size > 0) this.cut(Array.from(this.selected));
    } else if (ctrl && e.key === 'v') {
      if (this.clipboard) this.paste();
    } else if (e.key === 'F5') {
      e.preventDefault();
      this.refresh();
    } else if (e.key === 'Backspace') {
      e.preventDefault();
      this.goUp();
    } else if (ctrl && e.key === 'f') {
      e.preventDefault();
      document.getElementById('fm-search')?.focus();
    }
  }

  async _uploadEntry(entry, path) {
    if (entry.isFile) {
      return new Promise((resolve, reject) => {
        entry.file(async (file) => {
          try { await this.uploadFile(file, path); resolve(); }
          catch(e) { reject(e); }
        }, (err) => reject(err));
      });
    } else if (entry.isDirectory) {
      const dirName = entry.name;
      const dirPath = QingSi.fs._join(path, dirName);
      try { await QingSi.fs.mkdir(dirPath, true); } catch(e) {}
      const reader = entry.createReader();
      const entries = await new Promise((resolve, reject) => {
        const results = [];
        const readBatch = () => {
          reader.readEntries((batch) => {
            if (batch.length === 0) resolve(results);
            else { results.push(...batch); readBatch(); }
          }, (err) => reject(err));
        };
        readBatch();
      });
      for (const e of entries) await this._uploadEntry(e, dirPath);
    }
  }

  // ── 文件夹下载（打包） ──
  async downloadFolder(path) {
    toast('打包中', '正在为册打包...', 'info');
    try {
      const children = await QingSi.fs.listChildren(path);
      // 简单实现：逐个下载文件（浏览器端无原生ZIP支持时）
      // 使用 Blob 合并方式
      const files = [];
      const collectFiles = async (p) => {
        const items = await QingSi.fs.listChildren(p);
        for (const item of items) {
          if (item.type === 'folder') await collectFiles(item.path);
          else {
            const blob = await QingSi.fs.readFile(item.path);
            if (blob) files.push({ name: item.path, blob });
          }
        }
      };
      await collectFiles(path);
      if (files.length === 0) { toast('空册', '此册无物可下', 'info'); return; }
      // 逐个下载
      for (const f of files) {
        const url = URL.createObjectURL(f.blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = QingSi.fs._basename(f.name);
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 10000);
      }
      toast('已下', `${files.length} 笺已下载`, 'success');
    } catch (e) { toast('下载失败', e.message, 'error'); }
  }

  // ── 文件属性 ──
  async showProperties(path) {
    const node = await QingSi.fs.getNode(path);
    if (!node) return toast('错', '找不到此物', 'error');
    const size = node.size || 0;
    const typeMap = { folder: '册（目录）', text: '文（文本）', image: '画（图像）', audio: '乐（音频）', video: '影（视频）', pdf: '卷（PDF）', archive: '囊（压缩包）', binary: '物（二进制）' };
    const typeStr = typeMap[node.type] || node.type || '未知';
    modal({
      title: '物之属性',
      body: `
        <div style="line-height:2.2;font-family:'ZCOOL XiaoWei',serif;">
          <div><strong>名讳：</strong>${node.name}</div>
          <div><strong>路径：</strong>${node.path}</div>
          <div><strong>类别：</strong>${typeStr}</div>
          <div><strong>大小：</strong>${fmtSize(size)}</div>
          <div><strong>修改于：</strong>${node.modified ? fmtTime(node.modified) : '—'}</div>
          <div><strong>创建于：</strong>${node.created ? fmtTime(node.created) : '—'}</div>
        </div>
      `,
      showCancel: false, okText: '知'
    });
  }
}

      if (this.current) {

        setTimeout(() => draftIndicator.classList.remove('show'), 1500);
      }
    }, 500);
    
    area.oninput = () => {
      info.textContent = `${this.current || '未藏'} · ${area.value.length} 字 ${this.current && area.value !== this.saved ? '· *' : ''}`;
      autoSave();
    };
    
    root.querySelector('#ed-new').onclick = () => {
      this.current = null; area.value = ''; this.saved = '';
      info.textContent = '未藏 · 0 字';
    };
    root.querySelector('#ed-save').onclick = () => this.save(area.value);
    root.querySelector('#ed-saveas').onclick = () => this.saveAs(area.value);
    root.querySelector('#ed-open').onclick = () => {
      modal({
        title: '开启笺', body: '请输入笺之路径:',
        input: true, defaultValue: '/诗稿/江城子.txt',
        onOk: async (path) => { await this.openFile(path); }
      });
    };
  },
  
  async openFile(path) {
    if (!QingSi.windows.editor) this.open();
    setTimeout(async () => {
      const text = await QingSi.fs.readFile(path, true);
      if (text === null) return toast('错', '无此笺', 'error');
      
      const area = document.querySelector('#ed-area');
      
      // 检查草稿
      const draft = QingSi.prefs?.getDraft(path);
      if (draft && draft.content !== text) {
        confirm('发现未存草稿', 
          `此笺尚有 ${fmtRelTime(draft.ts)} 之未藏草稿,可恢复否?`, 
          () => {
            area.value = draft.content;
            this.current = path;
            this.saved = text;
            document.querySelector('#ed-info').textContent = `${path} · ${draft.content.length} 字 · *`;
            toast('草稿还魂', '昔日笔墨已重现', 'success');
          });
        // 取消则加载原文
        setTimeout(() => {
          if (area.value === '') {
            area.value = text;
            this.current = path;
            this.saved = text;
            document.querySelector('#ed-info').textContent = `${path} · ${text.length} 字`;
          }
        }, 100);
      } else {
        area.value = text;
        this.current = path;
        this.saved = text;
        document.querySelector('#ed-info').textContent = `${path} · ${text.length} 字`;
      }
      
      QingSi.prefs?.recordAccess(path);
      WindowManager.activate('editor');
    }, 50);
  },
  
  async save(content) {
    if (!this.current) return this.saveAs(content);
    try {
      await QingSi.fs.writeFile(this.current, content);
      this.saved = content;
      QingSi.prefs?.removeDraft(this.current);
      document.querySelector('#ed-info').textContent = `${this.current} · ${content.length} 字`;
      toast('藏好', this.current, 'success');
    } catch (e) { toast('藏失败', e.message, 'error'); }
  },
  
  saveAs(content) {
    modal({
      title: '另藏为', body: '请赐以路径:',
      input: true, defaultValue: '/文档/未题.txt',
      onOk: async (path) => {
        try {
          await QingSi.fs.writeFile(path, content);
          this.current = path;
          this.saved = content;
          document.querySelector('#ed-info').textContent = `${path} · ${content.length} 字`;
          toast('藏好', path, 'success');
          if (QingSi.windows.files) fileManager.refresh();
        } catch (e) { toast('藏失败', e.message, 'error'); return false; }
      }
    });
  }
};

    root.querySelector('#cv-save').onclick = () => this.save();
  },

  toggleMode() {
    const view = document.querySelector('#cv-view');
    const editor = document.querySelector('#cv-editor');
    const btn = document.querySelector('#cv-toggle');

    if (view.style.display === 'none') {
      // 切回表格模式：重新解析编辑器中的内容
      this.currentContent = editor.value;
      this._renderTable(this.currentContent);
      view.style.display = 'flex';
      editor.style.display = 'none';
      btn.textContent = '阅原文';
    } else {
      // 切到文本模式
      editor.value = this.currentContent;
      view.style.display = 'none';
      editor.style.display = 'block';
      btn.textContent = '观表格';
    }
  },

  async save() {
    if (!this.currentPath) return toast('错', '未开表格', 'error');
    try {
      const editor = document.querySelector('#cv-editor');
      const content = editor.style.display !== 'none' ? editor.value : this.currentContent;
      await QingSi.fs.writeFile(this.currentPath, content);
      this.currentContent = content;
      toast('藏好', this.currentPath, 'success');
      if (QingSi.windows.files) fileManager.refresh();
    } catch (e) { toast('藏失败', e.message, 'error'); }
  },

  async openFile(path) {
    if (!QingSi.windows.csv) this.open();
    setTimeout(async () => {
      const text = await QingSi.fs.readFile(path, true);
      if (!text) return toast('错', '无此表', 'error');

      this.currentPath = path;
      this.currentContent = text;

      // 重置为表格模式
      const view = document.querySelector('#cv-view');
      const editor = document.querySelector('#cv-editor');
      const btn = document.querySelector('#cv-toggle');
      view.style.display = 'flex';
      editor.style.display = 'none';
      btn.textContent = '阅原文';

      this._renderTable(text);

      document.querySelector('#cv-info').textContent = `${path}`;
      QingSi.prefs?.recordAccess(path);
      WindowManager.activate('csv');
    }, 50);
  },

  _renderTable(text) {
    const ext = this.currentPath ? this.currentPath.split('.').pop().toLowerCase() : 'csv';
    const delimiter = ext === 'tsv' ? '\t' : ',';
    const lines = text.split('\n').filter(l => l.trim());

    // 解析 CSV/TSV（支持引号转义）
    const parseRow = (line) => {
      const cells = [];
      let cell = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === delimiter && !inQuotes) {
          cells.push(cell.trim());
          cell = '';
        } else {
          cell += char;
        }
      }
      cells.push(cell.trim());
      return cells;
    };

    const rows = lines.map(parseRow);
    const maxCols = Math.max(...rows.map(r => r.length), 1);

    // 转义 HTML
    const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    let tableHtml = `
      <style>
        .csv-table-wrap {
          flex: 1; overflow: auto; background: var(--paper);
          touch-action: auto;
          -webkit-overflow-scrolling: touch;
        }
        .csv-table-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
        .csv-table-wrap::-webkit-scrollbar-track { background: transparent; }
        .csv-table-wrap::-webkit-scrollbar-thumb { background: var(--willow-mist); border-radius: 4px; opacity: 0.4; }
        .csv-table-wrap::-webkit-scrollbar-thumb:hover { background: var(--gold); opacity: 0.7; }
        .csv-table-wrap::-webkit-scrollbar-corner { background: transparent; }
        .csv-table {
          width: 100%; border-collapse: collapse;
          font-size: 13px; font-family: 'Noto Serif SC', serif;
        }
        .csv-table th {
          background: linear-gradient(180deg, var(--surface-bg-soft), var(--surface-bg));
          color: var(--surface-text);
          padding: 10px 12px; text-align: left; font-weight: 500;
          font-family: 'Ma Shan Zheng', cursive;
          font-size: 14px; letter-spacing: 0.1em;
          border-bottom: 1px solid var(--border-subtle);
          position: sticky; top: 0; z-index: 1;
          white-space: nowrap;
        }
        .csv-table td {
          padding: 8px 12px;
          border-bottom: 1px solid var(--border-subtle);
          color: var(--ink);
          white-space: nowrap;
        }
        .csv-table tr:hover td { background: rgba(176, 138, 74, 0.1); }
        .csv-table tr:nth-child(even) { background: var(--hover-bg); }
        .csv-stats {
          padding: 8px 14px;
          background: var(--paper-deep);
          border-bottom: 1px solid var(--border-subtle);
          font-size: 12px; color: var(--ink-soft);
          font-family: 'ZCOOL XiaoWei', serif;
          flex-shrink: 0;
        }
      </style>
      <div class="csv-stats">
        共 ${rows.length} 行 · ${maxCols} 列 · ${text.length} 字
      </div>
      <div class="csv-table-wrap">
        <table class="csv-table">
          <thead>
            <tr>
              ${Array.from({length: maxCols}, (_, i) => `<th>列 ${i + 1}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => `
              <tr>
                ${Array.from({length: maxCols}, (_, i) => `<td>${esc(row[i] || '')}</td>`).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;

    const view = document.querySelector('#cv-view');
    view.innerHTML = tableHtml;
    view.style.cssText = 'flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--paper);';
  }
};

/* ============================================================
   压缩包解析工具（零依赖，使用原生 DecompressionStream）
   ============================================================ */

// 解析 ZIP 文件
async function parseZip(buffer) {
  const view = new DataView(buffer);
  const entries = [];
  
  // 查找中央目录结束标记 (End of Central Directory)
  let eocdOffset = buffer.byteLength - 22;
  while (eocdOffset >= 0) {
    if (view.getUint32(eocdOffset, true) === 0x06054b50) break;
    eocdOffset--;
  }
  if (eocdOffset < 0) throw new Error('无效的 ZIP 文件');
  
  const cdOffset = view.getUint32(eocdOffset + 16, true);
  const cdCount = view.getUint16(eocdOffset + 10, true);
  
  let pos = cdOffset;
  for (let i = 0; i < cdCount; i++) {
    if (view.getUint32(pos, true) !== 0x02014b50) break;
    
    const compression = view.getUint16(pos + 10, true);
    const compressedSize = view.getUint32(pos + 20, true);
    const uncompressedSize = view.getUint32(pos + 24, true);
    const nameLen = view.getUint16(pos + 28, true);
    const extraLen = view.getUint16(pos + 30, true);
    const commentLen = view.getUint16(pos + 32, true);
    const localOffset = view.getUint32(pos + 42, true);
    
    const name = new TextDecoder().decode(new Uint8Array(buffer, pos + 46, nameLen));
    
    // 跳过目录项
    if (!name.endsWith('/')) {
      entries.push({
        name,
        compression,
        compressedSize,
        uncompressedSize,
        localOffset,
        isFolder: false
      });
    }
    
    pos += 46 + nameLen + extraLen + commentLen;
  }
  
  return entries;
}

// 解压 ZIP 单个文件
async function extractZipEntry(buffer, entry) {
  const view = new DataView(buffer);
  const pos = entry.localOffset;
  
  // 跳过本地文件头
  const nameLen = view.getUint16(pos + 26, true);
  const extraLen = view.getUint16(pos + 28, true);
  const dataOffset = pos + 30 + nameLen + extraLen;
  
  const compressedData = new Uint8Array(buffer, dataOffset, entry.compressedSize);
  
  // compression: 0=存储, 8=deflate
  if (entry.compression === 0) {
    return new Uint8Array(compressedData);
  } else if (entry.compression === 8) {
    // 使用原生 DecompressionStream
    try {
      const ds = new DecompressionStream('deflate-raw');
      const writer = ds.writable.getWriter();
      writer.write(compressedData);
      writer.close();
      
      const reader = ds.readable.getReader();
      const chunks = [];
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      
      const result = new Uint8Array(entry.uncompressedSize);
      let offset = 0;
      for (const chunk of chunks) {
        result.set(chunk, offset);
        offset += chunk.length;
      }
      return result;
    } catch (e) {
      // 回退：尝试不带 -raw 的 deflate
      const ds = new DecompressionStream('deflate');
      const writer = ds.writable.getWriter();
      writer.write(compressedData);
      writer.close();
      
      const reader = ds.readable.getReader();
      const chunks = [];
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      
      const totalLen = chunks.reduce((s, c) => s + c.length, 0);
      const result = new Uint8Array(totalLen);
      let offset = 0;
      for (const chunk of chunks) {
        result.set(chunk, offset);
        offset += chunk.length;
      }
      return result;
    }
  }
  
  throw new Error('不支持的压缩方式: ' + entry.compression);
}

// 解析 TAR 文件
function parseTar(buffer) {
  const entries = [];
  const view = new Uint8Array(buffer);
  let pos = 0;
  
  while (pos < buffer.byteLength - 512) {
    // 检查是否为空块（文件结束）
    let isEmpty = true;
    for (let i = 0; i < 512; i++) {
      if (view[pos + i] !== 0) { isEmpty = false; break; }
    }
    if (isEmpty) break;
    
    // 解析文件名（前100字节）
    let nameEnd = 100;
    while (nameEnd > 0 && view[pos + nameEnd - 1] === 0) nameEnd--;
    const name = new TextDecoder().decode(view.slice(pos, pos + nameEnd));
    
    // 解析文件大小（八进制，124-135字节）
    const sizeStr = new TextDecoder().decode(view.slice(pos + 124, pos + 136)).trim();
    const size = parseInt(sizeStr, 8) || 0;
    
    // 解析类型标志（第156字节）
    const typeFlag = String.fromCharCode(view[pos + 156]);
    
    if (name && typeFlag !== '5') { // 5=目录
      entries.push({
        name,
        size,
        offset: pos + 512,
        isFolder: false
      });
    }
    
    // 移动到下一个条目（512字节头 + 数据向上取整到512）
    pos += 512 + Math.ceil(size / 512) * 512;
  }
  
  return entries;
}

// 解压 gzip
async function decompressGzip(buffer) {
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(new Uint8Array(buffer));
  writer.close();
  
  const reader = ds.readable.getReader();
  const chunks = [];
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  
  const totalLen = chunks.reduce((s, c) => s + c.length, 0);
  const result = new Uint8Array(totalLen);
  let offset = 0;
  for (const chunk of chunks) {
    result.set(chunk, offset);
    offset += chunk.length;
  }
  return result;
}

/* ============================================================
   App: 囊匣 · 压缩包查看/解压
   ============================================================ */
const ArchiveApp = {
  currentPath: null,
  currentEntries: [],
  currentBuffer: null,
  
  open() {
    const root = document.createElement('div');
    root.style.cssText = 'flex:1;display:flex;flex-direction:column;width:100%;height:100%;';
    root.innerHTML = `
      <div class="editor-toolbar">
        <button class="fm-btn" id="ar-open">开</button>
        <button class="fm-btn primary" id="ar-extract" disabled>解压</button>
        <span class="editor-info" id="ar-info">未择 · —</span>
      </div>
      <div class="archive-viewer" id="ar-view" style="flex:1;display:flex;flex-direction:column;padding:10px;overflow:auto;">
        <div style="font-family:'Ma Shan Zheng',cursive;color:var(--willow-mist);font-size:48px;letter-spacing:0.3em;text-align:center;margin:auto;">
          囊匣<br><span style="font-size:14px;letter-spacing:0.2em;">— 双击书阁中之囊物以览 —</span>
        </div>
      </div>
    `;
    WindowManager.create({
      id: 'archive', title: '囊匣 · 压缩包',
      width: 640, height: 480, content: root
    });
    root.querySelector('#ar-open').onclick = () => {
      modal({
        title: '开启囊物', input: true, defaultValue: '/囊物/',
        onOk: async (path) => this.openFile(path)
      });
    };
    root.querySelector('#ar-extract').onclick = () => this.extractAll();
  },

  async openFile(path) {
    if (!QingSi.windows.archive) this.open();
    setTimeout(async () => {
      const blob = await QingSi.fs.readFile(path);
      if (!blob) return toast('错', '无此囊', 'error');
      
      this.currentPath = path;
      this.currentBuffer = await blob.arrayBuffer();
      const ext = path.split('.').pop().toLowerCase();
      
      try {
        let entries = [];
        
        if (ext === 'zip') {
          entries = await parseZip(this.currentBuffer);
        } else if (ext === 'tar') {
          entries = parseTar(this.currentBuffer);
        } else if (ext === 'gz' || ext === 'tgz') {
          // 先解压 gzip，再判断是否为 tar
          const decompressed = await decompressGzip(this.currentBuffer);
          this.currentBuffer = decompressed.buffer;
          
          // 检查是否为 tar（tgz）
          const tarName = path.replace(/\.(gz|tgz)$/i, '');
          if (tarName.endsWith('.tar')) {
            entries = parseTar(this.currentBuffer);
          } else {
            // 单文件 gzip
            entries = [{
              name: tarName.split('/').pop(),
              size: decompressed.length,
              singleFile: true
            }];
          }
        }
        
        this.currentEntries = entries;
        this.renderEntries(entries, path, blob.size);
        document.querySelector('#ar-extract').disabled = entries.length === 0;
        QingSi.prefs?.recordAccess(path);
        WindowManager.activate('archive');
      } catch (e) {
        toast('错', '解析失败: ' + e.message, 'error');
      }
    }, 50);
  },

  renderEntries(entries, path, originalSize) {
    const view = document.querySelector('#ar-view');
    const totalSize = entries.reduce((s, e) => s + (e.uncompressedSize || e.size || 0), 0);
    
    document.querySelector('#ar-info').textContent = `${path} · ${entries.length} 项 · ${fmtSize(originalSize)}`;
    
    if (entries.length === 0) {
      view.innerHTML = `<div style="text-align:center;color:var(--ink-soft);padding:20px;">空囊无物</div>`;
      return;
    }
    
    view.innerHTML = `
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;">
        共 ${entries.length} 项 · 解压后约 ${fmtSize(totalSize)}
      </div>
      <div class="archive-list" style="flex:1;overflow:auto;">
        ${entries.map((e, i) => `
          <div class="archive-item" data-idx="${i}" style="display:flex;align-items:center;padding:6px 8px;border-radius:4px;cursor:pointer;gap:8px;">
            <span style="font-size:16px;color:var(--gold);">笺</span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.name}</span>
            <span style="font-size:11px;color:var(--ink-soft);">${fmtSize(e.uncompressedSize || e.size || 0)}</span>
          </div>
        `).join('')}
      </div>
    `;
    
    // 双击预览单个文件
    view.querySelectorAll('.archive-item').forEach(el => {
      el.ondblclick = () => this.previewEntry(parseInt(el.dataset.idx));
    });
  },

  async previewEntry(idx) {
    const entry = this.currentEntries[idx];
    if (!entry) return;
    
    try {
      let data;
      
      if (entry.singleFile) {
        data = new Uint8Array(this.currentBuffer);
      } else if (entry.localOffset !== undefined) {
        // ZIP
        data = await extractZipEntry(this.currentBuffer, entry);
      } else if (entry.offset !== undefined) {
        // TAR
        data = new Uint8Array(this.currentBuffer, entry.offset, entry.size);
      }
      
      // 判断是否为文本
      const ext = entry.name.split('.').pop().toLowerCase();
      const textExts = ['txt','md','json','js','css','html','xml','csv','log','yml','yaml','ini','cfg','sh','py','rb','go','rs','java','c','cpp','h','sql','md','markdown'];
      
      if (textExts.includes(ext)) {
        const text = new TextDecoder().decode(data);
        modal({
          title: entry.name,
          body: `<pre style="max-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-all;font-size:12px;line-height:1.5;">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`,
          showCancel: false, okText: '阖'
        });
      } else {
        // 尝试作为图片预览
        const imgExts = ['png','jpg','jpeg','gif','webp','svg','bmp'];
        if (imgExts.includes(ext)) {
          const blob = new Blob([data], { type: getMimeType(entry.name) });
          const url = URL.createObjectURL(blob);
          modal({
            title: entry.name,
            body: `<img src="${url}" style="max-width:100%;max-height:400px;">`,
            showCancel: false, okText: '阖'
          });
        } else {
          toast('提示', `${entry.name} · ${fmtSize(data.length)} · 双击解压后查看`, 'info');
        }
      }
    } catch (e) {
      toast('错', '预览失败: ' + e.message, 'error');
    }
  },

  async extractAll() {
    if (!this.currentEntries.length || !this.currentPath) return;
    
    const basePath = QingSi.fs._parentPath(this.currentPath);
    const archiveName = this.currentPath.split('/').pop().replace(/\.[^.]+$/, '');
    const targetDir = basePath + '/' + archiveName;
    
    confirm('解压确认', `将解压至 ${targetDir}/，共 ${this.currentEntries.length} 项`, async () => {
      try {
        await QingSi.fs.mkdir(targetDir, true);
        let extracted = 0;
        
        for (const entry of this.currentEntries) {
          try {
            let data;
            
            if (entry.singleFile) {
              data = new Uint8Array(this.currentBuffer);
            } else if (entry.localOffset !== undefined) {
              data = await extractZipEntry(this.currentBuffer, entry);
            } else if (entry.offset !== undefined) {
              data = new Uint8Array(this.currentBuffer, entry.offset, entry.size);
            }
            
            if (data) {
              const filePath = targetDir + '/' + entry.name;
              // 确保父目录存在
              const parentDir = QingSi.fs._parentPath(filePath);
              await QingSi.fs.mkdir(parentDir, true);
              await QingSi.fs.writeFile(filePath, data);
              extracted++;
            }
          } catch (e) {
            console.warn('解压失败:', entry.name, e);
          }
        }
        
        toast('解压完成', `已解压 ${extracted} 项至 ${targetDir}`, 'success');
        QingSi.sync?.broadcast('fs:created', { path: targetDir, type: 'folder' });
      } catch (e) {
        toast('错', '解压失败: ' + e.message, 'error');
      }
    });
  }
};

/* ============================================================
   App: 终端(扩展四核命令)
   ============================================================ */
const TerminalApp = {
  cwd: '/',
  history: [],
  histIdx: -1,
  
  open() {
    // 恢复历史
    this.history = QingSi.prefs?.get('term:history', []) || [];
    
    const root = document.createElement('div');
    root.style.cssText = 'flex:1;display:flex;flex-direction:column;width:100%;height:100%;';
    root.innerHTML = `<div class="terminal-body" id="term-body"></div>`;
    
    WindowManager.create({
      id: 'terminal', title: '符令 · 终端',
      width: 680, height: 440, content: root
    });
    
    const body = root.querySelector('#term-body');
    this.body = body;
    this.println('青丝 OS · 符令 v' + QingSi.version, 'ok');
    this.println('四核纪元 · 输入 help 查看命令', 'dim');
    this.println('');
    this.prompt();
    
    body.onclick = () => {
      const inp = body.querySelector('.terminal-input');
      if (inp) inp.focus();
    };
  },
  
  println(text, cls = '') {
    const line = document.createElement('div');
    line.className = 'terminal-line';
    if (cls) {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = text;
      line.appendChild(span);
    } else line.textContent = text;
    this.body.appendChild(line);
    this.body.scrollTop = this.body.scrollHeight;
  },
  
  prompt() {
    const line = document.createElement('div');
    line.className = 'terminal-line terminal-input-line';
    line.innerHTML = `<span class="prompt">青丝</span><span class="path">${this.cwd}</span><span>›</span><input class="terminal-input" autofocus>`;
    this.body.appendChild(line);
    const inp = line.querySelector('.terminal-input');
    inp.focus();
    inp.onkeydown = async (e) => {
      if (e.key === 'Enter') {
        const cmd = inp.value;
        inp.disabled = true;
        line.querySelector('.terminal-input').replaceWith(document.createTextNode(cmd));
        if (cmd.trim()) {
          this.history.push(cmd);
          QingSi.prefs?.set('term:history', this.history.slice(-50));
          this.histIdx = this.history.length;
          await this.exec(cmd);
        }
        this.prompt();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (this.histIdx > 0) { this.histIdx--; inp.value = this.history[this.histIdx]; }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (this.histIdx < this.history.length - 1) { this.histIdx++; inp.value = this.history[this.histIdx]; }
        else { this.histIdx = this.history.length; inp.value = ''; }
      }
    };
    this.body.scrollTop = this.body.scrollHeight;
  },
  
  resolve(p) {
    if (!p) return this.cwd;
    if (p.startsWith('/')) return p === '/' ? '/' : p.replace(/\/+$/, '');
    if (p === '..') return QingSi.fs._parentPath(this.cwd) || '/';
    if (p === '.') return this.cwd;
    return this.cwd === '/' ? '/' + p : this.cwd + '/' + p;
  },
  
  async exec(cmdline) {
    const parts = cmdline.trim().split(/\s+/);
    const cmd = parts[0];
    const args = parts.slice(1);
    
    try {
      switch (cmd) {
        case 'help':
          this.println('━━━ 文件命令 ━━━', 'ok');
          this.println('  ls / cd / pwd / cat / mkdir / touch / rm / cp / mv');
          this.println('  echo <text> > <file>  / find <q> / tree [path]');
          this.println('━━━ 系统命令 ━━━', 'ok');
          this.println('  cores            — 查看四核状态');
          this.println('  stat             — 存储统计');
          this.println('  prefs [key val]  — 偏好读写');
          this.println('  cookies          — 查看 cookie');
          this.println('  drafts           — 查看草稿');
          this.println('  recent           — 最近访问');
          this.println('  clear / poem');
          break;
        case 'ls': {
          const p = this.resolve(args[0]);
          const items = await QingSi.fs.listChildren(p);
          if (!items.length) { this.println('  (空)', 'dim'); break; }
          for (const i of items.sort((a,b) => a.name.localeCompare(b.name))) {
            const mark = i.type === 'folder' ? '/' : '';
            const size = i.type === 'folder' ? '<DIR>' : fmtSize(i.size || 0);
            this.println(`  ${size.padEnd(10)} ${i.name}${mark}`, i.type === 'folder' ? 'ok' : '');
          }
          break;
        }
        case 'cd': {
          const p = this.resolve(args[0] || '/');
          const node = await QingSi.fs.getNode(p);
          if (!node) { this.println('  路径不存在', 'error'); break; }
          if (node.type !== 'folder') { this.println('  非目录', 'error'); break; }
          this.cwd = p;
          break;
        }
        case 'pwd': this.println('  ' + this.cwd); break;
        case 'cat': {
          if (!args[0]) { this.println('  用法: cat <file>', 'error'); break; }
          const text = await QingSi.fs.readFile(this.resolve(args[0]), true);
          if (text === null) { this.println('  无此笺', 'error'); break; }
          this.println(text);
          break;
        }
        case 'mkdir':
          if (!args[0]) { this.println('  用法: mkdir <path>', 'error'); break; }
          await QingSi.fs.mkdir(this.resolve(args[0]));
          this.println('  ✓ 已创建', 'ok');
          break;
        case 'touch':
          if (!args[0]) { this.println('  用法: touch <file>', 'error'); break; }
          await QingSi.fs.writeFile(this.resolve(args[0]), '');
          this.println('  ✓ 已创建', 'ok');
          break;
        case 'rm':
          if (!args[0]) { this.println('  用法: rm <path>', 'error'); break; }
          await QingSi.fs.delete(this.resolve(args[0]));
          this.println('  ✓ 已删除', 'ok');
          break;
        case 'cp':
          if (args.length < 2) { this.println('  用法: cp <src> <dst>', 'error'); break; }
          await QingSi.fs.copy(this.resolve(args[0]), this.resolve(args[1]));
          this.println('  ✓ 已复制', 'ok');
          break;
        case 'mv':
          if (args.length < 2) { this.println('  用法: mv <src> <dst>', 'error'); break; }
          await QingSi.fs.move(this.resolve(args[0]), this.resolve(args[1]));
          this.println('  ✓ 已移动', 'ok');
          break;
        case 'echo': {
          const idx = args.indexOf('>');
          if (idx > 0) {
            const text = args.slice(0, idx).join(' ').replace(/^["']|["']$/g, '');
            await QingSi.fs.writeFile(this.resolve(args[idx + 1]), text);
            this.println('  ✓ 已写入', 'ok');
          } else this.println('  ' + args.join(' '));
          break;
        }
        case 'find': {
          const q = args.join(' ');
          if (!q) { this.println('  用法: find <query>', 'error'); break; }
          const results = await QingSi.fs.search(q);
          if (!results.length) this.println('  无所获', 'dim');
          else for (const r of results) this.println('  ' + r.path);
          break;
        }
        case 'cores':
          this.println('━━━ 四核状态 ━━━', 'ok');
          this.println(`  [剑] OPFS         ${QingSi.cores.opfs ? '✓ 启用' : '✗ 缺席'}`, QingSi.cores.opfs ? 'ok' : 'error');
          this.println(`  [盾] IndexedDB    ${QingSi.cores.idb ? '✓ 启用' : '✗ 缺席'}`, QingSi.cores.idb ? 'ok' : 'error');
          this.println(`  [刃] localStorage ${QingSi.cores.ls ? '✓ 启用' : '✗ 缺席'}`, QingSi.cores.ls ? 'ok' : 'error');
          this.println(`  [笺] Cookie       ${QingSi.cores.ck ? '✓ 启用' : '✗ 缺席'}`, QingSi.cores.ck ? 'ok' : 'error');
          break;
        case 'stat': {
          const s = await QingSi.fs.stats();
          this.println(`  存储引擎: ${s.useOPFS ? 'OPFS + IDB' : 'IDB only'}`, 'ok');
          this.println(`  文件: ${s.fileCount} · 文件夹: ${s.folderCount} · 总量: ${fmtSize(s.totalSize)}`);
          if (s.quota) {
            this.println(`  浏览器配额: ${fmtSize(s.quota.usage || 0)} / ${fmtSize(s.quota.quota || 0)}`);
          }
          const lsUsage = QingSi.prefs?.getUsage();
          if (lsUsage) this.println(`  [刃] LS 占用: ${fmtSize(lsUsage.used)} (${lsUsage.items} 项)`);
          break;
        }
        case 'prefs': {
          if (args.length === 0) {
            this.println('━━━ 偏好 ━━━', 'ok');
            for (let i = 0; i < localStorage.length; i++) {
              const k = localStorage.key(i);
              if (k && k.startsWith('qs:pref:')) {
                this.println(`  ${k.slice(8)} = ${localStorage.getItem(k)}`);
              }
            }
          } else if (args.length === 1) {
            this.println(`  ${args[0]} = ${JSON.stringify(QingSi.prefs?.get(args[0]))}`);
          } else {
            QingSi.prefs?.set(args[0], args.slice(1).join(' '));
            this.println('  ✓ 已设置', 'ok');
          }
          break;
        }
        case 'cookies': {
          const cookies = QingSi.cookie?.listAll() || [];
          if (!cookies.length) this.println('  无', 'dim');
          else for (const c of cookies) this.println(`  ${c.name} = ${c.value}`);
          break;
        }
        case 'drafts': {
          const drafts = QingSi.prefs?.listDrafts() || [];
          if (!drafts.length) this.println('  无未藏草稿', 'dim');
          else for (const d of drafts) {
            this.println(`  ${d.path} · ${d.content.length} 字 · ${fmtRelTime(d.ts)}`);
          }
          break;
        }
        case 'recent': {
          const recent = QingSi.prefs?.getRecent() || [];
          if (!recent.length) this.println('  无近日记录', 'dim');
          else for (const r of recent) this.println(`  ${r.path} · ${fmtRelTime(r.ts)}`);
          break;
        }
        case 'tree': {
          await this.tree(this.resolve(args[0] || this.cwd), '');
          break;
        }
        case 'clear': this.body.innerHTML = ''; break;
        case 'poem': {
          const poems = [
            '【相思】红豆生南国,春来发几枝。愿君多采撷,此物最相思。',
            '【静夜思】床前明月光,疑是地上霜。举头望明月,低头思故乡。',
            '【鹿柴】空山不见人,但闻人语响。返景入深林,复照青苔上。',
          ];
          this.println('  ' + poems[Math.floor(Math.random() * poems.length)], 'ok');
          break;
        }
        case '': break;
        default: this.println('  未知命令: ' + cmd, 'error');
      }
    } catch (e) { this.println('  ✗ ' + e.message, 'error'); }
  },
  
  async tree(path, prefix) {
    const items = await QingSi.fs.listChildren(path);
    items.sort((a,b) => a.name.localeCompare(b.name));
    for (let i = 0; i < items.length; i++) {
      const last = i === items.length - 1;
      const item = items[i];
      this.println(prefix + (last ? '└─ ' : '├─ ') + item.name + (item.type === 'folder' ? '/' : ''),
        item.type === 'folder' ? 'ok' : '');
      if (item.type === 'folder') await this.tree(item.path, prefix + (last ? '   ' : '│  '));
    }
  }
};

  async export() {
    const all = await QingSi.fs.getAllNodes();
    const data = { 
      version: QingSi.version, exportedAt: Date.now(), 
      nodes: [], prefs: {}, cookies: QingSi.cookie?.listAll() || []
    };
    for (const n of all) {
      if (n.type === 'folder') data.nodes.push({ ...n, content: null });
      else {
        const blob = await QingSi.fs.readFile(n.path);
        const text = blob ? await blob.text().catch(() => null) : null;
        data.nodes.push({ ...n, content: text });
      }
    }
    // 收集 prefs
    if (QingSi.prefs?.available) {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k?.startsWith('qs:pref:')) data.prefs[k.slice(8)] = localStorage.getItem(k);
      }
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `qingsi-backup-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('导出', '四核全部资料已导出', 'success');
  },
  
  clearCache() {
    QingSi.cache?.invalidateAll();
    toast('已清', '缓存已洗',  'info');
    this.refresh();

  async syncOPFSToIDB() {
    const n = await QingSi.fs.syncOPFSToIDB();
    toast('剑→盾', n > 0 ? `已同步 ${n} 个文件至 IndexedDB` : 'OPFS 与 IDB 已一致', 'success');
  },
  
  async syncIDBToOPFS() {
    const n = await QingSi.fs.syncIDBToOPFS();
    toast('盾→剑', n > 0 ? `已同步 ${n} 个文件至 OPFS` : 'IDB 与 OPFS 已一致', 'success');
  },
  
  async verify() {
    const report = await QingSi.fs.verifyIntegrity();
    const issues = report.orphanNodes + report.missingBlobs + report.orphanBlobs;
    if (issues === 0) {
      toast('校验通过', '四核数据完整无损', 'success');
    } else {
      toast('校验完成', `发现 ${issues} 处问题,已修复 ${report.repaired} 处`, 'info');
    }
    this.refresh();
  },
  
  purge() {
    confirm('清空文件?', '所有文件与目录将被永久删除。', async () => {
      const all = await QingSi.fs.getAllNodes();
      for (const n of all) {
        if (n.path !== '/') await QingSi.fs._deleteNodeMeta(n.path).catch(() => {});
      }
      QingSi.fs._tx(['blobs'], 'readwrite').objectStore('blobs').clear();
      if (QingSi.fs.useOPFS) {
        for await (const [name] of QingSi.fs.opfsRoot.entries()) {
          await QingSi.fs.opfsRoot.removeEntry(name, { recursive: true }).catch(() => {});
        }
      }
      toast('已清', '万物归零', 'info');
      this.refresh();
      if (QingSi.windows.files) fileManager.refresh();
    });
  },
  
  purgeAll() {
    confirm('完全重置?', '将清空文件、偏好、草稿、Cookie 一切痕迹。', async () => {
      await this.purge();
      QingSi.prefs?.purgeAll();
      QingSi.cookie?.purgeAll();
      toast('已尽', '青丝重归空无', 'info');
      setTimeout(() => location.reload(), 1500);
    });
  }
};

/* ============================================================
   桌面交互 + 时钟 + 欢迎语
   ============================================================ */
function startClock() {
  const clock = document.getElementById('clock');
  const solar = document.getElementById('solar');
  const pad = n => String(n).padStart(2, '0');

  // 测量 0-9 每个数字的宽度，用细空格补齐到最宽数字宽度，消除数字不等宽抖动
  const digitWidths = {};
  let maxDigitW = 0;
  for (let d = 0; d <= 9; d++) {
    clock.textContent = String(d);
    const w = clock.offsetWidth;
    digitWidths[d] = w;
    if (w > maxDigitW) maxDigitW = w;
  }
  // 用 &#8202; (thin space) 补齐每个数字到等宽
  const thinSpace = '\u2009';
  const padDigit = (ch) => {
    const w = digitWidths[Number(ch)];
    if (w >= maxDigitW) return ch;
    // 测量 thin space 宽度
    clock.textContent = ch + thinSpace;
    const ws = clock.offsetWidth - w;
    if (ws <= 0) return ch;
    const need = Math.ceil((maxDigitW - w) / ws);
    return ch + thinSpace.repeat(need);
  };

  // 测量所有时间文本最大宽度，固定容器宽度
  const samples = [];
  for (const ap of ['上午','下午']) {
    for (let hr = 1; hr <= 12; hr++) {
      for (let mn = 0; mn <= 59; mn += 10) {
        for (let sc = 0; sc <= 59; sc += 10) {
          samples.push(`${ap} ${pad(hr)}:${pad(mn)}:${pad(sc)}`);
        }
      }
    }
  }
  let maxW = 0;
  for (const s of samples) {
    clock.textContent = s;
    const w = clock.offsetWidth;
    if (w > maxW) maxW = w;
  }
  clock.style.width = maxW + 'px';
  clock.style.textAlign = 'left';

  const update = () => {
    const d = new Date();
    const h = d.getHours();
    const ampm = h < 12 ? '上午' : '下午';
    const h12 = h % 12 || 12;
    const timeStr = `${pad(h12)}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    // 对每个数字补齐宽度
    const fixed = timeStr.replace(/\d/g, padDigit);
    clock.textContent = `${ampm} ${fixed}`;
    const months = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
    solar.textContent = months[d.getMonth()] + ' · ' + d.getDate() + '日';
  };
  update();
  setInterval(update, 1000);
}

function updateGreeting() {
  const name = QingSi.cookie?.get('user_name');
  const greet = document.getElementById('greeting');
  if (name && greet) {
    const h = new Date().getHours();
    const period = h < 6 ? '夜深' : h < 11 ? '早安' : h < 14 ? '午时' : h < 18 ? '午后' : h < 22 ? '晚安' : '夜深';
    greet.textContent = `${period},${name}`;
  } else if (greet) {
    greet.textContent = '';
  }
}

function bindAppLaunchers() {
  const launch = (app) => {
    switch (app) {
      case 'files': fileManager.open(); break;
      case 'editor': EditorApp.open(); break;
      case 'image': ImageApp.open(); break;
      case 'terminal': TerminalApp.open(); break;
      case 'storage': StorageApp.open(); break;
      case 'poem': PoemApp.open(); break;
      case 'settings': SettingsApp.open(); break;
    }
  };
  document.querySelectorAll('.desk-icon').forEach(el => {
    el.ondblclick = () => launch(el.dataset.app);
  });
  document.querySelectorAll('.dock-item').forEach(el => {
    el.onclick = () => {
      const app = el.dataset.app;
      if (QingSi.windows[app]) {
        const w = QingSi.windows[app];
        if (w.el.style.display === 'none') {
          WindowManager.activate(app);
        } else {
          w.el.style.display = 'none';
        }
      } else {
        launch(app);
      }
    };
  });
}

function showGlobalMenu(x, y, items) {
  document.querySelectorAll('.context-menu').forEach(m => m.remove());
  const menu = document.createElement('div');
  menu.className = 'context-menu';
  menu.innerHTML = items.map(i =>
    i.divider ? '<div class="ctx-divider"></div>' :
    `<div class="ctx-item ${i.danger ? 'danger' : ''}" data-act="${i.label}"><span style="opacity:0.5">${i.icon}</span> ${i.label}</div>`
  ).join('');
  menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - 300) + 'px';
  document.body.appendChild(menu);
  const realItems = items.filter(x => !x.divider);
  menu.querySelectorAll('.ctx-item').forEach((el, i) => {
    el.onclick = () => { realItems[i].action(); menu.remove(); };
  });
  setTimeout(() => {
    document.addEventListener('click', () => menu.remove(), { once: true });
  }, 10);
}

function bindGlobalContextMenus() {
  document.addEventListener('contextmenu', (e) => {
    if (e.target.closest('.fm-content') || e.target.closest('.fm-item') || e.target.closest('.fm-list-row')) return;
    if (e.target.closest('.context-menu')) return;

    // 文本编辑区域：开启原生右键时不拦截
    const textEl = (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.isContentEditable) ? e.target : null;
    if (textEl) {
      if (QingSi.prefs?.get('nativeContextMenu', false)) return;
      e.preventDefault();
      const selStart = textEl.selectionStart;
      const selEnd = textEl.selectionEnd;
      const hasSel = selStart !== undefined && selStart !== selEnd;
      const canUndo = textEl.tagName === 'TEXTAREA' || textEl.tagName === 'INPUT';
      const items = [
        { label: '撤', icon: '↩', action: () => document.execCommand('undo') },
        { label: '重', icon: '↪', action: () => document.execCommand('redo') },
        { divider: true },
        { label: '剪', icon: '✂', action: () => { if (hasSel) document.execCommand('cut'); } },
        { label: '复', icon: '⎘', action: () => { if (hasSel) document.execCommand('copy'); } },
        { label: '贴', icon: '⊕', action: async () => {
          try {
            const text = await navigator.clipboard.readText();
            if (!text) return;
            if (textEl.tagName === 'TEXTAREA' || textEl.tagName === 'INPUT') {
              const s = textEl.selectionStart, e2 = textEl.selectionEnd;
              textEl.setRangeText(text, s, e2, 'end');
              textEl.dispatchEvent(new Event('input', { bubbles: true }));
            } else if (textEl.isContentEditable) {
              document.execCommand('insertText', false, text);
            }
          } catch(err) { /* 剪贴板权限被拒绝 */ }
        }},
        { divider: true },
        { label: '全选', icon: '▣', action: () => { textEl.focus(); textEl.select(); } },
        { divider: true },
        { label: '删', icon: '⌫', action: () => {
          if (hasSel && textEl.value !== undefined) {
            const s = textEl.selectionStart, e2 = textEl.selectionEnd;
            textEl.value = textEl.value.substring(0, s) + textEl.value.substring(e2);
            textEl.selectionStart = textEl.selectionEnd = s;
            textEl.dispatchEvent(new Event('input', { bubbles: true }));
          }
        }},
      ];
      showGlobalMenu(e.clientX, e.clientY, items);
      return;
    }

    e.preventDefault();

    const launch = (app) => {
      switch (app) {
        case 'files': fileManager.open(); break;
        case 'editor': EditorApp.open(); break;
        case 'image': ImageApp.open(); break;
        case 'audio': AudioApp.open(); break;
        case 'video': VideoApp.open(); break;
        case 'pdf': PdfApp.open(); break;
        case 'archive': ArchiveApp.open(); break;
        case 'terminal': TerminalApp.open(); break;
        case 'storage': StorageApp.open(); break;
        case 'poem': PoemApp.open(); break;
        case 'settings': SettingsApp.open(); break;
      }
    };

    const appNames = {
      files: '书阁', editor: '笔砚', image: '画轩',
      audio: '乐坊', video: '影阁', pdf: '卷轴', archive: '囊匣',
      terminal: '符令', storage: '仓廪', poem: '诗笺', settings: '设阁'
    };

    const deskIcon = e.target.closest('.desk-icon');
    if (deskIcon) {
      const app = deskIcon.dataset.app;
      showGlobalMenu(e.clientX, e.clientY, [
        { label: '启 ' + (appNames[app] || ''), icon: '◎', action: () => launch(app) },
        { divider: true },
        { label: '略', icon: '☰', action: () => toast(appNames[app], '青丝 OS · 四核纪元', 'info') }
      ]);
      return;
    }

    const dockItem = e.target.closest('.dock-item');
    if (dockItem) {
      const app = dockItem.dataset.app;
      const isOpen = !!QingSi.windows[app];
      showGlobalMenu(e.clientX, e.clientY, [
        { label: isOpen ? '转 ' + (appNames[app] || '') : '启 ' + (appNames[app] || ''), icon: '◎', action: () => launch(app) },
        ...(isOpen ? [{ label: '阖', icon: '✕', action: () => WindowManager.close(app), danger: true }] : [])
      ]);
      return;
    }

    const topbar = e.target.closest('#topbar');
    if (topbar) {
      const dark = QingSi.prefs?.get('darkMode', false);
      showGlobalMenu(e.clientX, e.clientY, [
        { label: dark ? '昼明' : '夜阑', icon: dark ? '☀' : '☾', action: () => {
          QingSi.prefs?.set('darkMode', !dark);
          applyTheme();
          toast(!dark ? '夜阑' : '昼明', !dark ? '已入暗色之境' : '已回光明之境', 'info');
        }},
        { divider: true },
        { label: '设阁', icon: '⚙', action: () => launch('settings') }
      ]);
      return;
    }

    const sidebar = e.target.closest('.fm-sidebar');
    if (sidebar) {
      const treeItem = e.target.closest('.fm-tree-item');
      if (treeItem) {
        const path = treeItem.dataset.path;
        showGlobalMenu(e.clientX, e.clientY, [
          { label: '入', icon: '◎', action: () => { fileManager.currentPath = path; fileManager.refresh(); }},
          { label: '新册', icon: '+', action: () => {
            modal({ title: '新册', input: true, defaultValue: '未名册', onOk: async (name) => {
              if (!name?.trim()) return;
              try {
                await QingSi.fs.mkdir(path + (path.endsWith('/') ? '' : '/') + name.trim());
                fileManager.refresh();
                toast('已建', name, 'success');
              } catch(e) { toast('建册失败', e.message, 'error'); }
            }});
          }},
          { divider: true },
          { label: '刷新', icon: '↻', action: () => fileManager.refresh() }
        ]);
      } else {
        showGlobalMenu(e.clientX, e.clientY, [
          { label: '新册', icon: '+', action: () => fileManager.newFolder() },
          { label: '新笺', icon: '+', action: () => fileManager.newFile() },
          { divider: true },
          { label: '刷新', icon: '↻', action: () => fileManager.refresh() }
        ]);
      }
      return;
    }


    const windowEl = e.target.closest('.window');
    if (windowEl) {
      const winId = windowEl.id.replace('win-', '');
      showGlobalMenu(e.clientX, e.clientY, [
        { label: '隐', icon: '▬', action: () => { windowEl.style.display = 'none'; }},
        { label: windowEl.dataset.maximized ? '还' : '展', icon: '▢', action: () => WindowManager.maximize(winId) },
        { divider: true },
        { label: '阖', icon: '✕', action: () => WindowManager.close(winId), danger: true }
      ]);
      return;
    }

    const desktop = e.target.closest('#desktop');
    if (desktop) {
      showGlobalMenu(e.clientX, e.clientY, [
        { label: '书阁', icon: '册', action: () => launch('files') },
        { label: '笔砚', icon: '墨', action: () => launch('editor') },
        { label: '画轩', icon: '画', action: () => launch('image') },
        { label: '符令', icon: '令', action: () => launch('terminal') },
        { divider: true },
        { label: '仓廪', icon: '仓', action: () => launch('storage') },
        { label: '诗笺', icon: '诗', action: () => launch('poem') },
        { divider: true },
        { label: '设阁', icon: '设', action: () => launch('settings') },
        { divider: true },
        { label: QingSi.prefs?.get('darkMode', false) ? '昼明' : '夜阑', icon: QingSi.prefs?.get('darkMode', false) ? '☀' : '☾', action: () => {
          const dark = QingSi.prefs?.get('darkMode', false);
          QingSi.prefs?.set('darkMode', !dark);
          applyTheme();
          toast(!dark ? '夜阑' : '昼明', !dark ? '已入暗色之境' : '已回光明之境', 'info');
        }}
      ]);
      return;
    }

    showGlobalMenu(e.clientX, e.clientY, [
      { label: '设阁', icon: '设', action: () => launch('settings') }
    ]);
  });
}

function checkProtocolBanner() {
