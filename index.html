  _tx(stores, mode = 'readonly') {
    return this.db.transaction(stores, mode);
  }

  async getNode(path) {
    path = this._normalizePath(path);
    // ── 挂载点路由 ──
    const mount = this._resolveMount(path);
    if (mount) {
      return await mount.mountFS.getNode(mount.relativePath);
    }
    // ── 挂载点根目录 ──
    if (this._mounts.has(path)) {
      const fs = this._mounts.get(path);
      return { path, name: fs.mountName, type: 'folder', parent: this._parentPath(path), size: 0, modified: Date.now(), created: Date.now(), _isMountPoint: true, _isLocal: true };
    }
    // ── /mnt/local 目录 ──
    if (path === '/mnt/local' || path === '/mnt') {
      const node = await this._getNodeVirtual(path);
      if (node) return node;
      return { path, name: this._basename(path), type: 'folder', parent: this._parentPath(path), size: 0, modified: Date.now(), created: Date.now(), _isLocal: true };
    }
    return this._getNodeVirtual(path);
  }

  async _getNodeVirtual(path) {
    return new Promise((resolve, reject) => {
      const req = this._tx(['nodes']).objectStore('nodes').get(path);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async _putNode(node) {
    return new Promise((resolve, reject) => {
      const req = this._tx(['nodes'], 'readwrite').objectStore('nodes').put(node);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async _deleteNodeMeta(path) {
    return new Promise((resolve, reject) => {
      const req = this._tx(['nodes'], 'readwrite').objectStore('nodes').delete(path);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async listChildren(path) {
    path = this._normalizePath(path);
    // ── 挂载点路由 ──
    const mount = this._resolveMount(path);
    if (mount) {
      const children = await mount.mountFS.listChildren(mount.relativePath);
      // 将相对路径重写为完整虚拟路径
      const prefix = mount.mountPoint;
      for (const c of children) {
        c.path = prefix + c.path;
        c.parent = prefix + (c.parent || '/');
      }
      return children;
    }
    // ── 挂载点根目录：合并虚拟子项和挂载点 ──
    if (path === this._mountPrefix.replace(/\/$/, '') || path === '/mnt/local') {
      const virtualChildren = await this._listChildrenVirtual(path);
      const mountPoints = new Set(this._mounts.keys());
      // 过滤掉已在挂载点中的虚拟节点，避免重复
      const filtered = virtualChildren.filter(c => !mountPoints.has(c.path));
      for (const [point, fs] of this._mounts) {
        const name = fs.mountName;
        filtered.push({
          path: point, name, type: 'folder',
          parent: path, size: 0,
          modified: Date.now(), created: Date.now(), _isMountPoint: true, _isLocal: true
        });
      }
      return filtered;
    }
    // ── /mnt 目录：显示 local 子目录 ──
    if (path === '/mnt') {
      const children = [];
      const hasMounts = this._mounts.size > 0;
      const localNode = await this.getNode('/mnt/local');
      if (localNode || hasMounts) {
        children.push({
          path: '/mnt/local', name: 'local', type: 'folder',
          parent: '/mnt', size: 0,
          modified: localNode?.modified || Date.now(), created: localNode?.created || Date.now(), _isLocal: true
        });
      }
      return children;
    }
    return new Promise((resolve, reject) => {
      const tx = this._tx(['nodes']);
      const idx = tx.objectStore('nodes').index('parent');
      const req = idx.getAll(path);
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  async _listChildrenVirtual(path) {
    return new Promise((resolve, reject) => {
      const tx = this._tx(['nodes']);
      const idx = tx.objectStore('nodes').index('parent');
      const req = idx.getAll(path);
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  async getAllNodes() {
    return new Promise((resolve, reject) => {
      const req = this._tx(['nodes']).objectStore('nodes').getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  async _writeBlob(path, data) {
    if (this.useOPFS) {
      let writable;
      try {
        const handle = await this._getOPFSFile(path, true);
        writable = await handle.createWritable();
        await writable.write(data);
        await writable.close();
        writable = null;
        try {
          await this._syncBlobToIDB(path, data);
        } catch(e) { console.warn('[青丝] OPFS→IDB 同步失败:', e); }
        return;
      } catch (e) {
        if (writable) { try { await writable.abort(); } catch(_) {} }
        console.warn('OPFS 写入失败,回退 IDB:', e);
      }
    }
    return new Promise((resolve, reject) => {
      const req = this._tx(['blobs'], 'readwrite').objectStore('blobs').put({ path, data });
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async _syncBlobToIDB(path, data) {
    return new Promise((resolve, reject) => {
      const req = this._tx(['blobs'], 'readwrite').objectStore('blobs').put({ path, data });
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async _readBlob(path) {
    if (this.useOPFS) {
      try {
        const handle = await this._getOPFSFile(path, false);
        if (handle) {
          const file = await handle.getFile();
          if (file && file.size > 0) return file;
        }
      } catch (e) { console.warn('[青丝] OPFS 读取失败,回退 IDB:', path, e); }
    }
    return new Promise((resolve, reject) => {
      const req = this._tx(['blobs']).objectStore('blobs').get(path);
      req.onsuccess = () => {
        const r = req.result;
        if (!r) return resolve(null);
        if (r.data instanceof Blob) resolve(r.data);
        else resolve(new Blob([r.data]));
      };
      req.onerror = () => reject(req.error);
    });
  }

  async _deleteBlob(path) {
    if (this.useOPFS) {
      try {
        const parts = path.split('/').filter(Boolean);
        const fileName = parts.pop();
        let dir = this.opfsRoot;
        for (const p of parts) {
          dir = await dir.getDirectoryHandle(p, { create: false }).catch(() => null);
          if (!dir) break;
        }
        if (dir) await dir.removeEntry(fileName).catch(() => {});
      } catch (e) { console.warn('[青丝] OPFS 删除失败:', path, e); }
    }
    return new Promise((resolve) => {
      const req = this._tx(['blobs'], 'readwrite').objectStore('blobs').delete(path);
      req.onsuccess = () => resolve();
      req.onerror = () => { console.warn('[青丝] IDB blob 删除失败:', path, req.error); resolve(); };
    });
  }

  async _getOPFSFile(path, create = false) {
    const parts = path.split('/').filter(Boolean);
    if (parts.length === 0) throw new Error('OPFS 不支持根路径操作');
    const fileName = parts.pop();
    let dir = this.opfsRoot;
    for (const p of parts) {
      dir = await dir.getDirectoryHandle(p, { create });
    }
    return await dir.getFileHandle(fileName, { create });
  }

  _parentPath(path) {
    if (path === '/') return null;
    const i = path.lastIndexOf('/');
    return i === 0 ? '/' : path.substring(0, i);
  }

  _basename(path) { return path.split('/').filter(Boolean).pop() || '/'; }

  _join(parent, name) {
    return parent === '/' ? '/' + name : parent + '/' + name;
  }

  _detectType(name) {
    const ext = name.split('.').pop().toLowerCase();
    // 图像
    if (['png','jpg','jpeg','gif','webp','svg','bmp','ico','tiff','tif','avif','apng'].includes(ext)) return 'image';
    // 音频（浏览器可播放）
    if (['mp3','wav','ogg','m4a','flac','aac','opus','mid','midi','au','snd'].includes(ext)) return 'audio';
    // 视频（浏览器可播放）
    if (['mp4','webm','ogv','m4v'].includes(ext)) return 'video';
    // PDF
    if (['pdf'].includes(ext)) return 'pdf';
    // CSV/TSV 表格
    if (['csv','tsv'].includes(ext)) return 'csv';
    // 文本（代码、配置、文档、网页等统一为 text）
    if (['txt','md','markdown','rst','tex','log','adoc','asciidoc','org','wiki','textile',
         'html','htm','xhtml','css','scss','sass','less','styl',
         'js','ts','jsx','tsx','mjs','cjs',
         'py','rb','go','rs','java','c','cpp','h','hpp','cs','php','swift','kt','scala',
         'sh','bash','zsh','fish','ps1','bat','cmd',
         'lua','r','pl','sql','dart','vue','svelte','asm','v','vhd','tcl','m','mm',
         'json','json5','xml','yaml','yml','toml','ini','cfg','conf','env',
         'properties','gradle','cmake','lock',
         'gitignore','editorconfig','eslintrc','prettierrc','babelrc','dockerfile','makefile'].includes(ext)) return 'text';
    // 压缩包（实际可解压的格式）
    if (['zip','tar','gz','tgz'].includes(ext)) return 'archive';
    return 'binary';
  }

  async exists(path) {
    path = this._normalizePath(path);
    // ── 挂载点路由 ──
    const mount = this._resolveMount(path);
    if (mount) {
      return await mount.mountFS.exists(mount.relativePath);
    }
    if (this._mounts.has(path)) return true;
    return !!(await this._getNodeVirtual(path));
  }

  async _checkQuota(requiredBytes) {
    if (navigator.storage && navigator.storage.estimate) {
      try {
        const est = await navigator.storage.estimate();
        if (est.quota && est.usage !== undefined) {
          const available = est.quota - est.usage;
          if (available < requiredBytes * 1.5) {
            throw new Error('存储空间不足,剩余 ' + fmtSize(available));
          }
        }
      } catch(e) {
        if (e.message.includes('存储空间不足')) throw e;
      }
    }
  }

  async mkdir(path, recursive = true) {
    path = this._normalizePath(path);
    if (!path || path === '/') throw new Error('根目录已存');
    // ── 挂载点路由 ──
    const mount = this._resolveMount(path);
    if (mount) {
      await mount.mountFS.mkdir(mount.relativePath);
      QingSi.sync?.broadcast('fs:created', { path, type: 'folder' });
      QingSi.cache?.invalidate(mount.mountPoint);
      return;
    }
    const unlock = await this._acquireLock(path);
    try {
      if (await this.exists(path)) return;
      const parent = this._parentPath(path);
      if (parent && parent !== '/' && !(await this.exists(parent))) {
        if (recursive) await this.mkdir(parent);
        else throw new Error('父目录不存在: ' + parent);
      }
      if (this.useOPFS) {
        try {
          const parts = path.split('/').filter(Boolean);
          let dir = this.opfsRoot;
          for (const p of parts) {
            dir = await dir.getDirectoryHandle(p, { create: true });
          }
        } catch (e) {}
      }
      await this._putNode({
        path, name: this._basename(path), type: 'folder', parent,
        created: Date.now(), modified: Date.now(), size: 0
      });
      QingSi.sync?.broadcast('fs:created', { path, type: 'folder' });
      QingSi.cache?.invalidate(parent || '/');
    } finally {
      unlock();
    }
  }

  async writeFile(path, content) {
    path = this._normalizePath(path);
    if (!path || path === '/') throw new Error('路径不可为空');
    // ── 挂载点路由 ──
    const mount = this._resolveMount(path);
    if (mount) {
      await mount.mountFS.writeFile(mount.relativePath, content);
      QingSi.sync?.broadcast('fs:written', { path });
      QingSi.cache?.invalidate(mount.mountPoint);
      return;
    }
    const name = this._basename(path);
    if (!name || /[\/\\:*?"<>|]/.test(name)) throw new Error('文件名不合法: ' + name);
    const unlock = await this._acquireLock(path);
    try {
      const parent = this._parentPath(path);
      if (parent && parent !== '/' && !(await this.exists(parent))) await this.mkdir(parent);
      let blob;
      if (content instanceof Blob) blob = content;
      else if (content instanceof ArrayBuffer) blob = new Blob([content]);
      else if (content instanceof Uint8Array) blob = new Blob([content]);
      else blob = new Blob([String(content)], { type: 'text/plain' });
      
      await this._checkQuota(blob.size);
      await this._writeBlob(path, blob);
      const existing = await this.getNode(path);
      await this._putNode({
        path, name, type: this._detectType(name), parent,
        created: existing?.created || Date.now(), modified: Date.now(), size: blob.size, mime: blob.type
      });
      QingSi.sync?.broadcast('fs:written', { path });
      QingSi.cache?.invalidate(parent || '/');
    } finally {
      unlock();
    }
  }

  async readFile(path, asText = false) {
    path = this._normalizePath(path);
    // ── 挂载点路由 ──
    const mount = this._resolveMount(path);
    if (mount) {
      return await mount.mountFS.readFile(mount.relativePath, asText);
    }
    const node = await this.getNode(path);
    if (!node) return null;
    if (node.type === 'folder') throw new Error('不可读取文件夹: ' + path);
    const blob = await this._readBlob(path);
    if (!blob) return null;
    if (asText) return await blob.text();
    return blob;
  }

  async delete(path) {
    path = this._normalizePath(path);
    if (!path || path === '/') throw new Error('不可删除根目录');
    // ── 防止删除挂载点根目录 ──
    if (this._mounts.has(path)) throw new Error('不可删除挂载点根目录，请使用卸载功能');
    // ── 挂载点路由 ──
    const mount = this._resolveMount(path);
    if (mount) {
      await mount.mountFS.delete(mount.relativePath);
      QingSi.sync?.broadcast('fs:deleted', { path });
      QingSi.cache?.invalidate(mount.mountPoint);
      return;
    }
    const enableTrash = QingSi.prefs?.get('enableTrash', false);
    const unlock = await this._acquireLock(path);
    try {
      const node = await this.getNode(path);
      if (!node) throw new Error('不存在: ' + path);
      // 回收站启用时保存 blob 数据以支持恢复
      let savedBlob = null;
      let savedChildren = null;
      if (enableTrash) {
        if (node.type !== 'folder') {
          try { savedBlob = await this._readBlob(path); } catch(_) {}
        } else {
          // 递归收集文件夹内所有子节点的 blob，以便恢复
          savedChildren = [];
          const collectChildren = async (dirPath) => {
            const children = await this.listChildren(dirPath);
            for (const c of children) {
              const entry = { ...c };
              if (c.type === 'folder') {
                await collectChildren(c.path);
              } else {
                try { entry._blob = await this._readBlob(c.path); } catch(_) {}
              }
              savedChildren.push(entry);
            }
          };
          try { await collectChildren(path); } catch(_) {}
        }
      }
      this._trash.push({ ...node, _trashedAt: Date.now(), _blob: savedBlob, _children: savedChildren });
      if (this._trash.length > 50) this._trash.shift();
      if (node.type === 'folder') {
        const children = await this.listChildren(path);
        const errors = [];
        for (const c of children) {
          try { await this.delete(c.path); }
          catch (e) { errors.push({ child: c.path, error: e.message }); }
        }
        if (errors.length > 0) {
          console.warn(`[青丝] 删除文件夹 ${path} 时 ${errors.length} 个子项失败:`, errors);
        }
      } else {
        await this._deleteBlob(path);
      }
      await this._deleteNodeMeta(path);
      QingSi.prefs?.removeDraft(path);
      QingSi.sync?.broadcast('fs:deleted', { path });
      QingSi.cache?.invalidate(this._parentPath(path) || '/');
    } catch (e) {
      QingSi.cache?.invalidate(this._parentPath(path) || '/');
      throw e;
    } finally {
      unlock();
    }
  }

  async rename(oldPath, newName) {
    oldPath = this._normalizePath(oldPath);
    // ── 挂载点路由 ──
    const mount = this._resolveMount(oldPath);
    if (mount) {
      await mount.mountFS.rename(mount.relativePath, newName);
      QingSi.sync?.broadcast('fs:moved', { from: oldPath, to: this._join(this._parentPath(oldPath), newName) });
      QingSi.cache?.invalidate(mount.mountPoint);
      return;
    }
    const node = await this.getNode(oldPath);
    if (!node) throw new Error('不存在');
    if (!newName || !newName.trim()) throw new Error('新名不可为空');
    newName = newName.trim();
    if (/[\/\\:*?"<>|]/.test(newName)) throw new Error('文件名不合法: ' + newName);
    const parent = this._parentPath(oldPath);
    const newPath = this._join(parent, newName);
    if (oldPath === newPath) return;
    if (await this.exists(newPath)) throw new Error('新名已存在');
    // 内联重命名逻辑，避免调用 move() 导致锁嵌套死锁
    const unlock = await this._acquireLock(oldPath);
    try {
      if (node.type === 'folder') {
        const children = await this.listChildren(oldPath);
        const newParent = this._parentPath(newPath);
        // 更新文件夹节点
        await this._putNode({ ...node, path: newPath, name: newName, parent: newParent, modified: Date.now() });
        // 内联更新所有子节点路径（重命名只改路径前缀，不移动 blob）
        const updatedChildren = [];
        const errors = [];
        const updateChildPaths = async (srcPrefix, dstPrefix) => {
          const kids = await this.listChildren(srcPrefix);
          for (const c of kids) {
            try {
              const relPath = c.path.substring(srcPrefix.length);
              const newChildPath = dstPrefix + relPath;
              const newChildParent = this._parentPath(newChildPath);
              const updatedNode = { ...c, path: newChildPath, parent: newChildParent, modified: Date.now() };
              await this._putNode(updatedNode);
              updatedChildren.push({ oldPath: c.path, node: c, newPath: newChildPath });
              if (c.type === 'folder') {
                await updateChildPaths(c.path, newChildPath);
              }
            } catch (e) {
              errors.push({ child: c.path, error: e.message });
            }
          }
        };
        await updateChildPaths(oldPath, newPath);
        if (errors.length > 0) {
          // 回滚：恢复所有已更新的子节点路径
          for (const u of updatedChildren) {
            try { await this._putNode(u.node); } catch(_) {}
          }
          await this._putNode(node); // 恢复原文件夹节点
          throw new Error(`重命名文件夹失败: ${errors.length} 个子项更新失败`);
        }
        await this._deleteNodeMeta(oldPath);
      } else {
        const blob = await this._readBlob(oldPath);
        if (blob) await this._writeBlob(newPath, blob);
        await this._deleteBlob(oldPath);
        const newParent = this._parentPath(newPath);
        await this._putNode({ ...node, path: newPath, name: newName, parent: newParent, modified: Date.now() });
        await this._deleteNodeMeta(oldPath);
      }
      QingSi.sync?.broadcast('fs:moved', { from: oldPath, to: newPath });
      QingSi.cache?.invalidate(parent || '/');
      QingSi.cache?.invalidate(this._parentPath(newPath) || '/');
    } finally {
      unlock();
    }
  }

  async move(oldPath, newPath) {
    oldPath = this._normalizePath(oldPath);
    newPath = this._normalizePath(newPath);
    if (oldPath === newPath) return;
    if (newPath.startsWith(oldPath + '/')) throw new Error('不可移入自身子目录');
    // ── 防止移动挂载点根目录 ──
    if (this._mounts.has(oldPath)) throw new Error('不可移动挂载点根目录，请先卸载');
    if (this._mounts.has(newPath)) throw new Error('目标路径是挂载点根目录');
    // ── 挂载点路由 ──
    const oldMount = this._resolveMount(oldPath);
    const newMount = this._resolveMount(newPath);
    // 同一挂载点内移动
    if (oldMount && newMount && oldMount.mountPoint === newMount.mountPoint) {
      // 本地文件系统内移动 = copy + delete
      await oldMount.mountFS.copy(oldMount.relativePath, newMount.relativePath);
      await oldMount.mountFS.delete(oldMount.relativePath);
      QingSi.sync?.broadcast('fs:moved', { oldPath, newPath });
      QingSi.cache?.invalidate(oldMount.mountPoint);
      return;
    }
    // 跨挂载点或虚拟↔本地移动 = 读取+写入+删除
    if (oldMount || newMount) {
      const node = await this.getNode(oldPath);
      if (!node) throw new Error('不存在: ' + oldPath);
      if (node.type === 'folder') {
        // 递归复制文件夹内容
        const children = await this.listChildren(oldPath);
        await this.mkdir(newPath, true);
        for (const c of children) {
          await this.move(c.path, this._join(newPath, c.name));
        }
        await this.delete(oldPath);
      } else {
        const blob = await this.readFile(oldPath);
        if (blob) await this.writeFile(newPath, blob);
        await this.delete(oldPath);
      }
      QingSi.sync?.broadcast('fs:moved', { oldPath, newPath });
      QingSi.cache?.invalidate(this._parentPath(oldPath) || '/');
      QingSi.cache?.invalidate(this._parentPath(newPath) || '/');
      return;
    }
    // 按字典序获取锁，避免 AB-BA 死锁
    const [first, second] = oldPath < newPath ? [oldPath, newPath] : [newPath, oldPath];
    const unlock1 = await this._acquireLock(first);
    const unlock2 = await this._acquireLock(second);
    const unlockOld = () => { oldPath < newPath ? unlock1() : unlock2(); };
    const unlockNew = () => { oldPath < newPath ? unlock2() : unlock1(); };
    try {
      const node = await this.getNode(oldPath);
      if (!node) throw new Error('不存在: ' + oldPath);
      const newParent = this._parentPath(newPath);
      if (newParent && newParent !== '/' && !(await this.exists(newParent))) {
        await this.mkdir(newParent);
      }
      if (node.type === 'folder') {
        const children = await this.listChildren(oldPath);
        const targetExists = await this.exists(newPath);
        // 如果目标已存在，先保存目标节点以便回滚时恢复
        let targetNodeBackup = null;
        if (targetExists) {
          targetNodeBackup = await this.getNode(newPath);
        }
        // 先移动所有内容到新位置
        await this._putNode({
          ...node, path: newPath, name: this._basename(newPath),
          parent: newParent, modified: Date.now()
        });
        const movedChildren = [];
        const errors = [];
        for (const c of children) {
          try {
            await this.move(c.path, this._join(newPath, c.name));
            movedChildren.push(c);
          } catch (e) {
            errors.push({ child: c.path, error: e.message });
          }
        }
        if (errors.length > 0) {
          // 部分失败：回滚已移动的子节点
          for (const c of movedChildren) {
            try { await this.move(this._join(newPath, c.name), c.path); } catch(_) {}
          }
          await this._deleteNodeMeta(newPath);
          if (targetNodeBackup) {
            // 恢复被覆盖的目标节点
            await this._putNode(targetNodeBackup);
          }
          throw new Error(`移动文件夹失败: ${errors.length} 个子项移动失败`);
        }
        await this._deleteNodeMeta(oldPath);
      } else {
        const blob = await this._readBlob(oldPath);
        if (blob) await this._writeBlob(newPath, blob);
        // 先确保新位置写入成功，再删除旧位置
        await this._deleteBlob(oldPath);
        await this._putNode({
          ...node, path: newPath, name: this._basename(newPath),
          parent: newParent, modified: Date.now()
        });
        await this._deleteNodeMeta(oldPath);
      }
      QingSi.sync?.broadcast('fs:moved', { oldPath, newPath });
      QingSi.cache?.invalidate(this._parentPath(oldPath) || '/');
      QingSi.cache?.invalidate(newParent || '/');
    } finally {
      unlockNew();
      unlockOld();
    }
  }

  async copy(srcPath, destPath) {
    srcPath = this._normalizePath(srcPath);
    destPath = this._normalizePath(destPath);
    if (srcPath === destPath) throw new Error('源与目标相同');
    if (destPath.startsWith(srcPath + '/')) throw new Error('不可复制到自身子目录');
    // ── 挂载点路由 ──
    const srcMount = this._resolveMount(srcPath);
    const destMount = this._resolveMount(destPath);
    // 同一挂载点内复制
    if (srcMount && destMount && srcMount.mountPoint === destMount.mountPoint) {
      await srcMount.mountFS.copy(srcMount.relativePath, destMount.relativePath);
      QingSi.sync?.broadcast('fs:copied', { srcPath, destPath });
      QingSi.cache?.invalidate(srcMount.mountPoint);
      return;
    }
    // 跨挂载点或虚拟↔本地复制 = 读取+写入
    if (srcMount || destMount) {
      const node = await this.getNode(srcPath);
      if (!node) throw new Error('源不存在: ' + srcPath);
      const destParent = this._parentPath(destPath);
      if (destParent && destParent !== '/' && !(await this.exists(destParent))) {
        await this.mkdir(destParent);
      }
      if (node.type === 'folder') {
        await this.mkdir(destPath);
        const children = await this.listChildren(srcPath);
        for (const c of children) {
          await this.copy(c.path, this._join(destPath, c.name));
        }
      } else {
        const blob = await this.readFile(srcPath);
        if (blob) {
          await this.writeFile(destPath, blob);
        }
      }
      QingSi.sync?.broadcast('fs:copied', { srcPath, destPath });
      QingSi.cache?.invalidate(this._parentPath(destPath) || '/');
      return;
    }
    // 按字典序获取锁，避免死锁
    const [first, second] = srcPath < destPath ? [srcPath, destPath] : [destPath, srcPath];
    const unlock1 = await this._acquireLock(first);
    const unlock2 = await this._acquireLock(second);
    try {
      const node = await this.getNode(srcPath);
      if (!node) throw new Error('源不存在: ' + srcPath);
      const destParent = this._parentPath(destPath);
      if (destParent && destParent !== '/' && !(await this.exists(destParent))) {
        await this.mkdir(destParent);
      }
      if (node.type === 'folder') {
        await this.mkdir(destPath);
        const children = await this.listChildren(srcPath);
        for (const c of children) {
          await this.copy(c.path, this._join(destPath, c.name));
        }
      } else {
        const blob = await this._readBlob(srcPath);
        const data = blob || new Blob(['']);
        await this._checkQuota(data.size);
        await this._writeBlob(destPath, data);
        const destName = this._basename(destPath);
        const existing = await this.getNode(destPath);
        await this._putNode({
          path: destPath, name: destName, type: this._detectType(destName), parent: destParent,
          created: existing?.created || Date.now(), modified: Date.now(), size: data.size, mime: data.type
        });
      }
      QingSi.sync?.broadcast('fs:copied', { srcPath, destPath });
      QingSi.cache?.invalidate(destParent || '/');
    } finally {
      unlock2();
      unlock1();
    }
  }

  async search(query, root = '/') {
    root = this._normalizePath(root);
    const results = [];
    // ── 搜索虚拟文件系统 ──
    const all = await this.getAllNodes();
    const q = query.toLowerCase();
    for (const n of all) {
      if (n.path !== '/' && n.name.toLowerCase().includes(q) && n.path.startsWith(root)) {
        results.push(n);
      }
    }
    // ── 搜索挂载的本地目录 ──
    for (const [point, mountFS] of this._mounts) {
      if (!root.startsWith(point) && root !== '/') continue;
      const searchRoot = root.startsWith(point) ? root.substring(point.length) || '/' : '/';
      try {
        const localResults = await mountFS.search(query, searchRoot);
        for (const r of localResults) {
          r.path = point + r.path;
          r.parent = point + (r.parent || '/');
        }
        results.push(...localResults);
      } catch (e) {
        console.warn('[青丝] 搜索本地目录失败:', point, e);
      }
    }
    return results;
  }

  async stats() {
    const all = await this.getAllNodes();
    let totalSize = 0, fileCount = 0, folderCount = 0;
    const typeCount = { text: 0, csv: 0, image: 0, audio: 0, video: 0, pdf: 0, archive: 0, binary: 0, folder: 0 };
    for (const n of all) {
      if (n.path === '/') continue;
      typeCount[n.type] = (typeCount[n.type] || 0) + 1;
      if (n.type === 'folder') folderCount++;
      else { fileCount++; totalSize += (n.size || 0); }
    }
    let quota = null;
    if (navigator.storage && navigator.storage.estimate) {
      quota = await navigator.storage.estimate();
    }
    return { totalSize, fileCount, folderCount, typeCount, quota, useOPFS: this.useOPFS };
  }

  async syncOPFSToIDB() {
    if (!this.useOPFS) return 0;
    let synced = 0;
    try {
      const all = await this.getAllNodes();
      for (const n of all) {
        if (n.type === 'folder') continue;
        try {
          const handle = await this._getOPFSFile(n.path, false);
          if (handle) {
            const file = await handle.getFile();
            if (file && file.size > 0) {
              await this._syncBlobToIDB(n.path, file);
              synced++;
            }
          }
        } catch(e) {}
      }
    } catch(e) {
      console.warn('[青丝] OPFS→IDB 同步出错:', e);
    }
    return synced;
  }

  async syncIDBToOPFS() {
    if (!this.useOPFS) return 0;
    let synced = 0;
    try {
      const all = await this.getAllNodes();
      for (const n of all) {
        if (n.type === 'folder') {
          try {
            const parts = n.path.split('/').filter(Boolean);
            let dir = this.opfsRoot;
            for (const p of parts) {
              dir = await dir.getDirectoryHandle(p, { create: true });
            }
          } catch(e) {}
          continue;
        }
        try {
          let needSync = false;
          try {
            const handle = await this._getOPFSFile(n.path, false);
            if (handle) {
              const file = await handle.getFile();
              if (!file || file.size === 0) needSync = true;
            }
          } catch(e) { needSync = true; }
          if (needSync) {
            const blob = await this._readBlob(n.path);
            if (blob && blob.size > 0) {
              const handle = await this._getOPFSFile(n.path, true);
              const writable = await handle.createWritable();
              await writable.write(blob);
              await writable.close();
              synced++;
            }
          }
        } catch(e) {}
      }
    } catch(e) {
      console.warn('[青丝] IDB→OPFS 同步出错:', e);
    }
    return synced;
  }

  async verifyIntegrity() {
    const report = { orphanNodes: 0, missingBlobs: 0, orphanBlobs: 0, repaired: 0 };
    try {
      const all = await this.getAllNodes();
      const nodePaths = new Set(all.map(n => n.path));
      for (const n of all) {
        if (n.path === '/') continue;
        if (n.parent && n.parent !== '/' && !nodePaths.has(n.parent)) {
          report.orphanNodes++;
          n.parent = '/';
          await this._putNode(n);
          report.repaired++;
        }
        if (n.type !== 'folder') {
          const blob = await this._readBlob(n.path);
          if (!blob) {
            report.missingBlobs++;
          } else if (blob.size !== n.size && n.size > 0) {
            n.size = blob.size;
            n.modified = Date.now();
            await this._putNode(n);
            report.repaired++;
          }
        }
      }
      const allBlobs = await new Promise((resolve, reject) => {
        const req = this._tx(['blobs']).objectStore('blobs').getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
      for (const b of allBlobs) {
        if (!nodePaths.has(b.path)) {
          report.orphanBlobs++;
          await this._deleteBlob(b.path);
          report.repaired++;
        }
      }
    } catch(e) {
      console.warn('[青丝] 完整性校验出错:', e);
    }
    return report;
  }

  getTrash() {
    return this._trash.slice();
  }

  async restoreFromTrash(index) {
    const item = this._trash[index];
    if (!item) throw new Error('回收站中无此物');
    const parent = item.parent || '/';
    if (parent && parent !== '/' && !(await this.exists(parent))) {
      await this.mkdir(parent, true);
    }
    const destPath = item.path;
    // 如果目标路径已存在，添加后缀
    let finalPath = destPath;
    if (await this.exists(destPath)) {
      const name = item.name;
      const dotIdx = name.lastIndexOf('.');
      let i = 1;
      while (await this.exists(finalPath)) {
        if (dotIdx > 0) {
          finalPath = this._join(parent, name.substring(0, dotIdx) + ` (恢复${i})` + name.substring(dotIdx));
        } else {
          finalPath = this._join(parent, name + ` (恢复${i})`);
        }
        i++;
      }
    }
    if (item._blob) {
      await this._writeBlob(finalPath, item._blob);
    }
    await this._putNode({
      path: finalPath, name: item.name, type: item.type, parent,
      created: item.created || Date.now(), modified: Date.now(), size: item.size || 0, mime: item.mime || ''
    });
    // 如果是文件夹且有保存的子项，递归恢复
    if (item.type === 'folder' && item._children && item._children.length > 0) {
      // 计算路径前缀偏移：如果 finalPath 与原始 path 不同（加了后缀），需要替换前缀
      const pathPrefix = item.path;
      const newPrefix = finalPath;
      for (const child of item._children) {
        const childRelPath = child.path.substring(pathPrefix.length);
        const childFinalPath = newPrefix + childRelPath;
        const childParent = this._parentPath(childFinalPath);
        if (child.type === 'folder') {
          await this.mkdir(childFinalPath, true);
          await this._putNode({
            path: childFinalPath, name: child.name, type: child.type, parent: childParent,
            created: child.created || Date.now(), modified: Date.now(), size: child.size || 0, mime: child.mime || ''
          });
        } else {
          if (child._blob) {
            await this._writeBlob(childFinalPath, child._blob);
          }
          await this._putNode({
            path: childFinalPath, name: child.name, type: child.type, parent: childParent,
            created: child.created || Date.now(), modified: Date.now(), size: child.size || 0, mime: child.mime || ''
          });
        }
      }
    }
    this._trash.splice(index, 1);
    QingSi.sync?.broadcast('fs:created', { path: finalPath });
    QingSi.cache?.invalidate(parent || '/');
    return finalPath;
  }

  async emptyTrash() {
    this._trash = [];
  }
}

/* ============================================================
   缓存协调器 - 让 LS 替 IDB 加速
   ============================================================ */
class CacheCoordinator {
  constructor(prefs) {
    this.prefs = prefs;
    this.maxAge = 60000; // 缓存 1 分钟
  }

  async listCached(path) {
    const cached = this.prefs?.getCache('list:' + path, this.maxAge);
    return cached;
  }

  cacheList(path, items) {
    this.prefs?.cache('list:' + path, items);
  }

  invalidate(path) {
    if (!this.prefs?.available) return;
    // 清掉受影响目录的缓存
    try {
      localStorage.removeItem(this.prefs.cachePrefix + 'list:' + path);
    } catch (e) {}
  }

  invalidateAll() {
    this.prefs?.clearCache();
  }
}

/* ============================================================
   工具
   ============================================================ */
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(2) + ' MB';
  return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
}

function fmtTime(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function fmtRelTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return '片刻前';
  if (diff < 3600000) return Math.floor(diff/60000) + ' 分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + ' 时辰前';
  if (diff < 7 * 86400000) return Math.floor(diff/86400000) + ' 日前';
  return fmtTime(ts);
}

function getIconChar(node) {
  if (node.type === 'folder') return '册';
  if (node.type === 'image') return '画';
  if (node.type === 'audio') return '乐';
  if (node.type === 'video') return '影';
  if (node.type === 'pdf') return '卷';
  if (node.type === 'csv') return '表';
  if (node.type === 'text') return '文';
  if (node.type === 'archive') return '囊';
  return '物';
}

function debounce(fn, wait) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), wait);
  };
}

function toast(title, msg, type = 'info') {
  const area = document.getElementById('toast-area');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = `<div class="t-title">${title}</div><div class="t-msg">${msg}</div>`;
  area.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function modal({ title, body, input, placeholder, defaultValue, onOk, okText = '允', cancelText = '罢', showCancel = true }) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">${title}</div>
      <div class="modal-body">
        ${body || ''}
        ${input ? `<input class="modal-input" type="text" placeholder="${placeholder || ''}" value="${defaultValue || ''}">` : ''}
      </div>
      <div class="modal-footer">
        <button class="fm-btn primary ok-btn">${okText}</button>
        ${showCancel ? `<button class="fm-btn cancel-btn">${cancelText}</button>` : ''}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const inp = overlay.querySelector('.modal-input');
  if (inp) { inp.focus(); inp.select(); }
  const close = () => overlay.remove();
  const cancelBtn = overlay.querySelector('.cancel-btn');
  if (cancelBtn) cancelBtn.onclick = close;
  overlay.querySelector('.ok-btn').onclick = async () => {
    const val = inp ? inp.value : true;
    const result = onOk ? await onOk(val) : true;
    if (result !== false) close();
  };
  if (inp) {
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') overlay.querySelector('.ok-btn').click();
      if (e.key === 'Escape') close();
    };
  }
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
}

function confirm(title, msg, onOk) {
  modal({ title, body: msg, onOk, okText: '允', cancelText: '罢' });
}

/* ============================================================
   窗口管理
   ============================================================ */
class WindowManager {
  static create({ id, title, width = 720, height = 480, x, y, content }) {
    if (QingSi.windows[id]) {
      this.activate(id);
      return QingSi.windows[id];
    }
    const win = document.createElement('div');
    win.className = 'window';
    win.id = 'win-' + id;
    win.style.width = width + 'px';
    win.style.height = height + 'px';
    
    // 恢复上次窗口位置
    const saved = QingSi.prefs?.get('win:' + id);
    if (saved) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const clampX = Math.min(Math.max(0, saved.x), vw - 100);
      const clampY = Math.min(Math.max(38, saved.y), vh - 100);
      win.style.left = clampX + 'px';
      win.style.top = clampY + 'px';
      win.style.width = Math.min(saved.w, vw) + 'px';
      win.style.height = Math.min(saved.h, vh - 38) + 'px';
    } else {
      win.style.left = (x ?? (window.innerWidth - width) / 2 + (Object.keys(QingSi.windows).length * 30)) + 'px';
      win.style.top = (y ?? (window.innerHeight - height) / 2 + (Object.keys(QingSi.windows).length * 30)) + 'px';
    }
    
    win.innerHTML = `
      <div class="window-titlebar">
        <div class="window-title">${title}</div>
        <div class="window-controls">
          <div class="window-scroll" data-act="min" data-label="隐">
            <div class="scroll-outer-label">隐</div>
            <div class="scroll-knob scroll-knob-top"></div>
            <div class="scroll-paper"></div>
            <div class="scroll-knob scroll-knob-bottom"></div>
          </div>
          <div class="window-scroll" data-act="max" data-label="展">
            <div class="scroll-outer-label">展</div>
            <div class="scroll-knob scroll-knob-top"></div>
            <div class="scroll-paper"></div>
            <div class="scroll-knob scroll-knob-bottom"></div>
          </div>
          <div class="window-scroll" data-act="close" data-label="阖">
            <div class="scroll-outer-label">阖</div>
            <div class="scroll-knob scroll-knob-top"></div>
            <div class="scroll-paper"></div>
            <div class="scroll-knob scroll-knob-bottom"></div>
          </div>
        </div>
      </div>
      <div class="window-body"></div>
      <div class="resize-handle"></div>
    `;
    
    win.querySelector('.window-body').appendChild(content);
    document.body.appendChild(win);
    QingSi.windows[id] = { el: win, id, title };
    
    win.querySelector('[data-act="close"]').onclick = function() {
      const scroll = this;
      scroll.classList.add('pulse');
      scroll.classList.add('open');
      setTimeout(() => {
        WindowManager.close(id);
      }, 350);
    };
    win.querySelector('[data-act="max"]').onclick = function() {
      const scroll = this;
      scroll.classList.add('pulse');
      scroll.classList.add('open');
      setTimeout(() => {
        WindowManager.maximize(id);
        setTimeout(() => scroll.classList.remove('open'), 300);
      }, 250);
    };
    win.querySelector('[data-act="min"]').onclick = function() {
      const scroll = this;
      scroll.classList.add('pulse');
      scroll.classList.add('open');
      setTimeout(() => {
        win.style.display = 'none';
        setTimeout(() => scroll.classList.remove('open'), 300);
      }, 250);
    };
    
    win.addEventListener('mousedown', () => this.activate(id));
    
    this._makeDraggable(win, id);
    this._makeResizable(win, id);
    this.activate(id);

    // 卷轴展开动画
    win.classList.add('scroll-opening');
    win.addEventListener('animationend', function handler(e) {
      if (e.animationName === 'scrollOpen') {
        win.classList.remove('scroll-opening');
        win.removeEventListener('animationend', handler);
      }
    });
    
    document.querySelector(`.dock-item[data-app="${id}"]`)?.classList.add('active');
    WindowManager._saveOpenWindows();
    return QingSi.windows[id];
  }

  static close(id) {
    const w = QingSi.windows[id];
    if (!w) return;
    const el = w.el;
    let saveX, saveY, saveW, saveH;
    if (el.dataset.maximized) {
      const s = JSON.parse(el.dataset.maximized);
      saveX = parseInt(s.left) || 0;
      saveY = parseInt(s.top) || 38;
      saveW = parseInt(s.width) || el.offsetWidth;
      saveH = parseInt(s.height) || el.offsetHeight;
    } else {
      saveX = parseInt(el.style.left) || 0;
      saveY = parseInt(el.style.top) || 38;
      saveW = el.offsetWidth;
      saveH = el.offsetHeight;
    }
    QingSi.prefs?.set('win:' + id, {
      x: saveX, y: saveY, w: saveW, h: saveH
    });
    el.style.transition = '';
    el.style.opacity = '';
    el.style.transform = '';
    el.classList.add('scroll-closing');
    el.addEventListener('animationend', function handler(e) {
      if (e.animationName === 'scrollClose') {
        el.remove();
        delete QingSi.windows[id];
        document.querySelector(`.dock-item[data-app="${id}"]`)?.classList.remove('active');
        WindowManager._saveOpenWindows();
        el.removeEventListener('animationend', handler);
      }
    });
  }

  static activate(id) {
    Object.values(QingSi.windows).forEach(w => w.el.classList.remove('active'));
    const w = QingSi.windows[id];
    if (w) {
      w.el.classList.add('active');
      w.el.style.zIndex = ++QingSi.zIndex;
      w.el.style.display = 'flex';
    }
  }

  static maximize(id) {
    const w = QingSi.windows[id];
    if (!w) return;
    if (w.el.dataset.maximized) {
      const s = JSON.parse(w.el.dataset.maximized);
      Object.assign(w.el.style, s);
      delete w.el.dataset.maximized;
    } else {
      w.el.dataset.maximized = JSON.stringify({
        left: w.el.style.left, top: w.el.style.top,
        width: w.el.style.width, height: w.el.style.height
      });
      w.el.style.left = '0';
      w.el.style.top = '38px';
      w.el.style.width = '100vw';
      w.el.style.height = 'calc(100vh - 38px - 80px)';
    }
  }

  static _makeDraggable(win, id) {
    const titlebar = win.querySelector('.window-titlebar');
    let isDown = false, startX, startY, startLeft, startTop;

    function onStart(cx, cy) {
      isDown = true;
      startX = cx; startY = cy;
      if (win.dataset.maximized) {
        const s = JSON.parse(win.dataset.maximized);
        const ratio = (cx - parseInt(win.style.left)) / win.offsetWidth;
        const oldW = parseInt(s.width) || 720;
        win.style.left = (cx - oldW * ratio) + 'px';
        win.style.top = '38px';
        win.style.width = s.width;
        win.style.height = s.height;
        delete win.dataset.maximized;
      }
      startLeft = parseInt(win.style.left) || 0;
      startTop = parseInt(win.style.top) || 0;
    }
    function onMove(cx, cy) {
      if (!isDown) return;
      win.style.left = (startLeft + cx - startX) + 'px';
      win.style.top = Math.max(38, startTop + cy - startY) + 'px';
    }
    function onEnd() {
      if (isDown && id) {
        QingSi.prefs?.set('win:' + id, {
          x: parseInt(win.style.left), y: parseInt(win.style.top),
          w: win.offsetWidth, h: win.offsetHeight
        });
      }
      isDown = false;
    }

    // 鼠标事件
    titlebar.addEventListener('mousedown', (e) => {
      if (e.target.closest('.window-scroll')) return;
      onStart(e.clientX, e.clientY);
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup', () => onEnd());

    // 触摸事件（移动端支持）
    titlebar.addEventListener('touchstart', (e) => {
      if (e.target.closest('.window-scroll')) return;
      const t = e.touches[0];
      onStart(t.clientX, t.clientY);
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchmove', (e) => {
      if (!isDown) return;
      const t = e.touches[0];
      onMove(t.clientX, t.clientY);
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchend', () => onEnd());
  }

  static _makeResizable(win, id) {
    const handle = win.querySelector('.resize-handle');
    let isDown = false, startX, startY, startW, startH;

    function onStart(cx, cy) {
      isDown = true;
      startX = cx; startY = cy;
      if (win.dataset.maximized) {
        const s = JSON.parse(win.dataset.maximized);
        win.style.left = s.left;
        win.style.top = s.top;
        win.style.width = s.width;
        win.style.height = s.height;
        delete win.dataset.maximized;
      }
      startW = win.offsetWidth; startH = win.offsetHeight;
    }
    function onMove(cx, cy) {
      if (!isDown) return;
      win.style.width = Math.max(360, startW + cx - startX) + 'px';
      win.style.height = Math.max(240, startH + cy - startY) + 'px';
    }
    function onEnd() {
      if (isDown && id) {
        QingSi.prefs?.set('win:' + id, {
          x: parseInt(win.style.left), y: parseInt(win.style.top),
          w: win.offsetWidth, h: win.offsetHeight
        });
      }
      isDown = false;
    }

    // 鼠标事件
    handle.addEventListener('mousedown', (e) => {
      onStart(e.clientX, e.clientY);
      e.preventDefault();
      e.stopPropagation();
    });
    document.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup', () => onEnd());

    // 触摸事件（移动端支持）
    handle.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      onStart(t.clientX, t.clientY);
      e.preventDefault();
      e.stopPropagation();
    }, { passive: false });
    document.addEventListener('touchmove', (e) => {
      if (!isDown) return;
      const t = e.touches[0];
      onMove(t.clientX, t.clientY);
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchend', () => onEnd());
  }

  static _saveOpenWindows() {
    const openIds = Object.keys(QingSi.windows);
    QingSi.prefs?.set('win:open', openIds);
  }

  static restoreWindows() {
    const openIds = QingSi.prefs?.get('win:open', []);
    if (!Array.isArray(openIds) || openIds.length === 0) return;
    const launchers = {
      files: () => fileManager.open(),
      editor: () => EditorApp.open(),
      image: () => ImageApp.open(),
      terminal: () => TerminalApp.open(),
      storage: () => StorageApp.open(),
      poem: () => PoemApp.open(),
      settings: () => SettingsApp.open()
    };
    openIds.forEach(id => {
      if (launchers[id]) {
        try { launchers[id](); } catch(e) { console.warn('[青丝] 恢复窗口失败:', id, e); }
      }
    });
  }
}

        </div>

    `;

    });
