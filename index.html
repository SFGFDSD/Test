  banner.className = 'protocol-banner';
  banner.innerHTML = `
    <div class="banner-text">
      <span class="banner-icon">⚠</span>
      <span>当前以本地文件打开,四核部分能力受限 — OPFS 与 Cookie 不可用,IndexedDB 在 Firefox 下不可用。建议以本地服务器启动：<code style="background:rgba(255,255,255,0.15);padding:1px 6px;border-radius:2px;font-size:12px;">npx serve</code> 或 <code style="background:rgba(255,255,255,0.15);padding:1px 6px;border-radius:2px;font-size:12px;">python -m http.server</code></span>
    </div>
    <button class="banner-close" onclick="this.parentElement.remove()">知悉</button>
  `;
  document.body.appendChild(banner);
}

function showWelcomeIfNeeded() {
  // 第一次访问 / 主动设置显示
  const welcomed = QingSi.cookie?.hasOnce('welcomed');
  const showAlways = QingSi.prefs?.get('showWelcome', false);
  
  if (welcomed && !showAlways) return;
  
  const overlay = document.createElement('div');
  overlay.className = 'welcome-overlay';
  overlay.innerHTML = `
    <div class="welcome-card">
      <h1>青丝</h1>
      <div class="sub">— 四核纪元 · QuadCore —</div>
      <div class="desc">
        欢迎来到 青丝 OS。<br><br>
        此系统由<strong>四位剑客</strong>共同守护:
        <strong style="color:var(--rust);">真文剑、索引盾、疾风刃、羽信笺</strong>。<br><br>
        请赐尊号,以便青丝铭记于心:
      </div>
      <input class="name-input" id="welcome-name" placeholder="请赐尊号..." value="青丝主人">
      <button class="fm-btn primary" id="welcome-ok" style="width:100%;padding:10px;">入此青丝之境</button>
    </div>
  `;
  document.body.appendChild(overlay);
  
  const inp = overlay.querySelector('#welcome-name');
  inp.focus(); inp.select();
  
  const submit = () => {
    const name = inp.value.trim() || '青丝主人';
    QingSi.cookie?.set('user_name', name, { maxAge: 31536000 });
    QingSi.cookie?.markOnce('welcomed', 365);
    overlay.style.opacity = 0;
    overlay.style.transition = 'opacity 0.5s';
    setTimeout(() => overlay.remove(), 500);
    updateGreeting();
    toast('记下了', `${name},一切都为你而设`, 'success');
  };
  
  overlay.querySelector('#welcome-ok').onclick = submit;
  inp.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
}

/* ============================================================
   主题与字体切换
   ============================================================ */
function applyTheme() {
  const dark = QingSi.prefs?.get('darkMode', false);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
}

function applyFont(choice) {
  choice = choice || QingSi.prefs?.get('fontChoice', 'default');
  if (choice === 'default') {
    document.documentElement.removeAttribute('data-font');
  } else {
    document.documentElement.setAttribute('data-font', choice);
  }
}

/* ============================================================
   启动流程
   ============================================================ */
window.fileManager = fileManager;
window.EditorApp = EditorApp;
window.ImageApp = ImageApp;
window.TerminalApp = TerminalApp;
window.StorageApp = StorageApp;
window.PoemApp = PoemApp;
window.SettingsApp = SettingsApp;
window.QingSi = QingSi;

(async function bootstrap() {
  // 先点亮疾风刃和羽信笺(同步可用)
  QingSi.prefs = new PrefsManager();
  QingSi.cookie = new CookieManager();
  QingSi.cores.ls = QingSi.prefs.available;
  QingSi.cores.ck = QingSi.cookie.available;
  QingSi.sync = new SyncManager();

  applyTheme();
  applyFont();
  
  document.getElementById('sc-3').classList.add('lit');
  await new Promise(r => setTimeout(r, 200));
  document.getElementById('sc-4').classList.add('lit');
  await new Promise(r => setTimeout(r, 200));
  
  // 初始化主从核
  try {
    QingSi.fs = new HybridFS();
    await QingSi.fs.init();
  } catch (e) {
    console.error('[青丝] 文件系统初始化失败:', e);
    QingSi.cores.idb = false;
    QingSi.cores.opfs = false;
    // 尝试删除损坏的数据库并重试
    try {
      indexedDB.deleteDatabase('qingsi_fs');
      QingSi.fs = new HybridFS();
      await QingSi.fs.init();
      console.log('[青丝] 文件系统重试成功');
    } catch (e2) {
      console.error('[青丝] 文件系统重试也失败:', e2);
    }
  }
  QingSi.cache = new CacheCoordinator(QingSi.prefs);
  
  document.getElementById('sc-2').classList.add('lit');
  await new Promise(r => setTimeout(r, 200));
  if (QingSi.cores.opfs) document.getElementById('sc-1').classList.add('lit');
  
  startClock();
  updateGreeting();
  spawnPetals();
  bindAppLaunchers();
  bindGlobalContextMenus();
  updateStorageMeta();
  updateCoreLights();
  setInterval(updateStorageMeta, 5000);
  
  // 全局同步监听
  QingSi.sync.on((evt) => {
    console.log('[sync]', evt);
    if (evt.type === 'fs:written' || evt.type === 'fs:created' || evt.type === 'fs:deleted') {
      updateStorageMeta();
    }
  });
  
  // 关闭启动屏
  function dismissSplash() {
    const splash = document.getElementById('splash');
    if (!splash) return;
    splash.style.opacity = 0;
    setTimeout(() => {
      splash.remove();
      checkProtocolBanner();
      WindowManager.restoreWindows();
      showWelcomeIfNeeded();
    }, 800);
  }

  if (QingSi.prefs?.get('showSplash', true) === false) {
    dismissSplash();
  } else {
    setTimeout(dismissSplash, 1800);
  }
  
  console.log('%c 青丝 OS · 四核纪元 ', 'background:#1c1a17;color:#b08a4a;padding:10px 30px;font-size:20px;font-family:serif;letter-spacing:0.5em;');
  console.log('%c [剑] OPFS  [盾] IndexedDB  [刃] localStorage  [笺] Cookie ', 'color:#7a8b6f;font-style:italic;letter-spacing:0.2em;');
  console.log('%c 「四核合璧,可纳乾坤,可守记忆,可通万域,可越时光。」', 'color:#a8553a;font-style:italic;');

  window.addEventListener('beforeunload', () => {
    WindowManager._saveOpenWindows();
    Object.entries(QingSi.windows).forEach(([id, w]) => {
      const el = w.el;
      let saveX, saveY, saveW, saveH;
      if (el.dataset.maximized) {
        const s = JSON.parse(el.dataset.maximized);
        saveX = parseInt(s.left) || 0;
        saveY = parseInt(s.top) || 38;
        saveW = parseInt(s.width) || el.offsetWidth;
        saveH = parseInt(s.height) || el.offsetHeight;
      } else {
        saveX = parseInt(el.style.left) || 0;
        saveY = parseInt(el.style.top) || 38;
        saveW = el.offsetWidth;
        saveH = el.offsetHeight;
      }
      QingSi.prefs?.set('win:' + id, { x: saveX, y: saveY, w: saveW, h: saveH });
    });
  });
})();
</script>
