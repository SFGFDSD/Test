        // 4. 图标拖拽逻辑 (Windows 风格)
        let dragState = null;
        function startIconDrag(e, el, isNativeDragMode = false) {
            if (e.touches && e.touches.length > 1) return;

            const pos = getClientXY(e);

            const rect = el.getBoundingClientRect();
            dragState = {
                startX: pos.x, startY: pos.y,
                icons: [], hasMoved: false,
                el: el,
                isNativeDragMode: isNativeDragMode
            };
            
            SYSTEM.selectedIcons.forEach(id => {
                const icon = document.getElementById(id);
                if(icon) {
                    dragState.icons.push({
                        el: icon, id: id,
                        startLeft: icon.offsetLeft, startTop: icon.offsetTop
                    });
                }
            });

            longPressTriggered = false;
            if(longPressTimer) clearTimeout(longPressTimer);
            longPressTimer = setTimeout(() => {
                longPressTriggered = true;
                if(dragState && dragState.el && el.dataset.filename) {
                    nativeDragHelper.style.display = 'block';
                    nativeDragHelper.style.left = (pos.x - 40) + 'px';
                    nativeDragHelper.style.top = (pos.y - 45) + 'px';
                    
                    nativeDragHelper.ondragstart = (ev) => {
                        handleNativeDragStart(ev, el.dataset.filename);
                    };
                    
                    dragState.el.style.outline = '2px solid rgba(0, 120, 212, 0.5)';
                }
            }, 400);

            if(!isNativeDragMode) {
                document.addEventListener('mousemove', onIconDragMove);
                document.addEventListener('mouseup', onIconDragEnd);
                document.addEventListener('touchmove', onIconDragMove, { passive: false });
                document.addEventListener('touchend', onIconDragEnd);
            } else {
                document.addEventListener('mouseup', onIconDragEnd);
                document.addEventListener('touchend', onIconDragEnd);
            }
        }

        function onIconDragMove(e) {
            if(!dragState) return;
            
            if(e.type === 'touchmove') e.preventDefault();

            const pos = getClientXY(e);
            const dx = pos.x - dragState.startX;
            const dy = pos.y - dragState.startY;

            if(!dragState.hasMoved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
                dragState.hasMoved = true;
                // 将图标从桌面容器移到 body，脱离桌面层叠上下文，确保浮在所有窗口上层
                const container = document.getElementById('desktop-icons');
                dragState.icons.forEach(i => {
                    const rect = i.el.getBoundingClientRect();
                    // 记录屏幕坐标作为 fixed 定位的起点
                    i.screenStartLeft = rect.left;
                    i.screenStartTop = rect.top;
                    i.el.classList.add('dragging');
                    i.el.style.position = 'fixed';
                    i.el.style.left = rect.left + 'px';
                    i.el.style.top = rect.top + 'px';
                    document.body.appendChild(i.el);
                });
                dragState._movedToBody = true;
            }

            if(dragState.hasMoved) {
                requestAnimationFrame(() => {
                    if(!dragState) return;
                    dragState.icons.forEach(i => {
                        i.el.style.left = (i.screenStartLeft + dx) + 'px';
                        i.el.style.top = (i.screenStartTop + dy) + 'px';
                    });
                });
            }
        }

        function onIconDragEnd(e) {
            nativeDragHelper.style.display = 'none';
            
            document.removeEventListener('mousemove', onIconDragMove);
            document.removeEventListener('mouseup', onIconDragEnd);
            document.removeEventListener('touchmove', onIconDragMove);
            document.removeEventListener('touchend', onIconDragEnd);
            
            if(longPressTimer) clearTimeout(longPressTimer);
            longPressTriggered = false;

            if(dragState && !dragState.isNativeDragMode && dragState.hasMoved) {
                // 保存引用，因为 dragState 会在后面被置 null
                const icons = dragState.icons;
                const movedToBody = dragState._movedToBody;

                // === 先将图标移回桌面容器，恢复 absolute 定位 ===
                const container = document.getElementById('desktop-icons');
                if (movedToBody) {
                    icons.forEach(i => {
                        i.el.classList.remove('dragging');
                        i.el.style.position = 'absolute';
                        // 将 fixed 坐标转换为相对于 desktop-icons 的 absolute 坐标
                        const containerRect = container.getBoundingClientRect();
                        const currentLeft = parseFloat(i.el.style.left) || 0;
                        const currentTop = parseFloat(i.el.style.top) || 0;
                        i.el.style.left = (currentLeft - containerRect.left) + 'px';
                        i.el.style.top = (currentTop - containerRect.top) + 'px';
                        container.appendChild(i.el);
                    });
                }

                // === 检测是否拖拽到了文件夹窗口或桌面文件夹图标上 ===
                const pos = getClientXY(e);
                const targetEl = (pos.x != null && pos.y != null) ? document.elementFromPoint(pos.x, pos.y) : null;

                const folderWindow = targetEl?.closest('.window');
                const desktopIcon = targetEl?.closest('.desktop-icon');
                let movedToFolder = false;

                // 检查是否拖到了文件夹窗口上（排除来源窗口）
                if (folderWindow) {
                    const titleText = folderWindow.querySelector('.window-title-text')?.innerText;
                    if (titleText) {
                        const targetPath = SYSTEM.desktopPath + '/' + titleText;
                        const fileIcons = icons.filter(i => i.el.dataset.filename);
                        if (fileIcons.length > 0) {
                            moveDesktopFilesToFolder(fileIcons, targetPath, titleText);
                            movedToFolder = true;
                        }
                    }
                }
                // 检查是否拖到了桌面文件夹图标上
                else if (desktopIcon && desktopIcon.dataset.filename) {
                    const isSelf = icons.some(i => i.el === desktopIcon);
                    if (!isSelf) {
                        const targetFolderName = desktopIcon.dataset.filename;
                        const targetPath = SYSTEM.desktopPath + '/' + targetFolderName;
                        const fileIcons = icons.filter(i => i.el.dataset.filename);
                        if (fileIcons.length > 0) {
                            moveDesktopFilesToFolder(fileIcons, targetPath, targetFolderName);
                            movedToFolder = true;
                        }
                    }
                }

                if (!movedToFolder) {
                    // 使用 requestAnimationFrame 确保 DOM 布局完成后再读取 offsetLeft/offsetTop
                    requestAnimationFrame(() => {
                        const maxW = window.innerWidth - 90;
                        const maxH = window.innerHeight - 100;

                        icons.forEach(i => {
                            i.el.classList.remove('dragging');
                            i.el.style.outline = 'none';
                            let x = Math.round(i.el.offsetLeft / SYSTEM.gridSize) * SYSTEM.gridSize + 24;
                            let y = Math.round(i.el.offsetTop / SYSTEM.gridSize) * SYSTEM.gridSize + 24;

                            x = Math.max(24, Math.min(x, maxW));
                            y = Math.max(24, Math.min(y, maxH));

                            i.el.style.transition = 'all 0.2s';
                            i.el.style.left = x + 'px';
                            i.el.style.top = y + 'px';
                            setTimeout(() => i.el.style.transition = '', 200);

                            SYSTEM.iconPositions[i.id] = {x, y};
                        });
                        saveIconPositions();
                    });
                } else {
                    icons.forEach(i => {
                        i.el.classList.remove('dragging');
                        i.el.style.outline = 'none';
                    });
                }
            }
            dragState = null;
        }

        // 将桌面文件移动到指定文件夹
        function moveDesktopFilesToFolder(fileIcons, targetPath, targetFolderName) {
            let processedCount = 0;
            let errorCount = 0;
            const total = fileIcons.length;

            const processNext = (index) => {
                if (index >= total) {
                    // 收集源路径用于刷新
                    const srcPaths = fileIcons.map(icon => SYSTEM.desktopPath + '/' + icon.el.dataset.filename);
                    
                    // 刷新所有受影响的窗口
                    refreshAllAffectedWindows(targetPath, srcPaths, true);
                    
                    if (errorCount === 0) {
                        Notify.success('移动成功', `已将 ${processedCount} 个文件移动到 "${targetFolderName}"`);
                    } else {
                        Notify.warning('部分失败', `成功 ${processedCount} 个，失败 ${errorCount} 个`);
                    }
                    return;
                }

                const icon = fileIcons[index];
                const filename = icon.el.dataset.filename;
                const srcPath = SYSTEM.desktopPath + '/' + filename;
                const destPath = targetPath + '/' + filename;

                // 检查源路径是否已经在目标文件夹内
                if (srcPath === destPath || srcPath.startsWith(targetPath + '/')) {
                    processedCount++;
                    processNext(index + 1);
                    return;
                }

                SYSTEM.fs.stat(destPath, (err) => {
                    if (!err) {
                        // 目标已存在同名文件
                        if (!confirm(`文件 "${filename}" 已存在于目标文件夹，是否覆盖？`)) {
                            processedCount++;
                            processNext(index + 1);
                            return;
                        }
                    }

                    // 读取源文件
                    SYSTEM.fs.readFile(srcPath, (readErr, data) => {
                        if (readErr) {
                            errorCount++;
                            processedCount++;
                            processNext(index + 1);
                            return;
                        }

                        // 写入目标
                        SYSTEM.fs.writeFile(destPath, data, (writeErr) => {
                            if (writeErr) {
                                errorCount++;
                                processedCount++;
                                processNext(index + 1);
                                return;
                            }

                            // 删除源文件
                            SYSTEM.fs.unlink(srcPath, (unlinkErr) => {
                                if (unlinkErr) {
                                    errorCount++;
                                } else {
                                    // 从桌面移除图标
                                    icon.el.remove();
                                    delete SYSTEM.iconPositions[icon.id];
                                    saveIconPositions();
                                }
                                processedCount++;
                                processNext(index + 1);
                            });
                        });
                    });
                });
            };

            processNext(0);
        }

        // 5. 框选与选择逻辑
        function initDesktopEvents() {
            const desktop = document.getElementById('desktop');
            const box = document.getElementById('selection-box');
            let isSelecting = false, startX, startY;

            const handleStart = (e) => {
                if(e.target !== desktop && e.target !== document.getElementById('desktop-icons')) return;
                if(e.button === 2) return;

                clearSelection();
                isSelecting = true;
                
                const pos = getClientXY(e);
                startX = pos.x; 
                startY = pos.y;
                
                box.style.display = 'block';
                box.style.width = '0'; box.style.height = '0';
                box.style.left = startX + 'px'; box.style.top = startY + 'px';
            };

            const handleMove = (e) => {
                if(!isSelecting) return;
                
                if(e.type === 'touchmove') e.preventDefault();
                
                const pos = getClientXY(e);
                const curX = pos.x; 
                const curY = pos.y;
                
                const left = Math.min(startX, curX), top = Math.min(startY, curY);
                const width = Math.abs(startX - curX), height = Math.abs(startY - curY);
                
                box.style.left = left + 'px'; box.style.top = top + 'px';
                box.style.width = width + 'px'; box.style.height = height + 'px';

                document.querySelectorAll('.desktop-icon').forEach(icon => {
                    const r = icon.getBoundingClientRect();
                    const intersect = !(r.right < left || r.left > left+width || r.bottom < top || r.top > top+height);
                    if(intersect) selectIcon(icon); else deselectIcon(icon);
                });
            };

            const handleEnd = () => {
                isSelecting = false; 
                box.style.display = 'none';
            };

            // 先移除旧的事件监听器，防止重复注册
            document.removeEventListener('mousemove', handleMove);
            document.removeEventListener('touchmove', handleMove);
            document.removeEventListener('mouseup', handleEnd);
            document.removeEventListener('touchend', handleEnd);

            desktop.onmousedown = handleStart;
            desktop.ontouchstart = handleStart;

            document.addEventListener('mousemove', handleMove);
            document.addEventListener('touchmove', handleMove, {passive: false});

            document.addEventListener('mouseup', handleEnd);
            document.addEventListener('touchend', handleEnd);
            
            desktop.ondragover = e => e.preventDefault();
            desktop.ondrop = async (e) => {
                e.preventDefault();

                // === 定义防抖刷新函数 (核心修复) ===
                // 只有当文件停止写入 200ms 后，才执行一次刷新
                let refreshTimer = null;
                const debouncedRefresh = () => {
                    if (refreshTimer) clearTimeout(refreshTimer);
                    refreshTimer = setTimeout(() => {
                        refreshDesktop();
                        Notify.success('导入完成', '所有文件已更新');
                    }, 200);
                };

                // 1. 处理系统内部文件拖拽
                const dragData = e.dataTransfer.getData('text/plain');
                if (dragData) {
                    try {
                        const { srcPath, filename } = JSON.parse(dragData);
                        if (srcPath && filename) {
                            SYSTEM.fs.readFile(srcPath, (err, data) => {
                                if (!err) {
                                    SYSTEM.fs.writeFile(SYSTEM.desktopPath + '/' + filename, data, () => {
                                        SYSTEM.iconPositions['file-' + filename] = { x: e.clientX - 40, y: e.clientY - 40 };
                                        saveIconPositions();
                                        refreshDesktop(); // 单个文件可以直接刷新
                                    });
                                }
                            });
                        }
                    } catch (e) { }
                    return;
                }

                // 2. 处理外部拖拽 (应用防抖逻辑)
                const items = e.dataTransfer.items;
                if (items && items.length > 0) {
                    let processCount = 0;
                    
                    // 递归扫描函数
                    const traverseFileTree = (item, path) => {
                        path = path || "";
                        if (item.isFile) {
                            item.file((file) => {
                                const reader = new FileReader();
                                reader.onload = (ev) => {
                                    const buffer = SYSTEM.Buffer.from(ev.target.result);
                                    const fullPath = SYSTEM.desktopPath + (path ? '/' + path : '') + '/' + file.name;
                                    const parentDir = fullPath.substring(0, fullPath.lastIndexOf('/'));
                                    
                                    ensureDir(parentDir).then(() => {
                                        SYSTEM.fs.writeFile(fullPath, buffer, () => {
                                            processCount++;
                                            // 如果是根目录文件，记录位置
                                            if(!path) {
                                                SYSTEM.iconPositions['file-' + file.name] = { x: e.clientX - 40 + (processCount*10), y: e.clientY - 40 + (processCount*10) };
                                                saveIconPositions();
                                            }
                                            
                                            // 【重点】这里不再直接调用 refreshDesktop()
                                            // 而是调用防抖函数，防止图标重叠变粗
                                            debouncedRefresh();
                                        });
                                    });
                                };
                                reader.readAsArrayBuffer(file);
                            });
                        } else if (item.isDirectory) {
                            const dirPath = (path ? path + '/' : '') + item.name;
                            const fullDirPath = SYSTEM.desktopPath + '/' + dirPath;
                            
                            if(!path) {
                                SYSTEM.iconPositions['file-' + item.name] = { x: e.clientX - 40, y: e.clientY - 40 };
                                saveIconPositions();
                            }

                            ensureDir(fullDirPath).then(() => {
                                // 文件夹创建后也调用防抖刷新
                                debouncedRefresh();
                                
                                const dirReader = item.createReader();
                                const readEntries = () => {
                                    dirReader.readEntries((entries) => {
                                        if (entries.length > 0) {
                                            entries.forEach((entry) => traverseFileTree(entry, dirPath));
                                            readEntries();
                                        }
                                    });
                                };
                                readEntries();
                            });
                        }
                    };

                    for (let i = 0; i < items.length; i++) {
                        const item = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
                        if (item) traverseFileTree(item);
                    }
                    
                    Notify.info('正在处理', '开始导入文件结构...');
                }
            };
        }

        // 辅助函数：选择/取消选择
        function selectIcon(el) {
            if(!SYSTEM.selectedIcons.includes(el.id)) {
                SYSTEM.selectedIcons.push(el.id);
                el.classList.add('selected');
            }
        }
        function deselectIcon(el) {
            const idx = SYSTEM.selectedIcons.indexOf(el.id);
            if(idx > -1) { SYSTEM.selectedIcons.splice(idx, 1); el.classList.remove('selected'); }
        }
        function toggleIconSelection(el) {
            if(SYSTEM.selectedIcons.includes(el.id)) deselectIcon(el); else selectIcon(el);
        }
        function clearSelection() {
            SYSTEM.selectedIcons.forEach(id => document.getElementById(id)?.classList.remove('selected'));
            SYSTEM.selectedIcons = [];
        }

        function deleteSelected() {
            if(!confirm('确定删除选中项吗？')) return;
            const files = SYSTEM.selectedIcons.filter(id => id.startsWith('file-'))
                          .map(id => document.getElementById(id).dataset.filename);
            
            let count = 0;
            files.forEach(f => {
                const path = SYSTEM.desktopPath + '/' + f;
                SYSTEM.fs.stat(path, (err, stats) => {
                    const cb = () => { count++; if(count===files.length) { refreshDesktop(); Notify.success('已删除'); } };
                    if(stats.isDirectory()) deleteFolderRecursive(path, cb); else SYSTEM.fs.unlink(path, cb);
                });
            });
        }

        // === 复制/剪切/粘贴功能实现 ===

        // 刷新所有可能受影响的窗口
        function refreshAllAffectedWindows(destPath, srcPaths, isCut) {
            // 刷新桌面
            refreshDesktop();
            
            // 收集所有需要刷新的路径
            const pathsToRefresh = new Set();
            
            // 添加目标路径（只取第一层父目录）
            if (destPath.startsWith(SYSTEM.desktopPath)) {
                const relativePath = destPath.replace(SYSTEM.desktopPath + '/', '');
                if (relativePath) {
                    const firstSegment = relativePath.split('/')[0];
                    pathsToRefresh.add(SYSTEM.desktopPath + '/' + firstSegment);
                }
            } else {
                pathsToRefresh.add(destPath);
            }
            
            // 如果是剪切操作，还需要刷新源路径的父目录
            if (isCut && srcPaths.length > 0) {
                srcPaths.forEach(srcPath => {
                    if (srcPath.startsWith(SYSTEM.desktopPath)) {
                        const relativePath = srcPath.replace(SYSTEM.desktopPath + '/', '');
                        if (relativePath) {
                            const firstSegment = relativePath.split('/')[0];
                            pathsToRefresh.add(SYSTEM.desktopPath + '/' + firstSegment);
                        }
                    }
                });
            }
            
            // 遍历所有打开的文件夹窗口，找到路径匹配的窗口并刷新
            const refreshedWindows = new Set();
            Object.keys(SYSTEM.folderWindowStates || {}).forEach(wId => {
                const state = SYSTEM.folderWindowStates[wId];
                if (state) {
                    // 检查这个窗口的路径是否在需要刷新的路径列表中
                    pathsToRefresh.forEach(path => {
                        // 如果窗口的 currentPath 等于目标路径的父目录
                        if (state.currentPath === path) {
                            if (!refreshedWindows.has(wId)) {
                                state.fileStats = {};
                                renderFolderContent(wId);
                                refreshedWindows.add(wId);
                            }
                        }
                    });
                }
            });
        }

        // 桌面选中项复制
        function copySelectedDesktopItems() {
            const selectedFiles = SYSTEM.selectedIcons.filter(id => id.startsWith('file-'));
            if (selectedFiles.length === 0) {
                Notify.info('未选择文件');
                return;
            }
            
            Clipboard.clear();
            Clipboard.setCutMode(false);
            
            selectedFiles.forEach(id => {
                const el = document.getElementById(id);
                if (el && el.dataset.filename) {
                    Clipboard.add({
                        path: SYSTEM.desktopPath + '/' + el.dataset.filename,
                        filename: el.dataset.filename,
                        type: 'copy'
                    });
                }
            });
            
            Notify.success('已复制', `已复制 ${Clipboard.getItems().length} 个项目到剪贴板`);
        }

        // 桌面选中项剪切
        function cutSelectedDesktopItems() {
            const selectedFiles = SYSTEM.selectedIcons.filter(id => id.startsWith('file-'));
            if (selectedFiles.length === 0) {
                Notify.info('未选择文件');
                return;
            }
            
            Clipboard.clear();
            Clipboard.setCutMode(true);
            
            selectedFiles.forEach(id => {
                const el = document.getElementById(id);
                if (el && el.dataset.filename) {
                    Clipboard.add({
                        path: SYSTEM.desktopPath + '/' + el.dataset.filename,
                        filename: el.dataset.filename,
                        type: 'cut'
                    });
                    // 添加视觉反馈 - 降低透明度
                    el.style.opacity = '0.5';
                }
            });
            
            Notify.success('已剪切', `已剪切 ${Clipboard.getItems().length} 个项目`);
        }

        // 粘贴到桌面
        function pasteToDesktop() {
            if (!Clipboard.hasItems()) {
                Notify.info('剪贴板为空');
                return;
            }
            
            const items = Clipboard.getItems();
            const isCut = Clipboard.isCut;
            const srcPaths = items.map(i => i.path); // 收集所有源路径
            let processedCount = 0;
            let errorCount = 0;
            
            items.forEach(item => {
                const destPath = SYSTEM.desktopPath + '/' + item.filename;
                
                // 检查目标是否已存在
                SYSTEM.fs.stat(destPath, (err) => {
                    if (!err && destPath !== item.path) {
                        // 目标已存在，生成新名称
                        const ext = item.filename.includes('.') ? '.' + item.filename.split('.').pop() : '';
                        const baseName = item.filename.replace(ext, '');
                        let newName = baseName + ' (副本)' + ext;
                        let counter = 1;
                        
                        const checkAndRename = () => {
                            const newPath = SYSTEM.desktopPath + '/' + newName;
                            SYSTEM.fs.stat(newPath, (err) => {
                                if (!err) {
                                    counter++;
                                    newName = baseName + ' (副本' + counter + ')' + ext;
                                    checkAndRename();
                                } else {
                                    performPaste(item.path, newPath, item.filename, newName, isCut);
                                }
                            });
                        };
                        checkAndRename();
                    } else {
                        performPaste(item.path, destPath, item.filename, item.filename, isCut);
                    }
                });
            });
            
            function performPaste(srcPath, destPath, srcName, destName, isCut) {
                if (isCut) {
                    // 剪切操作
                    SYSTEM.fs.rename(srcPath, destPath, (err) => {
                        if (err) {
                            console.error('剪切失败:', err);
                            errorCount++;
                        } else {
                            processedCount++;
                        }
                        checkComplete();
                    });
                } else {
                    // 复制操作 - 读取后写入
                    SYSTEM.fs.stat(srcPath, (err, stats) => {
                        if (err) {
                            errorCount++;
                            checkComplete();
                            return;
                        }
                        
                        if (stats.isDirectory()) {
                            // 复制文件夹
                            copyFolderRecursive(srcPath, destPath, (err) => {
                                if (err) {
                                    console.error('复制文件夹失败:', err);
                                    errorCount++;
                                } else {
                                    processedCount++;
                                }
                                checkComplete();
                            });
                        } else {
                            // 复制文件
                            SYSTEM.fs.readFile(srcPath, (err, data) => {
                                if (err) {
                                    errorCount++;
                                    checkComplete();
                                    return;
                                }
                                SYSTEM.fs.writeFile(destPath, data, (err) => {
                                    if (err) {
                                        console.error('写入文件失败:', err);
                                        errorCount++;
                                    } else {
                                        processedCount++;
                                    }
                                    checkComplete();
                                });
                            });
                        }
                    });
                }
            }
            
            function checkComplete() {
                if (processedCount + errorCount === items.length) {
                    if (isCut) {
                        Clipboard.clear();
                        // 恢复所有图标透明度
                        document.querySelectorAll('.desktop-icon').forEach(el => el.style.opacity = '');
                        document.querySelectorAll('.folder-item, .folder-grid-item').forEach(el => el.style.opacity = '');
                    }
                    
                    // 刷新所有受影响的窗口
                    refreshAllAffectedWindows(SYSTEM.desktopPath, srcPaths, isCut);
                    
                    if (errorCount > 0) {
                        Notify.error('部分失败', `成功 ${processedCount} 个，失败 ${errorCount} 个`);
                    } else {
                        Notify.success('粘贴成功', `已${isCut ? '移动' : '复制'} ${processedCount} 个项目`);
                    }
                }
            }
        }

        // 递归复制文件夹
        function copyFolderRecursive(srcPath, destPath, callback) {
            SYSTEM.fs.mkdir(destPath, (err) => {
                // 忽略文件夹已存在的错误
                SYSTEM.fs.readdir(srcPath, (err, files) => {
                    if (err) {
                        callback(err);
                        return;
                    }
                    
                    if (files.length === 0) {
                        callback(null);
                        return;
                    }
                    
                    let pending = files.length;
                    files.forEach(file => {
                        const srcFilePath = srcPath + '/' + file;
                        const destFilePath = destPath + '/' + file;
                        
                        SYSTEM.fs.stat(srcFilePath, (err, stats) => {
                            if (err) {
                                if (--pending === 0) callback(null);
                                return;
                            }
                            
                            if (stats.isDirectory()) {
                                copyFolderRecursive(srcFilePath, destFilePath, () => {
                                    if (--pending === 0) callback(null);
                                });
                            } else {
                                SYSTEM.fs.readFile(srcFilePath, (err, data) => {
                                    if (err) {
                                        if (--pending === 0) callback(null);
                                        return;
                                    }
                                    SYSTEM.fs.writeFile(destFilePath, data, () => {
                                        if (--pending === 0) callback(null);
                                    });
                                });
                            }
                        });
                    });
                });
            });
        }

        // 7. 替换 openFolderWindow (增强版：工具栏、文件大小、排序、搜索、状态栏、网格视图)

        // 转义字符串用于内联事件属性（防止文件名中的引号/特殊字符破坏HTML）
        function escapeAttr(str) {
            return String(str).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0 || bytes == null) return '--';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
        }

        // 格式化日期
        function formatDate(mtime) {
            if (!mtime) return '--';
            const d = new Date(mtime);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        // 获取文件图标 SVG path（与桌面图标完全一致）

        // 渲染文件夹内容
        function renderFolderContent(windowId) {
            const state = SYSTEM.folderWindowStates[windowId];
            if (!state) return;

            const filelistEl = document.getElementById('folder-filelist-' + windowId);
            const colHeaderEl = document.getElementById('folder-col-header-' + windowId);
            const statusCountEl = document.getElementById('folder-status-count-' + windowId);
            const statusSizeEl = document.getElementById('folder-status-size-' + windowId);
            if (!filelistEl) return;

            // 获取文件列表
            SYSTEM.fs.readdir(state.currentPath, (err, files) => {
                if (err) {
                    filelistEl.innerHTML = '<div style="padding:40px;text-align:center;color:#e81123;font-size:13px">无法读取文件夹</div>';
                    return;
                }

                // 获取统计信息
                let pendingStats = files.length;
                const allStats = {};
                
                const afterStats = () => {
                    // 过滤搜索
                    let filtered = files;
                    if (state.searchQuery) {
                        const q = state.searchQuery.toLowerCase();
                        filtered = files.filter(f => f.toLowerCase().includes(q));
                    }

                    // 排序：文件夹优先，然后按指定字段排序
                    filtered.sort((a, b) => {
                        const aDir = allStats[a]?.isDirectory ? (typeof allStats[a].isDirectory === 'function' ? allStats[a].isDirectory() : allStats[a].isDirectory) : false;
                        const bDir = allStats[b]?.isDirectory ? (typeof allStats[b].isDirectory === 'function' ? allStats[b].isDirectory() : allStats[b].isDirectory) : false;
                        if (aDir && !bDir) return -1;
                        if (!aDir && bDir) return 1;

                        let cmp = 0;
                        if (state.sortBy === 'name') {
                            cmp = a.localeCompare(b, 'zh-CN');
                        } else if (state.sortBy === 'size') {
                            const aSize = allStats[a]?.size || 0;
                            const bSize = allStats[b]?.size || 0;
                            cmp = aSize - bSize;
                        } else if (state.sortBy === 'date') {
                            const aTime = allStats[a]?.mtime || 0;
                            const bTime = allStats[b]?.mtime || 0;
                            cmp = aTime - bTime;
                        } else if (state.sortBy === 'type') {
                            const aType = getFileExtension(a).toLowerCase();
                            const bType = getFileExtension(b).toLowerCase();
                            cmp = aType.localeCompare(bType);
                        }
                        return state.sortAsc ? cmp : -cmp;
                    });

                    // 更新列标题排序指示器
                    if (colHeaderEl) {
                        colHeaderEl.querySelectorAll('.col-sort').forEach(el => {
                            const sort = el.dataset.sort;
                            const arrow = el.querySelector('.sort-arrow');
                            if (sort === state.sortBy) {
                                el.classList.add('active');
                                arrow.textContent = state.sortAsc ? '▲' : '▼';
                            } else {
                                el.classList.remove('active');
                                arrow.textContent = '';
                            }
                        });
                    }

                    // 显示/隐藏列标题
                    if (colHeaderEl) {
                        colHeaderEl.style.display = state.viewMode === 'list' ? 'flex' : 'none';
                    }

                    // 生成内容
                    const selectionBox = filelistEl.querySelector('.folder-selection-box');
                    filelistEl.innerHTML = '';
                    if (selectionBox) filelistEl.appendChild(selectionBox);

                    if (filtered.length === 0) {
                        const emptyMsg = state.searchQuery ? '没有匹配的文件' : '文件夹为空';
                        filelistEl.insertAdjacentHTML('beforeend', `<div style="padding:40px;text-align:center;color:#888;font-size:13px">${emptyMsg}</div>`);
                    } else if (state.viewMode === 'list') {
                        filtered.forEach(file => {
                            const stats = allStats[file] || {};
                            const isDir = stats.isDirectory;
                            const iconPath = getFileIconPath(file, isDir);
                            const sizeStr = isDir ? '--' : formatFileSize(stats.size);
                            const dateStr = formatDate(stats.mtime);
                            const typeStr = isDir ? '文件夹' : getFileExtension(file);
                            const fullPath = state.currentPath + '/' + file;
                            const safeFile = escapeAttr(file);
                            const safePath = escapeAttr(fullPath);

                            const itemHtml = `
                                <div class="folder-item" data-filename="${safeFile}" data-path="${safePath}" data-isdir="${isDir}"
                                     ondblclick="handleFolderItemDblClick('${windowId}', '${safeFile}', '${safePath}', ${isDir})"
                                     onmousedown="handleFolderItemMouseDown(event, '${windowId}')"
                                     ontouchstart="handleFolderItemTouchStart(event, '${windowId}')"
                                     oncontextmenu="handleFolderItemContextMenu(event, '${windowId}', '${safeFile}', '${safePath}')">
                                    <svg class="icon-svg" viewBox="0 0 24 24">${iconPath}</svg>
                                    <span class="file-name">${highlightText(file, state.searchQuery)}</span>
                                    <span class="file-date">${dateStr}</span>
                                    <span class="file-type">${typeStr}</span>
                                    <span class="file-size">${sizeStr}</span>
                                </div>
                            `;
                            filelistEl.insertAdjacentHTML('beforeend', itemHtml);
                        });
                    } else {
                        // 网格视图
                        const gridContainer = document.createElement('div');
                        gridContainer.className = 'folder-grid-view';
                        filtered.forEach(file => {
                            const stats = allStats[file] || {};
                            const isDir = stats.isDirectory;
                            const iconPath = getFileIconPath(file, isDir);
                            const fullPath = state.currentPath + '/' + file;
                            const safeFile = escapeAttr(file);
                            const safePath = escapeAttr(fullPath);

                            const itemHtml = `
                                <div class="folder-grid-item" data-filename="${safeFile}" data-path="${safePath}" data-isdir="${isDir}"
                                     ondblclick="handleFolderItemDblClick('${windowId}', '${safeFile}', '${safePath}', ${isDir})"
                                     onmousedown="handleFolderItemMouseDown(event, '${windowId}')"
                                     ontouchstart="handleFolderItemTouchStart(event, '${windowId}')"
                                     oncontextmenu="handleFolderItemContextMenu(event, '${windowId}', '${safeFile}', '${safePath}')">
                                    <svg class="icon-svg" viewBox="0 0 24 24">${iconPath}</svg>
                                    <span class="file-name">${highlightText(file, state.searchQuery)}</span>
                                </div>
                            `;
                            gridContainer.insertAdjacentHTML('beforeend', itemHtml);
                        });
                        filelistEl.appendChild(gridContainer);
                    }

                    // 更新状态栏
                    const dirCount = filtered.filter(f => {
                        const d = allStats[f]?.isDirectory;
                        return d ? (typeof d === 'function' ? d() : d) : false;
                    }).length;
                    const fileCount = filtered.length - dirCount;
                    let statusText = '';
                    if (dirCount > 0 && fileCount > 0) {
                        statusText = `${fileCount} 个文件, ${dirCount} 个文件夹`;
                    } else if (dirCount > 0) {
                        statusText = `${dirCount} 个文件夹`;
                    } else {
                        statusText = `${fileCount} 个文件`;
                    }
                    if (state.searchQuery) {
                        statusText += ` (搜索: "${state.searchQuery}")`;
                    }
                    if (statusCountEl) statusCountEl.textContent = statusText;

                    // 计算总大小
                    let totalSize = 0;
                    filtered.forEach(f => {
                        if (!allStats[f]?.isDirectory) {
                            totalSize += (allStats[f]?.size || 0);
                        }
                    });
                    if (statusSizeEl) statusSizeEl.textContent = totalSize > 0 ? '总计: ' + formatFileSize(totalSize) : '';

                    // 更新侧边栏文件夹列表
                    updateSidebarFolderList(windowId);
                };

                if (files.length === 0) {
                    afterStats();
                } else {
                    files.forEach(file => {
                        const filePath = state.currentPath + '/' + file;
                        SYSTEM.fs.stat(filePath, (err, stats) => {
                            if (!err) {
                                const isDir = stats.isDirectory ? (typeof stats.isDirectory === 'function' ? stats.isDirectory() : stats.isDirectory) : false;
                                allStats[file] = {
                                    size: stats.size || 0,
                                    mtime: stats.mtime || 0,
                                    isDirectory: isDir
                                };
                            }
                            pendingStats--;
                            if (pendingStats === 0) afterStats();
                        });
                    });
                }
            });
        }

        // 文件夹项双击处理
        function handleFolderItemDblClick(windowId, filename, fullPath, isDir) {
            if (isDir) {
                // 打开子文件夹
                const state = SYSTEM.folderWindowStates[windowId];
                if (!state) return;
                state.folderName = filename;
                state.parentPath = state.currentPath;
                state.currentPath = fullPath;
                state.searchQuery = '';
                state.fileStats = {};
                // 确保父路径正确
                if (!state.parentPath) {
                    state.parentPath = fullPath.substring(0, fullPath.lastIndexOf('/')) || SYSTEM.desktopPath;
                }
                // 更新窗口标题
                const win = document.getElementById('folder-content-' + windowId)?.closest('.window');
                if (win) {
                    const titleEl = win.querySelector('.window-title-text');
                    if (titleEl) titleEl.textContent = filename;
                }
                // 清空搜索框
                const searchInput = document.getElementById('folder-search-' + windowId);
                if (searchInput) searchInput.value = '';
                updateFolderBreadcrumb(windowId);
                renderFolderContent(windowId);
            } else {
                openFileFromPath(fullPath, filename);
            }
        }

        // 排序
        function folderSortBy(windowId, sortBy) {
            const state = SYSTEM.folderWindowStates[windowId];
            if (!state) return;
            if (state.sortBy === sortBy) {
                state.sortAsc = !state.sortAsc;
            } else {
                state.sortBy = sortBy;
                state.sortAsc = true;
            }
            renderFolderContent(windowId);
        }

        // 搜索
        function folderSearch(windowId, query) {
            const state = SYSTEM.folderWindowStates[windowId];
            if (!state) return;
            state.searchQuery = query;
            renderFolderContent(windowId);
        }

        // 视图切换
        function folderSetView(windowId, mode) {
            const state = SYSTEM.folderWindowStates[windowId];
            if (!state) return;
            state.viewMode = mode;
            // 更新按钮状态
            const listBtn = document.getElementById('folder-view-list-' + windowId);
            const gridBtn = document.getElementById('folder-view-grid-' + windowId);
            if (listBtn) listBtn.classList.toggle('active', mode === 'list');
            if (gridBtn) gridBtn.classList.toggle('active', mode === 'grid');
            renderFolderContent(windowId);
        }

        // 返回上级
        function folderGoUp(windowId) {
            const state = SYSTEM.folderWindowStates[windowId];
            if (!state) return;

            // 统一逻辑：所有文件夹都使用路径导航
            const topPaths = [SYSTEM.desktopPath, '/mnt/local', '/mnt'];
            if (topPaths.includes(state.currentPath)) {
                Notify.warning('提示', '已经是最顶层目录');
                return;
            }
            const parentPath = state.parentPath;
            const parentName = parentPath === SYSTEM.desktopPath ? '桌面' : 
                              parentPath === '/mnt/local' ? '本地文件' : 
                              parentPath === '/mnt' ? '挂载点' :
                              parentPath.split('/').pop();
            state.currentPath = parentPath;
            state.folderName = parentName;
            state.parentPath = parentPath.substring(0, parentPath.lastIndexOf('/')) || SYSTEM.desktopPath;
            state.searchQuery = '';
            state.fileStats = {};
            // 更新窗口标题
            const win = document.getElementById('folder-content-' + windowId)?.closest('.window');
            if (win) {
                const titleEl = win.querySelector('.window-title-text');
                if (titleEl) titleEl.textContent = parentName;
            }
            const searchInput = document.getElementById('folder-search-' + windowId);
            if (searchInput) searchInput.value = '';
            updateFolderBreadcrumb(windowId);
            renderFolderContent(windowId);
        }

        // 刷新
        function folderRefresh(windowId) {
            const state = SYSTEM.folderWindowStates[windowId];
            if (!state) return;
            state.fileStats = {};
            renderFolderContent(windowId);
            refreshDesktop();
            Notify.success('已刷新', '文件夹内容已更新');
        }

        // 新建文件/文件夹
        function folderCreateNew(windowId, type) {
            const state = SYSTEM.folderWindowStates[windowId];
            if (!state) return;

            // 统一使用 BrowserFS API（本地挂载目录已通过 FSA 后端支持标准 fs 操作）
            if (type === 'folder') {
                const name = prompt('请输入文件夹名称:', '新建文件夹');
                if (!name) return;
                SYSTEM.fs.mkdir(state.currentPath + '/' + name, (err) => {
                    if (err) Notify.error('创建失败', err.message);
                    else { renderFolderContent(windowId); refreshDesktop(); Notify.success('成功', '文件夹已创建'); }
                });
            } else {
                const name = prompt('请输入文件名称:', '新建文本文档.txt');
                if (!name) return;
                SYSTEM.fs.writeFile(state.currentPath + '/' + name, '', (err) => {
                    if (err) Notify.error('创建失败', err.message);
                    else { renderFolderContent(windowId); refreshDesktop(); Notify.success('成功', '文件已创建'); }
                });
            }
        }

        // 更新面包屑导航（支持 /mnt/local 路径）
        function updateFolderBreadcrumb(windowId) {
            const state = SYSTEM.folderWindowStates[windowId];
            const bcEl = document.getElementById('folder-breadcrumb-' + windowId);
            if (!state || !bcEl) return;

            // 构建路径层级
            const parts = [];
            let p = state.currentPath;
            const topPaths = [SYSTEM.desktopPath, '/mnt/local', '/mnt'];
            while (p && !topPaths.includes(p) && p.length > 1) {
                parts.unshift({ name: p.split('/').pop(), path: p });
                p = p.substring(0, p.lastIndexOf('/')) || '/';
            }
            // 添加根节点
            if (p === SYSTEM.desktopPath) {
                parts.unshift({ name: '桌面', path: SYSTEM.desktopPath });
            } else if (p === '/mnt/local') {
                parts.unshift({ name: '本地文件', path: '/mnt/local' });
            } else if (p === '/mnt') {
                parts.unshift({ name: '挂载点', path: '/mnt' });
            }

            let html = '';
            parts.forEach((part, i) => {
                if (i > 0) html += '<span class="bc-sep">›</span>';
                const isCurrent = i === parts.length - 1;
                html += `<span class="bc-item ${isCurrent ? 'current' : ''}" onclick="folderNavigateTo('${windowId}', '${part.path}', '${part.name}')">${part.name}</span>`;
            });
            bcEl.innerHTML = html;
        }

        // 面包屑导航跳转
        function folderNavigateTo(windowId, targetPath, targetName) {
            const state = SYSTEM.folderWindowStates[windowId];
            if (!state || state.currentPath === targetPath) return;
            state.currentPath = targetPath;
            state.folderName = targetName;
            state.parentPath = targetPath.substring(0, targetPath.lastIndexOf('/')) || SYSTEM.desktopPath;
            state.searchQuery = '';
            state.fileStats = {};
            const win = document.getElementById('folder-content-' + windowId)?.closest('.window');
            if (win) {
                const titleEl = win.querySelector('.window-title-text');
                if (titleEl) titleEl.textContent = targetName;
            }
            const searchInput = document.getElementById('folder-search-' + windowId);
            if (searchInput) searchInput.value = '';
            updateFolderBreadcrumb(windowId);
            renderFolderContent(windowId);
        }

        // 初始化文件夹拖放高亮（支持外部文件拖拽导入）
        function initFolderDropHighlight(windowId) {
            const contentArea = document.getElementById('folder-content-' + windowId);
            if (!contentArea) return;

            let dragCounter = 0;
            contentArea.addEventListener('dragenter', (e) => {
                e.preventDefault();
                dragCounter++;
                contentArea.classList.add('folder-content-drop-active');
            });
            contentArea.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dragCounter--;
                if (dragCounter <= 0) {
                    dragCounter = 0;
                    contentArea.classList.remove('folder-content-drop-active');
                }
            });
            contentArea.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            contentArea.addEventListener('drop', async (e) => {
                e.preventDefault();
                dragCounter = 0;
                contentArea.classList.remove('folder-content-drop-active');
                
                const state = SYSTEM.folderWindowStates?.[windowId];
                if(!state) return;
                
                const targetPath = state.currentPath;
                
                // === 定义防抖刷新函数 ===
                let refreshTimer = null;
                const debouncedRefresh = () => {
                    if (refreshTimer) clearTimeout(refreshTimer);
                    refreshTimer = setTimeout(() => {
                        state.fileStats = {};
                        renderFolderContent(windowId);
                        refreshDesktop();
                        Notify.success('导入完成', '文件已导入到当前文件夹');
                    }, 200);
                };
                
                // 1. 处理系统内部文件拖拽（从桌面或其他文件夹拖入）
                const dragData = e.dataTransfer.getData('text/plain');
                if (dragData) {
                    try {
                        const { srcPath, filename } = JSON.parse(dragData);
                        if (srcPath && filename) {
                            SYSTEM.fs.readFile(srcPath, (err, data) => {
                                if (!err) {
                                    const destPath = targetPath + '/' + filename;
                                    SYSTEM.fs.writeFile(destPath, data, () => {
                                        debouncedRefresh();
                                    });
                                }
                            });
                        }
                    } catch (e) { }
                    return;
                }
                
                // 2. 处理外部拖拽（从真实桌面/文件管理器拖入）
                const items = e.dataTransfer.items;
                if (items && items.length > 0) {
                    let processCount = 0;
                    let totalItems = 0;
                    
                    // 先计算总项目数
                    for (let i = 0; i < items.length; i++) {
                        const item = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
                        if (item) totalItems++;
                    }
                    
                    if (totalItems === 0) return;
                    
                    Notify.info('正在处理', `开始导入 ${totalItems} 个项目...`);
                    
                    // 递归扫描函数
                    const traverseFileTree = (item, relativePath) => {
                        relativePath = relativePath || "";
                        
                        if (item.isFile) {
                            item.file((file) => {
                                const reader = new FileReader();
                                reader.onload = (ev) => {
                                    const buffer = SYSTEM.Buffer.from(ev.target.result);
                                    const fullPath = targetPath + (relativePath ? '/' + relativePath : '') + '/' + file.name;
                                    const parentDir = fullPath.substring(0, fullPath.lastIndexOf('/'));
                                    
                                    ensureDir(parentDir).then(() => {
                                        SYSTEM.fs.writeFile(fullPath, buffer, () => {
                                            processCount++;
                                            if (processCount === totalItems) {
                                                debouncedRefresh();
                                            }
                                        });
                                    });
                                };
                                reader.readAsArrayBuffer(file);
                            });
                        } else if (item.isDirectory) {
                            const dirPath = (relativePath ? relativePath + '/' : '') + item.name;
                            const fullDirPath = targetPath + '/' + dirPath;
                            
                            ensureDir(fullDirPath).then(() => {
                                processCount++;
                                if (processCount === totalItems) {
                                    debouncedRefresh();
                                }
                                
                                const dirReader = item.createReader();
                                const readEntries = () => {
                                    dirReader.readEntries((entries) => {
                                        if (entries.length > 0) {
                                            totalItems += entries.length;
                                            entries.forEach((entry) => traverseFileTree(entry, dirPath));
                                            readEntries();
                                        }
                                    });
                                };
                                readEntries();
                            });
                        }
                    };

                    for (let i = 0; i < items.length; i++) {
                        const item = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
                        if (item) traverseFileTree(item);
                    }
                }
            });
        }

        // 刷新已存在的同名文件夹窗口内容（增强版）
        function refreshFolderWindow(folderName) {
            SYSTEM.fs.readdir(SYSTEM.desktopPath + '/' + folderName, (err, files) => {

                document.querySelectorAll('.window').forEach(win => {

                    const windowId = contentId.replace('folder-content-', '');
                    const state = SYSTEM.folderWindowStates?.[windowId];

                    if (state) {
                        state.fileStats = {};
                        renderFolderContent(windowId);
                    } else {
                        // 旧版窗口，用简单刷新
                        const path = SYSTEM.desktopPath + '/' + folderName;
                        let content = files.length === 0
                            ? '<div style="padding:40px;text-align:center;color:#888">文件夹为空</div>'
                            : files.map(file => {

                                if(file.match(/\.(jpg|png|gif|webp|jpeg|bmp|svg)$/i)) icon = '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>';
                                if(isArchiveFile(file)) icon = '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2v11z"/><path d="M12 10v4"/><path d="M12 14l2-2"/>';

                                return `
                                    <div class="folder-item" data-filename="${file}" data-path="${path}/${file}"
                                         ondblclick="openFileFromPath('${path}/${file}', '${file}')"

                                         ontouchstart="handleFolderItemTouchStart(event, '${contentId.replace('folder-content-', '')}')"
                                         oncontextmenu="handleFolderItemContextMenu(event, '${contentId.replace('folder-content-', '')}', '${file}', '${path}/${file}')">
                                        <svg class="icon-svg" viewBox="0 0 24 24">${icon}</svg>
                                        <span class="file-name">${file}</span>

                            }).join('');

                        const selectionBox = contentArea.querySelector('.folder-selection-box');
                        contentArea.innerHTML = '';
                        if (selectionBox) contentArea.appendChild(selectionBox);
                        contentArea.insertAdjacentHTML('beforeend', content);
                    }
                });

        }

        // 文件夹窗口框选逻辑
        function initFolderSelection(windowId) {
            const contentArea = document.getElementById('folder-content-' + windowId);
            const filelistArea = document.getElementById('folder-filelist-' + windowId);
            const selectionBox = document.getElementById('folder-selection-' + windowId);
            // 兼容新旧结构：优先使用 filelistArea，回退到 contentArea
            const scrollArea = filelistArea || contentArea;
            if (!scrollArea || !selectionBox) return () => {};
            let isSelecting = false, startX, startY;
            let lastClientX = 0, lastClientY = 0;
            let scrollInterval = null;

            const getPos = (e) => {
                if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
                if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
                return { x: e.clientX, y: e.clientY };
            };

            const updateSelectionBox = () => {
                const rect = scrollArea.getBoundingClientRect();
                const curX = lastClientX - rect.left + scrollArea.scrollLeft;
                const curY = lastClientY - rect.top + scrollArea.scrollTop;

                const left = Math.min(startX, curX);
                const top = Math.min(startY, curY);
                const width = Math.abs(startX - curX);
                const height = Math.abs(startY - curY);

                selectionBox.style.left = left + 'px';
                selectionBox.style.top = top + 'px';
                selectionBox.style.width = width + 'px';
                selectionBox.style.height = height + 'px';

                const items = scrollArea.querySelectorAll('.folder-item, .folder-grid-item');
                items.forEach(item => {
                    const itemLeft = item.offsetLeft;
                    const itemTop = item.offsetTop;
                    const itemRight = itemLeft + item.offsetWidth;
                    const itemBottom = itemTop + item.offsetHeight;

                    const intersect = !(itemRight < left || itemLeft > left + width ||
                                       itemBottom < top || itemTop > top + height);

                    if(intersect) {
                        item.classList.add('selected');
                    } else {
                        item.classList.remove('selected');
                    }
                });
            };

            const startAutoScroll = (speed) => {
                stopAutoScroll();
                scrollInterval = setInterval(() => {
                    scrollArea.scrollTop += speed;
                    updateSelectionBox();
                }, 16);
            };

            const stopAutoScroll = () => {
                if (scrollInterval) {
                    clearInterval(scrollInterval);
                    scrollInterval = null;
                }
            };

            const handleStart = (e) => {
                if(e.button === 2) return;
                if(isSelecting) return;
                if(e.target.closest('.folder-item, .folder-grid-item')) return;

                e.preventDefault();
                e.stopPropagation();
                clearFolderSelection(windowId);
                isSelecting = true;
                scrollArea.dataset.isSelecting = 'true';

                const pos = getPos(e);
                const rect = scrollArea.getBoundingClientRect();
                lastClientX = pos.x;
                lastClientY = pos.y;
                startX = pos.x - rect.left + scrollArea.scrollLeft;
                startY = pos.y - rect.top + scrollArea.scrollTop;

                selectionBox.style.display = 'block';
                selectionBox.style.width = '0';
                selectionBox.style.height = '0';
                selectionBox.style.left = startX + 'px';
                selectionBox.style.top = startY + 'px';
            };

            const handleMove = (e) => {
                if(!isSelecting) return;
                if(e.type === 'touchmove') e.preventDefault();

                const pos = getPos(e);
                lastClientX = pos.x;
                lastClientY = pos.y;

                const rect = scrollArea.getBoundingClientRect();
                const scrollZone = 40;
                const scrollSpeed = 12;

                stopAutoScroll();

                if (pos.y < rect.top + scrollZone && pos.y > rect.top - 60) {
                    const ratio = Math.min(1, (rect.top + scrollZone - pos.y) / scrollZone);
                    startAutoScroll(-ratio * scrollSpeed);

            const item = e.currentTarget;
            const now = Date.now();

            // 双击检测：同一元素300ms内连续两次触摸 = 双击
            if (_lastTapTarget === item && now - _lastTapTime < 300) {
                const filename = item.dataset.filename;
                const state = SYSTEM.folderWindowStates[windowId];

                // 统一使用 BrowserFS 路径
                const fullPath = item.dataset.path;
                const isDir = item.dataset.isdir === 'true';

                _lastTapTarget = null;

                item.classList.add('selected');
